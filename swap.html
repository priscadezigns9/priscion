<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHILLATA | Fast & Fun Trading</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        body { margin: 0; background: #7B35D4; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .swap-box { background: #fff; color: #000; padding: 40px; border-radius: 40px; width: 450px; box-shadow: 0 40px 100px rgba(0,0,0,0.3); position: relative; }
        .pepper-anim { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 100px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -20px); } }
        
        .input-group { background: #F5F5F5; padding: 25px; border-radius: 24px; margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 900; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        input { border: none; background: none; font-size: 2rem; font-weight: 900; width: 60%; outline: none; }
        .token-select { background: #eee; padding: 10px 20px; border-radius: 100px; font-weight: 900; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .swap-btn { width: 100%; padding: 25px; background: #FF3D00; color: #fff; border: none; border-radius: 24px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .swap-btn:hover { background: #D83400; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="swap-box">
        <img src="assets/chillata_logo.png" class="pepper-anim">
        <h2 style="text-align:center; margin-top:40px; font-weight:900;">CHILLATA SWAP</h2>
        
        <div class="input-group">
            <label>You Give</label>
            <div class="input-row">
                <input type="number" value="100" id="give">
                <div class="token-select"><img src="assets/priscion_logo.png" style="width:20px"> $PRN</div>
            </div>
        </div>

        <div style="text-align:center; margin: -15px 0; position:relative; z-index:10">
            <button style="background:#fff; border:2px solid #F5F5F5; width:40px; height:40px; border-radius:12px; cursor:pointer">↓</button>
        </div>

        <div class="input-group">
            <label>You Get</label>
            <div class="input-row">
                <input type="number" value="50" id="get" readonly>
                <div class="token-select">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/atelia.webp" style="width:20px; border-radius:50%"> $ADA
                </div>
            </div>
        </div>

        <button class="swap-btn" onclick="handleSwap()">ANCHOR TRADE</button>
    </div>

    <script src="wallet-core.js"></script>
    <script>
        function handleSwap() {
            const amount = document.getElementById('give').value;
            if(PRN.sendCoins('CHILLATA_LP', amount)) {
                alert("Swap Successfully Anchored to Cardano Heritage!");
                location.href = 'wallet-app.html';
            } else {
                alert("Insufficient $PRN for this swap.");
            }
        }
    </script>
</body>
</html>
