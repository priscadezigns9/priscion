<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHILLATA | DEX</title>
    <style>
        body { margin: 0; background: #080808; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .swap-box { width: 440px; background: #121212; border: 1px solid #1a1a1a; border-radius: 24px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header img { height: 32px; }
        .input-group { background: #1b1b1b; border-radius: 16px; padding: 16px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
        .input-group:hover { border-color: #333; }
        .input-group input { background: transparent; border: none; color: #fff; font-size: 1.5rem; width: 100%; outline: none; }
        .asset-select { background: #2d2d2d; border-radius: 12px; padding: 4px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .swap-btn { width: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); border: none; padding: 18px; border-radius: 16px; color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="swap-box">
        <div class="header">
            <img src="assets/chillata_word.png" alt="Chillata">
            <div style="cursor: pointer;" onclick="location.href='wallet.html'"><img src="assets/muse_icon.png" style="height: 24px;"></div>
        </div>
        
        <div class="input-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; color: #888; font-size: 0.9rem;">
                <span>From</span>
                <span>Balance: 1450.00</span>
            </div>
            <div style="display: flex;">
                <input type="number" placeholder="0.0" value="100">
                <div class="asset-select">$PRN</div>
            </div>
        </div>

        <div style="text-align: center; margin: -10px 0; z-index: 2; position: relative;">
            <div style="background: #1b1b1b; width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; border: 4px solid #121212; cursor: pointer;">↓</div>
        </div>

        <div class="input-group">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; color: #888; font-size: 0.9rem;">
                <span>To</span>
                <span>Balance: 0.00</span>
            </div>
            <div style="display: flex;">
                <input type="number" placeholder="0.0" readonly value="85.5">
                <div class="asset-select">$MUSD</div>
            </div>
        </div>

        <button class="swap-btn">Swap Assets</button>
    </div>
</body>
</html>
