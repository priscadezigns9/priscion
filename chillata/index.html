<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHILLATA | Execute Chillata Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #000000;
            --muted: #666666;
            --accent: #7B35D4;
            --gold: #D4AF37;
            --border: rgba(0,0,0,0.1);
            --surface: #F9F9F9;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-heading: 'Playfair Display', serif;
            --green: #28a745;
            --red: #ff3131;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-main); overflow: hidden; 
        }

        .app { height: 100%; display: grid; grid-template-rows: auto 1fr auto; }

        header {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            z-index: 100;
        }

        .logo img { height: 30px; }

        .ticker-tape { display: flex; gap: 30px; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
        .ticker-tape b.up { color: var(--green); }
        .ticker-tape b.down { color: var(--red); }

        .terminal {
            display: grid; grid-template-columns: 320px 1fr 320px;
            overflow: hidden;
        }

        .col { display: flex; flex-direction: column; overflow: hidden; }

        .chart-header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .chart-title { font-family: var(--font-heading); font-size: 1.8rem; }
        .price-now { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }

        .chart-container { flex: 1; padding: 0 40px 40px; position: relative; }
        #marketChart { width: 100%; height: 100%; }

        .trade-col { background: var(--surface); padding: 40px; border-left: 1px solid var(--border); }
        .input-wrap { background: #fff; border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-wrap input { background: transparent; border: none; color: #000; font-size: 1.5rem; font-weight: 900; width: 60%; outline: none; }
        .input-wrap img { width: 32px; height: 32px; border-radius: 50%; }

        .btn-confirm {
            width: 100%; background: #000; color: #fff; border: none; padding: 25px;
            border-radius: 20px; font-weight: 900; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; margin-top: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        footer {
            padding: 20px 40px;
            display: flex; justify-content: center; gap: 40px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .nav-link { text-decoration: none; color: var(--muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .nav-link.active { color: var(--accent); }

        /* Asset List Styling */
        .asset-row {
            background: #fff; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .asset-row:hover { border-color: var(--accent); background: #fff; }
        .asset-row img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .asset-meta { flex: 1; }
        .asset-symbol { font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; }
        .asset-name { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
        .asset-price { text-align: right; font-weight: 800; font-size: 0.8rem; }

    </style>
</head>
<body>

    <div class="app">
        <header>
            <div class="logo"><img src="https://priscion.com/assets/chillata_logo.png"></div>
            <div class="ticker-tape">
                <span>PRN/MUSD: <b class="up">1.0245 +12%</b></span>
                <span>ATLR/PRN: <b class="down">0.0450 -2%</b></span>
            </div>
            <div style="font-size:0.6rem; font-weight:900; background:var(--accent); color:#fff; padding:4px 12px; border-radius:30px;">$PRISCA.PRN</div>
        </header>

        <div class="terminal">
            <div class="col" style="padding:40px; border-right:1px solid var(--border); overflow-y: auto;">
                <h3 style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:3px; margin-bottom:30px;">Independent Assets</h3>
                
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <!-- PRN -->
                    <div class="asset-row">
                        <img src="https://priscion.com/assets/prn.jpg">
                        <div class="asset-meta">
                            <div class="asset-symbol">PRN</div>
                            <div class="asset-name">Independent Utility</div>
                        </div>
                        <div class="asset-price">$1.02</div>
                    </div>

                    <!-- NRL -->
                    <div class="asset-row">
                        <img src="https://priscion.com/assets/nrl.jpg">
                        <div class="asset-meta">
                            <div class="asset-symbol">NRL</div>
                            <div class="asset-name">Neural Reserve</div>
                        </div>
                        <div class="asset-price">$42.85</div>
                    </div>

                    <!-- ATLR -->
                    <div class="asset-row">
                        <img src="https://priscion.com/assets/atlr.jpg">
                        <div class="asset-meta">
                            <div class="asset-symbol">ATLR</div>
                            <div class="asset-name">Atelia Gaming</div>
                        </div>
                        <div class="asset-price">$0.04</div>
                    </div>

                    <!-- MUSD -->
                    <div class="asset-row">
                        <img src="https://priscion.com/assets/musd.jpg">
                        <div class="asset-meta">
                            <div class="asset-symbol">MUSD</div>
                            <div class="asset-name">Independent Stable</div>
                        </div>
                        <div class="asset-price">$1.00</div>
                    </div>

                    <!-- JLO -->
                    <div class="asset-row">
                        <img src="https://priscion.com/assets/jlo.jpg">
                        <div class="asset-meta">
                            <div class="asset-symbol">JLO</div>
                            <div class="asset-name">Joint Ledger Ops</div>
                        </div>
                        <div class="asset-price">$1.00</div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="chart-header">
                    <div class="chart-title">Chillata Momentum</div>
                    <div class="price-now">1.0245 <span style="font-size:0.8rem; color:var(--green);">+12.4%</span></div>
                </div>
                <div class="chart-container"><canvas id="marketChart"></canvas></div>
            </div>

            <div class="col trade-col">
                <h3 style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;">Exchange</h3>
                <div class="input-wrap">
                    <input type="text" value="100.00">
                    <img src="https://priscion.com/assets/prn.jpg">
                </div>
                <div style="text-align:center; margin-bottom:15px; color:var(--accent);">⬇</div>
                
                <div class="input-wrap">
                    <input type="text" value="120.45" readonly>
                    <img src="https://priscion.com/assets/nrl.jpg">
                </div>
                <button class="btn-confirm" onclick="alert('Anchoring Transaction to Ledger...')">Execute Chillata Swap</button>
            </div>
        </div>

        <footer>
            <a href="exchange.html" class="nav-link active">Exchange</a>
            <a href="vault.html" class="nav-link">Vault</a>
            <a href="auth.html" class="nav-link">Identity</a>
            <a href="../index.html" class="nav-link">Hub</a>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('marketChart');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.onresize = resize; resize();

        let points = Array.from({length: 50}, (_, i) => ({x: i * (canvas.width/50), y: canvas.height/2}));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#7B35D4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
                points[i].y += (Math.random() - 0.5) * 5;
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
