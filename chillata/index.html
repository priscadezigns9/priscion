<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHILLATA | Sovereign Exchange v2.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #000; --muted: #888; --accent: #7B35D4; --border: #F0F0F0; --surface: #FAFAFA; --glow: 0 0 20px rgba(123, 53, 212, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        header { height: 70px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; z-index: 10; flex-shrink: 0; }
        .logo img { height: 20px; }

        .terminal { display: grid; grid-template-columns: 300px 1fr 380px; flex: 1; overflow: hidden; }
        .col { border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
        .col:last-child { border-right: none; }

        .label { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: block; }
        
        .asset-btn { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 16px; border: 1px solid transparent; cursor: pointer; transition: 0.2s; margin-bottom: 5px; width: 100%; background: none; text-align: left; }
        .asset-btn:hover { background: var(--surface); }
        .asset-btn:active { transform: scale(0.95); background: var(--border); }
        .asset-btn img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); pointer-events: none; }
        .asset-meta { pointer-events: none; }
        .asset-meta h4 { font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; margin: 0; }
        .asset-meta p { font-size: 0.6rem; color: var(--muted); margin: 0; }

        .main-col { padding: 40px; }
        .main-col h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 20px; }
        .chart-box { flex: 1; background: var(--surface); border-radius: 30px; border: 1px solid var(--border); height: calc(100% - 100px); }

        .trade-col { padding: 40px; background: #fff; }
        .input-wrap { background: var(--surface); border: 2px solid var(--border); padding: 25px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-wrap.active { border-color: var(--accent); background: #fff; box-shadow: var(--glow); transform: translateY(-2px); }
        .input-wrap input { background: transparent; border: none; outline: none; font-size: 1.5rem; font-weight: 900; width: 60%; color: var(--text); }
        .input-wrap .token-selector { display: flex; align-items: center; gap: 10px; pointer-events: none; }
        .input-wrap img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-wrap .symbol { font-weight: 900; font-size: 0.8rem; color: var(--muted); }

        .btn-execute { width: 100%; background: #000; color: #fff; border: none; padding: 25px; border-radius: 100px; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-execute:active { background: var(--accent); transform: translateY(2px); }

        /* FOOTER DESTRUCTION */
        footer, .bottom-bar, nav, [class*="nav"], [id*="nav"], [class*="footer"], [id*="footer"] { display: none !important; }
        
        @media (max-width: 900px) {
            .terminal { grid-template-columns: 1fr; }
            .col { border-right: none; border-bottom: 1px solid var(--border); }
            .main-col { display: none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png"></div>
            <div id="status-tag" style="font-size: 0.5rem; font-weight: 900; background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 20px;">READY v2.4</div>
        </header>

        <div class="terminal">
            <div class="col" style="padding: 30px;">
                <span class="label">Sovereign Assets</span>
                
                <button class="asset-btn" onclick="applyAsset('PRN', 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/prn.jpg')">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/prn.jpg">
                    <div class="asset-meta"><h4>PRN</h4><p>Priscion Utility</p></div>
                </button>

                <button class="asset-btn" onclick="applyAsset('NRL', 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/nrl.jpg')">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/nrl.jpg">
                    <div class="asset-meta"><h4>NRL</h4><p>Neural Reserve</p></div>
                </button>

                <button class="asset-btn" onclick="applyAsset('ATLR', 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/atlr.jpg')">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/atlr.jpg">
                    <div class="asset-meta"><h4>ATLR</h4><p>Atelia Gaming</p></div>
                </button>

                <button class="asset-btn" onclick="applyAsset('MUSD', 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/musd.jpg')">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/musd.jpg">
                    <div class="asset-meta"><h4>MUSD</h4><p>Priscion Stable</p></div>
                </button>

                <button class="asset-btn" onclick="applyAsset('ADA', 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/ada_logo.png')">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/ada_logo.png">
                    <div class="asset-meta"><h4>ADA</h4><p>Cardano</p></div>
                </button>
            </div>

            <div class="col main-col">
                <h2>Momentum</h2>
                <div class="chart-box"><canvas id="viz" style="width:100%; height:100%;"></canvas></div>
            </div>

            <div class="col trade-col">
                <span class="label">Sovereign Swap</span>
                
                <div class="input-wrap active" id="from-wrap" onclick="focusBox('from')">
                    <input type="number" value="100" id="val-from">
                    <div class="token-selector">
                        <span class="symbol" id="sym-from">PRN</span>
                        <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/prn.jpg" id="img-from">
                    </div>
                </div>

                <div style="text-align:center; padding:5px; color:var(--accent); font-size:1.5rem; font-weight:900;">↓</div>

                <div class="input-wrap" id="to-wrap" onclick="focusBox('to')">
                    <input type="number" value="120" id="val-to">
                    <div class="token-selector">
                        <span class="symbol" id="sym-to">NRL</span>
                        <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/nrl.jpg" id="img-to">
                    </div>
                </div>

                <button class="btn-execute" onclick="this.innerText='SWAP ANCHORED'; setTimeout(()=>this.innerText='EXECUTE SWAP', 2000)">Execute Swap</button>
            </div>
        </div>
    </div>

    <script>
        let currentFocus = 'from';
        
        function focusBox(side) {
            currentFocus = side;
            document.querySelectorAll('.input-wrap').forEach(el => el.classList.remove('active'));
            document.getElementById(side + '-wrap').classList.add('active');
            console.log('Active Side: ' + currentFocus);
        }

        // Add event listeners to inputs to capture focus when amount is changed
        document.getElementById('val-from').addEventListener('focus', () => focusBox('from'));
        document.getElementById('val-to').addEventListener('focus', () => focusBox('to'));

        function applyAsset(symbol, url) {
            console.log('Action: Picking ' + symbol + ' for ' + currentFocus);
            
            // Explicitly target the elements
            const imgEl = document.getElementById('img-' + currentFocus);
            const symEl = document.getElementById('sym-' + currentFocus);
            
            if (imgEl && symEl) {
                imgEl.src = url;
                symEl.innerText = symbol;
                
                // Switch focus to the other side automatically for a smooth flow
                if (currentFocus === 'from') {
                    focusBox('to');
                }
            } else {
                console.error('Error: Could not find elements for ' + currentFocus);
            }
        }
        
        // Ensure no legacy footer survives
        window.onload = function() {
            document.querySelectorAll('footer, nav, .bottom-bar').forEach(el => el.remove());
        };

        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.onresize = resize; resize();
        let pts = Array.from({length: 40}, (_, i) => ({x: i * (canvas.width/40), y: canvas.height/2}));
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#7B35D4'; ctx.lineWidth = 4; ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for(let i=1; i<pts.length; i++) {
                ctx.lineTo(pts[i].x, pts[i].y);
                pts[i].y += (Math.random() - 0.5) * 8;
                if(pts[i].y < 40) pts[i].y = 40;
                if(pts[i].y > canvas.height - 40) pts[i].y = canvas.height - 40;
            }
            ctx.stroke(); requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
