<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHILLATA | Sovereign Exchange v2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #000; --muted: #888; --accent: #7B35D4; --border: #F0F0F0; --surface: #FAFAFA; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        header { height: 80px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; z-index: 10; flex-shrink: 0; }
        .logo img { height: 24px; }

        .terminal { display: grid; grid-template-columns: 320px 1fr 350px; flex: 1; overflow: hidden; }
        .col { border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
        .col:last-child { border-right: none; }

        .label { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: block; }
        
        .asset-row { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 16px; border: 1px solid transparent; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .asset-row:hover { background: var(--surface); border-color: var(--border); }
        .asset-row img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .asset-meta h4 { font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; }
        .asset-meta p { font-size: 0.6rem; color: var(--muted); }

        .main-col { padding: 40px; }
        .main-col h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 20px; }
        .chart-box { flex: 1; background: var(--surface); border-radius: 30px; border: 1px solid var(--border); height: calc(100% - 100px); }

        .trade-col { padding: 40px; background: #fff; }
        .input-wrap { background: var(--surface); border: 2px solid var(--border); padding: 25px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .input-wrap.active { border-color: var(--accent); background: #fff; box-shadow: 0 10px 30px rgba(123, 53, 212, 0.05); }
        .input-wrap input { background: transparent; border: none; outline: none; font-size: 1.5rem; font-weight: 900; width: 60%; color: var(--text); }
        .input-wrap img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        .btn-execute { width: 100%; background: #000; color: #fff; border: none; padding: 25px; border-radius: 100px; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        
        /* FOOTER DESTRUCTION */
        footer, .bottom-bar, nav, [class*="nav"], [id*="nav"], [class*="footer"], [id*="footer"] { display: none !important; height: 0 !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo"><img src="../assets/muze_icon_logo.png"></div>
            <div style="font-size: 0.5rem; font-weight: 900; background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 20px;">SOVEREIGN v2.2</div>
        </header>

        <div class="terminal">
            <div class="col" style="padding: 30px;">
                <span class="label">Sovereign Assets</span>
                
                <div class="asset-row" onclick="applyAsset('https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/prn.jpg')">
                    <img src="../assets/prn.jpg">
                    <div class="asset-meta"><h4>PRN</h4><p>Priscion Utility</p></div>
                </div>

                <div class="asset-row" onclick="applyAsset('https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/nrl.jpg')">
                    <img src="../assets/nrl.jpg">
                    <div class="asset-meta"><h4>NRL</h4><p>Neural Reserve</p></div>
                </div>

                <div class="asset-row" onclick="applyAsset('https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/atlr.jpg')">
                    <img src="../assets/atlr.jpg">
                    <div class="asset-meta"><h4>ATLR</h4><p>Atelia Gaming</p></div>
                </div>

                <div class="asset-row" onclick="applyAsset('https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/musd.jpg')">
                    <img src="../assets/musd.jpg">
                    <div class="asset-meta"><h4>MUSD</h4><p>Priscion Stable</p></div>
                </div>

                <div class="asset-row" onclick="applyAsset('https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/ada_logo.png')">
                    <img src="../assets/ada_logo.png">
                    <div class="asset-meta"><h4>ADA</h4><p>Cardano</p></div>
                </div>
            </div>

            <div class="col main-col">
                <h2>Momentum</h2>
                <div class="chart-box"><canvas id="viz" style="width:100%; height:100%;"></canvas></div>
            </div>

            <div class="col trade-col">
                <span class="label">Exchange</span>
                
                <div class="input-wrap" id="from-wrap" onclick="focusBox('from')">
                    <input type="number" value="100" id="val-from" onclick="focusBox('from')">
                    <img src="../assets/prn.jpg" id="img-from">
                </div>

                <div style="text-align:center; padding:10px; color:var(--accent); font-size:1.5rem;">↓</div>

                <div class="input-wrap active" id="to-wrap" onclick="focusBox('to')">
                    <input type="number" value="120" id="val-to" onclick="focusBox('to')">
                    <img src="../assets/nrl.jpg" id="img-to">
                </div>

                <button class="btn-execute" onclick="alert('Swap Anchored')">Execute Swap</button>
            </div>
        </div>
    </div>

    <script>
        let currentFocus = 'to';
        function focusBox(side) {
            currentFocus = side;
            document.querySelectorAll('.input-wrap').forEach(el => el.classList.remove('active'));
            document.getElementById(side + '-wrap').classList.add('active');
        }
        function applyAsset(url) {
            console.log('Applying to ' + currentFocus + ': ' + url);
            document.getElementById('img-' + currentFocus).src = url;
        }
        
        // FOOTER REMOVAL SCRIPT
        window.onload = function() {
            document.querySelectorAll('footer, .bottom-bar, nav').forEach(el => el.remove());
        };

        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.onresize = resize; resize();
        let pts = Array.from({length: 40}, (_, i) => ({x: i * (canvas.width/40), y: canvas.height/2}));
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#7B35D4'; ctx.lineWidth = 4; ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for(let i=1; i<pts.length; i++) {
                ctx.lineTo(pts[i].x, pts[i].y);
                pts[i].y += (Math.random() - 0.5) * 10;
                if(pts[i].y < 50) pts[i].y = 50;
                if(pts[i].y > canvas.height - 50) pts[i].y = canvas.height - 50;
            }
            ctx.stroke(); requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
