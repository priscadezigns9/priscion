<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHILLATA | Execute Chillata Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --text: #FFFFFF;
            --muted: #888888;
            --accent: #7B35D4;
            --gold: #D4AF37;
            --border: rgba(255,255,255,0.1);
            --surface: #111111;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-heading: 'Playfair Display', serif;
            --green: #00ff41;
            --red: #ff3131;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-main); overflow: hidden; 
        }

        .app { height: 100%; display: grid; grid-template-rows: auto 1fr auto; }

        header {
            padding: 12px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo img { height: 40px; border-radius: 50%; border: 1px solid var(--accent); }
        .ticker-tape {
            font-size: 0.65rem;
            font-weight: 800;
            display: flex;
            gap: 25px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .up { color: var(--green); }
        .down { color: var(--red); }

        .terminal {
            display: grid;
            grid-template-columns: 240px 1fr 300px;
            gap: 1px;
            background: var(--border);
            overflow: hidden;
        }

        .col { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }

        .chart-header { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
        .chart-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; }
        .price-now { font-size: 1.4rem; font-weight: 900; font-family: monospace; }

        .chart-container { flex: 1; position: relative; background: #000; padding: 10px; }
        canvas { width: 100%; height: 100%; }

        .trade-col { padding: 20px; background: var(--surface); }
        .input-wrap { background: #000; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 15px; }
        .input-wrap input { flex: 1; border: none; background: transparent; font-size: 1.1rem; font-weight: 700; outline: none; color: #fff; }
        .input-wrap img { width: 24px; height: 24px; border-radius: 50%; margin-left: 10px; }

        .btn-confirm {
            width: 100%; padding: 20px; border-radius: 12px; border: none; font-weight: 900; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; background: var(--accent); color: white;
        }

        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
        }
        .nav-link { 
            font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; 
            color: var(--muted); text-decoration: none;
        }
        .nav-link.active { color: var(--accent); }

    </style>
</head>
<body>

    <div class="app">
        <header>
            <div class="logo"><img src="https://drive.google.com/uc?export=view&id=1D4We-G4I_M3cjBKyPHbVTa9W5abinD8v"></div>
            <div class="ticker-tape">
                <span>PRN/MUSD: <b class="up">1.0245 +12%</b></span>
                <span>ATLR/PRN: <b class="down">0.0450 -2%</b></span>
            </div>
            <div style="font-size:0.6rem; font-weight:900; background:var(--accent); color:#fff; padding:4px 12px; border-radius:30px;">$PRISCA.PRN</div>
        </header>

        <div class="terminal">
            <div class="col" style="padding:20px; border-right:1px solid var(--border);">
                <h3 style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;">Asset List</h3>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; display:flex; align-items:center; gap:12px;">
                        <img src="https://priscion.com/assets/prn.jpg" style="width:24px; border-radius:50%;">
                        <div><div style="font-weight:800; font-size:0.75rem;">$PRN</div><div style="font-size:0.6rem; color:var(--muted);">$1.02</div></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; display:flex; align-items:center; gap:12px;">
                        <img src="https://drive.google.com/uc?export=view&id=1RJfigGY8p5kg0-4WV8_DExrDd4Hj2mtz" style="width:24px; border-radius:50%;">
                        <div><div style="font-weight:800; font-size:0.75rem;">$MUSD</div><div style="font-size:0.6rem; color:var(--muted);">$1.00</div></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; display:flex; align-items:center; gap:12px;">
                        <img src="https://priscion.com/assets/atlr.jpg" style="width:24px; border-radius:50%;">
                        <div><div style="font-weight:800; font-size:0.75rem;">$ATLR</div><div style="font-size:0.6rem; color:var(--muted);">$0.04</div></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; display:flex; align-items:center; gap:12px;">
                        <img src="https://priscion.com/assets/jlo.jpg" style="width:24px; border-radius:50%;">
                        <div><div style="font-weight:800; font-size:0.75rem;">$JLO</div><div style="font-size:0.6rem; color:var(--muted);">$1.00</div></div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="chart-header">
                    <div class="chart-title">Chillata Momentum</div>
                    <div class="price-now">1.0245 <span style="font-size:0.8rem; color:var(--green);">+12.4%</span></div>
                </div>
                <div class="chart-container"><canvas id="marketChart"></canvas></div>
            </div>

            <div class="col trade-col">
                <h3 style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;">Exchange</h3>
                <div class="input-wrap">
                    <input type="text" value="100.00">
                    <img src="https://priscion.com/assets/prn.jpg">
                </div>
                <div style="text-align:center; margin-bottom:15px; color:var(--accent);">⬇</div>
                <div class="input-wrap">
                    <input type="text" value="102.45" readonly>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:800; font-size:0.8rem;">$JLO</span>
                        <img src="https://priscion.com/assets/jlo.jpg" style="width:24px; border-radius:50%;">
                    </div>
                </div>
                <button class="btn-confirm" onclick="alert('Anchoring Transaction to Ledger...')">Execute Chillata Swap</button>
            </div>
        </div>

        <footer>
            <a href="exchange.html" class="nav-link active">Exchange</a>
            <a href="vault.html" class="nav-link">Vault</a>
            <a href="auth.html" class="nav-link">Identity</a>
            <a href="../index.html" class="nav-link">Hub</a>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('marketChart');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.onresize = resize; resize();

        let points = Array.from({length: 50}, (_, i) => ({x: i * (canvas.width/50), y: canvas.height/2}));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#7B35D4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
                points[i].y += (Math.random() - 0.5) * 5;
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
