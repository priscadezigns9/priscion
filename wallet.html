<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSE | Sovereign Wallet</title>
    <script src="wallet-core.js"></script>
    <style>
        body { margin: 0; background: #0b0b0e; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #151519; border-right: 1px solid #2d2d35; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .logo-container { margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .logo-container img { width: 40px; }
        .logo-container span { font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; }
        .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; color: #9a9a9a; }
        .nav-item:hover { background: #23232b; color: #fff; }
        .nav-item.active { background: #3b3b45; color: #fff; }
        .card { background: #1c1c21; border: 1px solid #2d2d35; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .balance-huge { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .btn { background: #fff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .asset-list { margin-top: 20px; }
        .asset-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #2d2d35; }
    </style>
</head>
<body onload="playStartupAnimation()">
    <div class="sidebar">
        <div class="logo-container">
            <img src="assets/muse_icon.png" alt="MUSE">
            <span>MUSE</span>
        </div>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item">Assets</div>
        <div class="nav-item">NFT Gallery</div>
        <div class="nav-item" onclick="location.href='swap.html'">Swap (Chillata)</div>
        <div class="nav-item">Settings</div>
        <div style="flex: 1;"></div>
        <div class="nav-item" style="color: #ff4d4d;" onclick="location.href='index.html'">Disconnect</div>
    </div>
    <div class="main">
        <h1>Dashboard</h1>
        <div class="card">
            <div style="color: #9a9a9a; font-size: 0.9rem;">Total Balance</div>
            <div class="balance-huge">6,450.00 <span style="font-size: 1.5rem; color: #9a9a9a;">$PRN</span></div>
            <div style="display: flex; gap: 12px;">
                <button class="btn">Send</button>
                <button class="btn" style="background: transparent; color: #fff; border: 1px solid #444;">Receive</button>
            </div>
        </div>
        
        <h2>My Assets</h2>
        <div class="card asset-list" id="assets">
            <div class="asset-row">
                <div>$PRN (Priscion Native)</div>
                <div>6,450.00</div>
            </div>
            <div class="asset-row">
                <div>$MUSD (Sovereign Stable)</div>
                <div>250.00</div>
            </div>
            <div class="asset-row">
                <div>$ATLR (Atelia Gaming)</div>
                <div>1,200.00</div>
            </div>
        </div>
    </div>
</body>
</html>
