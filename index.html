<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procyon | The Rubik's Globe</title>
    <!-- GDrive Direct Link Proxy -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes globePulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px var(--purple); } 50% { transform: scale(1.1); box-shadow: 0 0 25px var(--purple); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px var(--purple); } 50% { transform: scale(1.1); box-shadow: 0 0 25px var(--purple); } }
        :root {
            --ivory: #FFFFF0;
            --lilac: #C8A2C8;
            --purple: #301934;
            --text: #1a1a1a;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --accent: #14B8A6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--ivory); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }

        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .logo-container {
            display: flex; align-items: center; gap: 15px;
        }

        .logo-img {
            width: 50px; height: 50px;
            object-fit: contain;
            mix-blend-mode: multiply; filter: contrast(120%) brightness(110%);
            border-radius: 50%;
        }

        .logo { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--purple);
            text-transform: lowercase;
        }

        main {
            text-align: left;
            pointer-events: auto;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-visual-container {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .dynamic-brand-logo {
            width: 280px;
            height: 280px;
            object-fit: contain;
            
            filter: drop-shadow(0 15px 35px rgba(48, 25, 52, 0.2));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 20px;
        }

        .brand-text-content {
            display: flex;
            flex-direction: column;
        }

        .brand-label {
            font-weight: 900; font-size: 0.75rem;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--lilac);
            margin-bottom: 12px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 0.9;
            color: var(--purple);
            letter-spacing: -3px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .brand-description {
            font-size: 1rem;
            color: var(--text);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
        }

        .price-tag {
            font-family: var(--font-body);
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--purple);
            margin-bottom: 20px;
            display: block;
        }

        .view-cta {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            transition: all 0.3s ease;
            width: fit-content;
            text-transform: uppercase;
            cursor: pointer;
            background: transparent;
        }

        .view-cta:hover {
            background: var(--purple);
            color: var(--ivory);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(48, 25, 52, 0.2);
        }

        footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .footer-info { 
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.1rem; 
            color: var(--lilac);
            max-width: 400px;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        
        #scroll-indicator {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            align-items: flex-end;
            pointer-events: auto;
        }

        .dot-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.3;
            group: dot;
        }

        .dot-wrapper:hover, .dot-wrapper.active {
            opacity: 1;
        }

        .dot-label {
            font-size: 0.55rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--lilac);
            transition: 0.3s;
            transform: translateX(10px);
            opacity: 0;
            white-space: nowrap;
        }

        .dot-wrapper:hover .dot-label, .dot-wrapper.active .dot-label {
            opacity: 1;
            transform: translateX(0);
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--lilac);
            transition: 0.3s;
        }

        .dot-wrapper.active .dot {
            background: var(--purple);
            box-shadow: 0 0 15px var(--purple);
            transform: scale(1.3);
        }


        /* MODAL STYLES */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(48, 25, 52, 0.95);
            z-index: 100;
            display: none;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(10px);
        }

        #modal-content {
            background: var(--ivory);
            padding: 60px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .modal-active #modal-overlay { display: flex; opacity: 1; }
        .modal-active #modal-content { transform: translateY(0); }

        .close-modal {
            position: absolute; top: 20px; right: 20px;
            font-size: 2rem; color: var(--purple);
            cursor: pointer; font-weight: 300;
        }

        #lead-form { display: flex; flex-direction: column; gap: 20px; }
        .form-field { display: flex; flex-direction: column; gap: 8px; }
        .form-field label { font-weight: 900; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--lilac); }
        .form-field input, .form-field select {
            padding: 15px; border: 1px solid rgba(48, 25, 52, 0.1);
            background: #fff; font-family: var(--font-body);
            font-size: 1rem; border-radius: 8px;
        }

        #submit-btn {
            background: var(--purple); color: #fff;
            padding: 18px; border: none; border-radius: 100px;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        #submit-btn:disabled { background: var(--lilac); cursor: not-allowed; }

        #form-msg { text-align: center; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; margin-top: 15px; }

        #bg-logo-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: url("assets/background_logo.jpg") no-repeat center;
            background-size: contain;
            opacity: 0.03; mix-blend-mode: multiply; filter: contrast(120%) brightness(110%);
            z-index: -1;
            pointer-events: none;
        }
    
        #package-scroll-section {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 240, 0.95);
            border-top: 1px solid var(--lilac);
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #package-scroll-section.active {
            bottom: 0;
        }
        .scroller-container {
            width: 90%;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px;
            scrollbar-width: none;
        }
        .scroller-container::-webkit-scrollbar { display: none; }
        .pkg-card {
            flex: 0 0 200px;
            background: #fff;
            border: 1px solid var(--lilac);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .pkg-card:hover { border-color: var(--purple); transform: translateY(-5px); }
        .pkg-card h4 { font-size: 0.7rem; letter-spacing: 2px; color: var(--purple); margin-bottom: 8px; }
        .pkg-card .price { font-size: 1rem; font-weight: 900; }
        .close-scroller { position: absolute; top: 10px; right: 20px; cursor: pointer; font-weight: 900; font-size: 1.2rem; }

    </style>
</head>
<body>

    <div id="package-scroll-section">
        <span class="close-scroller" onclick="toggleScroller(false)">&times;</span>
        <h3 style="font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px; color: var(--purple);">Available Packages</h3>
        <div class="scroller-container" id="scroller-items"></div>
    </div>

    <div id="bg-logo-overlay"></div>

    <div id="ui-layer">
        <header>
            <div class="top-globe-container" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100;"><div class="small-globe" style="width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, var(--lilac), var(--purple)); border-radius: 50%; opacity: 0.8; box-shadow: 0 0 15px var(--purple); animation: pulse 3s infinite ease-in-out;"></div></div>
            <div class="logo-container">
                <img src="https://share.zapia.com/pymd7sa9f66vcqn2xl5lwq" alt="Procyon" class="logo-img">
                <div class="logo">procyon.</div>
            </div>
            <div style="font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; color: var(--purple);">EMPIRE V.2.3</div>
        </header>

        <main>
            <div class="brand-visual-container">
                <img id="dynamic-logo" src="" alt="Brand Logo" class="dynamic-brand-logo">
                <div class="brand-text-content">
                    <div class="brand-label" id="current-sector">SYSTEM ENTRY</div>
                    <h1 id="current-brand">BRAND SCAN</h1>
                    <div class="brand-description" id="current-desc"></div>
                    <div class="price-tag" id="current-price"></div>
                    <button id="main-cta" class="view-cta">ENTER DOMAIN</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-info">
                Architecting Private Digital Networks for the Sovereign Individual.
            </div>
            <div id="interaction-guide" style="font-size: 0.6rem; letter-spacing: 3px; color: var(--lilac); font-weight: 900;">
                SCROLL TO NAVIGATE SLICES
            </div>
        </footer>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            
            
                <h2 id="modal-title" style="font-family: var(--font-heading); color: var(--purple); margin-bottom: 10px;">Secure Your Slot</h2>
                <div id="pkg-checklist" style="margin-bottom: 25px; padding: 15px; background: rgba(48, 25, 52, 0.05); border-radius: 8px; display: none; text-align: left;">
                    <h4 style="font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--purple); margin-bottom: 10px; border-bottom: 1px solid rgba(48, 25, 52, 0.1); padding-bottom: 5px;">Includes:</h4>
                    <ul id="checklist-items" style="list-style: none; font-size: 0.8rem; color: #555; display: grid; gap: 8px;"></ul>
                </div>
                <form id="lead-form">
                    <div class="form-field">
                        <label>Full Name</label>
                        <input type="text" id="user-name" placeholder="E.g. Satoshi Nakamoto" required>
                    </div>
                    <div class="form-field">
                        <label>Contact Signal (Email)</label>
                        <input type="email" id="user-email" placeholder="email@nexus.com" required>
                    </div>
                    <div class="form-field">
                        <label>Selected Target</label>
                        <input type="text" id="target-package" readonly>
                    </div>
                    <button type="submit" id="submit-btn">INITIATE CONNECTION</button>
                </form>
            <div id="form-msg"></div>
        </div>
    </div>

    <div id="scroll-indicator"></div>
    <div id="canvas-container"></div>

    <script>
        
        const packageData = [
            { 
                name: "STARTER PKG", 
                price: "$297", 
                checklist: ["Domain Registration", "Brand Logo & Favicon", "Social Cover Image", "Web App (PWA) Setup", "1-Page High-Fidelity Website", "Mobile-First Optimization", "Technical SEO Architecture", "1 Month Free Maintenance"] 
            },
            { 
                name: "GROWTH PKG", 
                price: "$597", 
                checklist: ["Domain to Logo/Favicon", "Cover Photo", "Web App", "Multi-Page Site (2-3 Pages)", "Social Media Management (1 Page)", "Social Links Integration", "SEO Architecture", "1 Month Free Maintenance"] 
            },
            { 
                name: "TRUSTED PKG", 
                price: "$1,200", 
                checklist: ["Package 1 & 2 Features", "Multi-Page Site (10-20 Pages)", "Full Brand Automation", "1 Month Free Maintenance", "Advanced SEO Architecture"] 
            },
            { 
                name: "E-COMM STARTER", 
                price: "$497", 
                checklist: ["Package 1 Specs", "Integrated Shop Architecture", "Payment Gateway Setup", "Inventory Management Logic"] 
            },
            { 
                name: "E-COMM GROWTH", 
                price: "$897", 
                checklist: ["Package 2 Specs", "Advanced Shop Architecture", "Customer Account Logic", "Automated Checkout Flow"] 
            },
            { 
                name: "E-COMM TRUSTED", 
                price: "$1,800", 
                checklist: ["Package 3 Specs", "Unlimited Item Inventory", "Multi-Currency Settlement", "Elite Commerce Intelligence"] 
            },
            { 
                name: "MAINTENANCE", 
                price: "$97/mo", 
                checklist: ["Security Monitoring", "Uptime Optimization", "Monthly Content Updates", "Technical Support"] 
            }
        ];

        function openLeadModal(pkgName) {
            const pkg = packageData.find(p => p.name === pkgName) || brands.find(b => b.name === pkgName);
            document.getElementById('target-package').value = pkgName;
            document.getElementById('modal-title').innerText = "Activate " + pkgName;
            
            const list = document.getElementById('checklist-items');
            const checklistContainer = document.getElementById('pkg-checklist');
            list.innerHTML = "";
            
            if (pkg && pkg.checklist) {
                pkg.checklist.forEach(item => {
                    const li = document.createElement('li');
                    li.style.display = "flex";
                    li.style.alignItems = "center";
                    li.style.gap = "10px";
                    li.innerHTML = '<span style="color: var(--purple); font-weight: 900;">✓</span> ' + item;
                    list.appendChild(li);
                });
                checklistContainer.style.display = "block";
            } else {
                checklistContainer.style.display = "none";
            }
            
            document.body.classList.add('modal-active');
        }

        // SUPABASE INIT
        const SB_URL = "https://sktpjacowqaedddtrhuz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const globeGeo = new THREE.IcosahedronGeometry(2.8, 3);
        const globeMat = new THREE.MeshPhongMaterial({ 
            color: 0xC8A2C8, 
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        camera.position.z = 6.5;

        
        const brands = [
            { name: "BRAND SCAN", sector: "SYSTEM ENTRY", logo: "", desc: "Real-time diagnostic analysis of digital identity and brand footprint.", url: "scan/", type: "external" },
            { name: "PACKAGES", sector: "SYSTEM HUB", logo: "", desc: "Explore our high-fidelity service tiers and brand packages.", type: "action" },
            { name: "SHARE TO EARN", sector: "PROTOCOL", logo: "", desc: "Invite others to the network and earn $PRN for every successful migration.", url: "share-to-earn.html", type: "external" },
            { name: "PROCYON", sector: "CORE NETWORK", logo: "", desc: "The high-fidelity migration hub for the Digital Evolution.", url: "https://procyon.com", type: "external" },
            { name: "THE BLOG", sector: "INTELLIGENCE", logo: "", desc: "Deep-dives into product news and digital agency evolution.", url: "blog.html", type: "external" }
        ];


        
        function rotateSlices(dir) {
            if (isAnimating) return;
            isAnimating = true;
            const direction = dir === 'next' ? 1 : -1;
            currentIndex = (currentIndex + direction + brands.length) % brands.length;
            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 2.5 * direction), 
                duration: 1.5, 
                ease: "expo.out",
                onComplete: () => { isAnimating = false; }
            });
            updateUI(currentIndex); toggleScroller(false);
        }

        function jumpTo(index) {
            if (isAnimating || index === currentIndex) return;
            const diff = index - currentIndex;
            isAnimating = true;
            currentIndex = index;
            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 2.5 * diff), 
                duration: 1.5, 
                ease: "expo.out",
                onComplete: () => { isAnimating = false; }
            });
            updateUI(currentIndex); toggleScroller(false);
        }

        const dotsContainer = document.getElementById('scroll-indicator');
        brands.forEach((brand, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'dot-wrapper' + (i === 0 ? ' active' : '');
            wrapper.onclick = () => jumpTo(i);
            
            const label = document.createElement('span');
            label.className = 'dot-label';
            label.innerText = brand.name;
            
            const dot = document.createElement('div');
            dot.className = 'dot';
            
            wrapper.appendChild(label);
            wrapper.appendChild(dot);
            dotsContainer.appendChild(wrapper);
        });


        let currentIndex = 0;
        let isAnimating = false;

        function updateUI(index) {
            const brand = brands[index];
            
            gsap.to(".brand-visual-container", { opacity: 0, y: 30, duration: 0.3, onComplete: () => {
                document.getElementById('current-brand').innerText = brand.name;
                document.getElementById('current-sector').innerText = brand.sector;
                document.getElementById('current-desc').innerText = brand.desc;
                document.getElementById('current-price').innerText = brand.price || "";
                
                const cta = document.getElementById('main-cta');
                if (brand.type === "lead") {
                    cta.innerText = "GET STARTED";
                    cta.onclick = () => openLeadModal(brand.name);
                } else {
                    cta.innerText = "ENTER DOMAIN";
                    cta.onclick = () => window.open(brand.url, '_blank');
                }

                const logoImg = document.getElementById('dynamic-logo');
                logoImg.style.display = brand.logo ? "block" : "none"; logoImg.src = brand.logo;
                
                const dots = document.querySelectorAll('.dot-wrapper');
                dots.forEach((dot, i) => dot.classList.toggle('active', i === index));

                gsap.to(".brand-visual-container", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
            }});
        }

        // MODAL LOGIC
        const modal = document.body;
        
        );
                checklistContainer.style.display = "block";
            } else {
                checklistContainer.style.display = "none";
            }
            
            modal.classList.add('modal-active');
        }

        document.getElementById('close-modal').onclick = () => modal.classList.remove('modal-active');
        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') modal.classList.remove('modal-active');
        };

        const leadForm = document.getElementById('lead-form');
        const submitBtn = document.getElementById('submit-btn');
        const formMsg = document.getElementById('form-msg');

        leadForm.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "SYNCHRONIZING...";
            
            const data = {
                name: document.getElementById('user-name').value,
                email: document.getElementById('user-email').value,
                package: document.getElementById('target-package').value,
                brand: "Procyon",
                created_at: new Date().toISOString()
            };

            const { error } = await supabaseClient.from('client_leads').insert([data]);

            if (error) {
                formMsg.style.color = "#EF4444";
                formMsg.innerText = "ERROR: UPLINK FAILED. TRY AGAIN.";
                submitBtn.disabled = false;
                submitBtn.innerText = "RETRY INITIATION";
            } else {
                formMsg.style.color = "var(--accent)";
                formMsg.innerText = "NODE ACTIVATED. WE WILL CONTACT YOU SHORTLY.";
                submitBtn.innerText = "CONNECTION SECURED";
                leadForm.reset();
                setTimeout(() => modal.classList.remove('modal-active'), 2000);
            }
        };

        
        // GLOBE DRAG/SWIPE SCROLL LOGIC
        let isDragging = false;
        let startX = 0;
        window.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging || isAnimating) return;
            const dx = e.clientX - startX;
            if (Math.abs(dx) > 50) {
                if (dx > 0) rotateSlices('prev');
                else rotateSlices('next');
                startX = e.clientX;
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        
        window.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        window.addEventListener('touchmove', (e) => {
            if (isAnimating) return;
            const dx = e.touches[0].clientX - startX;
            if (Math.abs(dx) > 50) {
                if (dx > 0) rotateSlices('prev');
                else rotateSlices('next');
                startX = e.touches[0].clientX;
            }
        }, {passive: true});

        
        window.addEventListener('wheel', (e) => {
            if (isAnimating || modal.classList.contains('modal-active')) return;
            rotateSlices(e.deltaY > 0 ? 'next' : 'prev');
        }, { passive: true });


        
        function toggleScroller(show) {
            document.getElementById('package-scroll-section').classList.toggle('active', show);
        }

        const scrollerItems = document.getElementById('scroller-items');
        packageData.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'pkg-card';
            card.onclick = () => openLeadModal(pkg.name);
            card.innerHTML = `<h4>${pkg.name}</h4><div class="price">${pkg.price}</div>`;
            scrollerItems.appendChild(card);
        });

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.0015;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI(0);
    </script>
</body>
</html>
