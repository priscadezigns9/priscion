<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>MUSE | My Digital Home</title>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 280px; border-right: 1px solid #eee; padding: 30px; display: flex; flex-direction: column; background: #fafafa; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .nav-item { padding: 15px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; color: #666; font-weight: 600; }
        .nav-item.active { background: #eee; color: #000; }
        .profile { margin-top: auto; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; padding: 15px; border-radius: 16px; background: #fff; }
        .profile img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .card { border: 1px solid #eee; border-radius: 24px; padding: 40px; margin-bottom: 30px; background: #fff; }
        .balance { font-size: 3.5rem; font-weight: 900; margin: 15px 0; letter-spacing: -2px; color: #000; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class='sidebar'>
        <img src='assets/muse_icon.png' style='width: 40px; margin-bottom: 50px;'>
        <div class='nav-item active'>My Coins</div>
        <div class='nav-item' onclick='location.href="pulse.html"'>Network Pulse</div>
        <div class='profile' onclick='document.getElementById("p-upload").click()'>
            <img src='https://ui-avatars.com/api/?name=Prisca&background=random' id='p-img'>
            <div>
                <div style='font-weight: 900; font-size: 0.9rem;'>Prisca</div>
                <div style='font-size: 0.7rem; color: #999;'>Update Picture</div>
            </div>
            <input type='file' id='p-upload' style='display:none;' onchange='updateProfile(this)'>
        </div>
    </div>
    <div class='main'>
        <h1>My Wallet</h1>
        <div class='card'>
            <div style='text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: 900; color: #999;'>Current Balance</div>
            <div class='balance'>6,450.00 <span style='font-size: 1.2rem; color: #ccc;'></span></div>
            <button class='btn'>Send Coins</button>
        </div>
    </div>
    <script>
        function updateProfile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById("p-img").src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
