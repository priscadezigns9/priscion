<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSE | My Digital Home</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .full-view { width: 100%; max-width: 800px; padding: 60px; }
        .wallet-tabs { display: flex; gap: 40px; border-bottom: 1px solid #EEE; margin: 40px 0; }
        .tab { padding: 15px 0; color: #999; cursor: pointer; font-weight: 600; font-size: 1.1rem; }
        .tab.active { color: #000; border-bottom: 3px solid #000; }
        .balance-card { background: #FAFAFA; border: 1px solid #EEE; border-radius: 30px; padding: 60px; text-align: center; }
        .balance { font-size: 4rem; font-weight: 900; letter-spacing: -2px; }
        .profile-area { position: fixed; bottom: 40px; right: 40px; display: flex; align-items: center; gap: 15px; background: #FFF; padding: 15px; border-radius: 20px; border: 1px solid #EEE; cursor: pointer; }
        .profile-area img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="full-view">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:60px;">
            <img src="assets/muse_icon.png" style="width: 50px;">
            <h1 style="font-weight:900; margin:0;">MUSE WALLET</h1>
        </div>

        <div class="wallet-tabs">
            <div class="tab active">Coins</div>
            <div class="tab">Things (NFTs)</div>
            <div class="tab" onclick="location.href='swap.html'">Trade (Chillata)</div>
            <div class="tab" onclick="location.href='pulse.html'">Network Heartbeat</div>
        </div>

        <div class="balance-card">
            <small style="text-transform:uppercase; letter-spacing:2px; font-weight:900; color:#999;">Available $PRN</small>
            <div id="bal" class="balance">6,450.00</div>
            
            <div style="margin-top:40px; display:flex; gap:20px; justify-content:center;">
                <button onclick="openSend()" style="padding:18px 45px; border-radius:100px; background:#000; color:#fff; border:none; font-weight:900; cursor:pointer;">SEND COINS</button>
                <button style="padding:18px 45px; border-radius:100px; background:none; border:2px solid #000; color:#000; font-weight:900; cursor:pointer;">RECEIVE</button>
            </div>
        </div>

        <!-- Real Handle Logic -->
        <div style="margin-top:50px;">
            <h3>My Handles</h3>
            <div style="display:flex; align-items:center; gap:10px; background:#F9F9F9; padding:15px 25px; border-radius:15px; width:fit-content;">
                <img src="assets/priscion_logo.png" style="width:20px;">
                <span style="font-weight:900;">.pri/prisca</span>
            </div>
        </div>
    </div>

    <div class="profile-area" onclick="document.getElementById('up').click()">
        <img src="https://ui-avatars.com/api/?name=Prisca&background=7B35D4&color=fff" id="pimg">
        <div>
            <div style="font-weight:900;">Prisca</div>
            <div style="font-size:0.7rem; color:#999;">Change Picture</div>
        </div>
        <input type="file" id="up" style="display:none;" onchange="update(this)">
    </div>

    <script src="wallet-core.js"></script>
    <script>
        document.getElementById('bal').innerText = PRN.state.balance.toFixed(2);
        function update(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('pimg').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
        function openSend() {
            const amount = prompt("Amount to send:");
            const to = prompt("Recipient (.pri/name):");
            if(PRN.sendCoins(to, amount)) {
                alert("Anchored!");
                location.reload();
            }
        }
    </script>
</body>
</html>
