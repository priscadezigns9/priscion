<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSE | Sovereign Wallet</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; --accent: #7B35D4; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #splash { position: fixed; inset: 0; background: #FFF; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #splash.fade { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .splash-logo { width: 120px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        #auth-gate { position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #FFF; border: 1px solid var(--border); padding: 60px; border-radius: 40px; text-align: center; max-width: 480px; width: 90%; box-shadow: 0 40px 100px rgba(0,0,0,0.1); }
        
        .sidebar-nav { width: 320px; border-right: 1px solid var(--border); background: #FAFAFA; display: flex; flex-direction: column; padding: 40px 0; }
        .nav-item { padding: 20px 40px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #F0F0F0; }
        .nav-icon { width: 20px; height: 20px; object-fit: contain; }
        
        .main-stage { flex: 1; padding: 80px; overflow-y: auto; }
        .card { border: 1px solid var(--border); border-radius: 40px; padding: 60px; margin-bottom: 40px; background: #FFF; transition: 0.3s; position: relative; }
        .balance-big { font-size: 5rem; font-weight: 900; letter-spacing: -3px; margin: 20px 0; }
        
        .profile-footer { margin-top: auto; padding: 40px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .profile-footer img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        
        .btn-black { background: #000; color: #fff; border: none; padding: 20px 50px; border-radius: 100px; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-black:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; outline: none; font-family: inherit; font-weight: 600; }
        
        /* Messenger Styles */
        .msg-container { height: 400px; display: flex; flex-direction: column; }
        .msg-list { flex: 1; overflow-y: auto; padding: 20px; background: #F9F9F9; border-radius: 20px; margin-bottom: 20px; }
        .msg-input-area { display: flex; gap: 15px; align-items: center; }
        .icon-btn { cursor: pointer; opacity: 0.5; transition: 0.3s; width: 24px; }
        .icon-btn:hover { opacity: 1; }

        /* Dapp Grid */
        .dapp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .dapp-item { padding: 30px; border: 1px solid var(--border); border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .dapp-item:hover { border-color: var(--accent); background: var(--surface); }
        .dapp-logo-small { width: 40px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="assets/muse_logo.png" class="splash-logo">
    </div>

    <div id="auth-gate" style="display:none;">
        <div class="auth-card">
            <img src="assets/muse_logo.png" style="width:60px; margin-bottom:30px;">
            <h2 id="auth-title" style="font-weight:900; margin-bottom:10px;">Security Lock</h2>
            <p id="auth-desc" style="color:#999; margin-bottom:40px;">Enter your sovereign password to unlock your vault.</p>
            <div id="auth-form">
                <input type="password" id="auth-pass" placeholder="Password">
                <button class="btn-black" onclick="unlock()" style="width:100%;">UNLOCK VAULT</button>
            </div>
            <div id="new-auth" style="display:none;">
                <button class="btn-black" onclick="createNew()" style="width:100%; margin-bottom:15px;">CREATE NEW WALLET</button>
                <button class="btn-black" style="width:100%; background:#FFF; color:#000; border:1px solid #EEE;">RECOVER WALLET</button>
                <button class="btn-black" style="width:100%; background:#FFF; color:#000; border:1px solid #EEE; margin-top:15px;">CONNECT LEDGER</button>
            </div>
        </div>
    </div>

    <div class="sidebar-nav">
        <div style="padding: 0 40px 60px;"><img src="assets/muse_logo.png" style="width: 50px;"></div>
        <div class="nav-item active" onclick="show('vault')">Vault</div>
        <div class="nav-item" onclick="show('swap')">
            <img src="assets/chillata_logo.png" class="nav-icon"> Chillata
        </div>
        <div class="nav-item" onclick="show('send')">Send</div>
        <div class="nav-item" onclick="show('receive')">Receive</div>
        <div class="nav-item" onclick="show('dapps')">Dapps</div>
        <div class="nav-item" onclick="show('lynx')">
            <img src="assets/lynx_logo.png" class="nav-icon"> Lynx
        </div>
        
        <div class="profile-footer">
            <img src="assets/p-logo.png" id="p-img" onclick="document.getElementById('p-up').click()">
            <div>
                <div style="font-weight:900;" id="p-handle" onclick="addWallet()">$prisca.pri</div>
                <div style="font-size:0.6rem; color:#999; letter-spacing:1px; text-transform:uppercase; font-weight:900;">Manage Node</div>
            </div>
            <input type="file" id="p-up" style="display:none;" onchange="updateProfilePic(this)">
        </div>
    </div>

    <div class="main-stage" id="stage"></div>

    <script src="wallet-core.js"></script>
    <script>
        let currentTab = 'vault';
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('fade');
                checkAuth();
            }, 2000);
        };

        function checkAuth() {
            const authGate = document.getElementById('auth-gate');
            if(PRN.state.password) {
                authGate.style.display = 'flex';
            } else {
                document.getElementById('auth-title').innerText = "Begin Sovereignty";
                document.getElementById('auth-desc').innerText = "No wallet detected. Create or Recover to proceed.";
                document.getElementById('auth-form').style.display = 'none';
                document.getElementById('new-auth').style.display = 'block';
                authGate.style.display = 'flex';
            }
        }

        function unlock() {
            const pass = document.getElementById('auth-pass').value;
            if(PRN.checkPassword(pass)) {
                document.getElementById('auth-gate').style.display = 'none';
                if(action === 'pay') handlePayment();
                else renderView('vault');
            } else {
                alert("Invalid Password.");
            }
        }

        function createNew() {
            const p = prompt("Set your Sovereign Password:");
            if(p) {
                PRN.state.password = p;
                PRN.sync();
                document.getElementById('auth-gate').style.display = 'none';
                if(action === 'pay') handlePayment();
                else renderView('vault');
            }
        }

        function handlePayment() {
            const amount = urlParams.get('amount') || 1500;
            const service = urlParams.get('service') || 'Sovereign Onboarding';
            if(confirm(`Confirm Transaction: $PRN ${amount} for ${service}?`)) {
                if(PRN.sendCoins('PRISCION_LEDGER', amount)) {
                    alert("Transaction Anchored Successfully.");
                    location.href = 'index.html';
                } else {
                    alert("Insufficient Balance.");
                    renderView('vault');
                }
            }
        }

        function show(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderView(tab);
        }

        function renderView(tab) {
            const stage = document.getElementById('stage');
            currentTab = tab;
            if(tab === 'vault') {
                stage.innerHTML = `
                    <h1 style="font-size:3.5rem; font-weight:900; margin-bottom:60px;">Vault.</h1>
                    <div class="card">
                        <div style="font-weight:900; color:#AAA; letter-spacing:4px; text-transform:uppercase; font-size:0.7rem; margin-bottom:20px;">Available Reserve</div>
                        <div class="balance-big">$PRN ${PRN.state.balance.toLocaleString()}</div>
                        <button class="btn-black" onclick="show('send')">SEND ASSETS</button>
                    </div>
                `;
            } else if(tab === 'swap') {
                stage.innerHTML = `
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:60px;">
                        <img src="assets/chillata_logo.png" style="width:60px;">
                        <h1 style="font-size:3.5rem; font-weight:900; margin:0;">Chillata.</h1>
                    </div>
                    <div class="card" style="max-width:500px;">
                        <input type="number" placeholder="From $PRN">
                        <div style="text-align:center; margin:20px 0; font-weight:900;">↓</div>
                        <input type="text" value="$MUSD" readonly>
                        <button class="btn-black" style="width:100%;">EXECUTE SWAP</button>
                    </div>
                `;
            } else if(tab === 'lynx') {
                stage.innerHTML = `
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:60px;">
                        <img src="assets/lynx_logo.png" style="width:60px;">
                        <h1 style="font-size:3.5rem; font-weight:900; margin:0;">Lynx.</h1>
                    </div>
                    <div class="card">
                        <div class="msg-list" id="mlist"></div>
                        <div class="msg-input-area">
                            <label for="f-up"><img src="assets/icons/attach.png" class="icon-btn"></label>
                            <input type="file" id="f-up" style="display:none;">
                            <img src="assets/icons/mic.png" class="icon-btn" onclick="voiceMsg()">
                            <input type="text" id="min" placeholder="Secure message...">
                            <button class="btn-black" style="padding:15px 30px;" onclick="sendMsg()">SEND</button>
                        </div>
                    </div>
                `;
            } else if(tab === 'dapps') {
                stage.innerHTML = `
                    <h1 style="font-size:3.5rem; font-weight:900; margin-bottom:60px;">Dapps.</h1>
                    <div class="dapp-grid">
                        <div class="dapp-item"><img src="assets/mynt_logo.png" class="dapp-logo-small"><h3>MYNT</h3></div>
                        <div class="dapp-item"><img src="assets/atelia.webp" class="dapp-logo-small"><h3>ATELIA</h3></div>
                        <div class="dapp-item"><img src="assets/logos/calalloo.png" class="dapp-logo-small"><h3>CALALLOO</h3></div>
                        <div class="dapp-item"><img src="assets/dreaming_anime.png" class="dapp-logo-small"><h3>DREAMING</h3></div>
                    </div>
                `;
            } else {
                stage.innerHTML = `<h1 style="font-size:3.5rem; font-weight:900; margin-bottom:60px;">${tab.toUpperCase()}.</h1>`;
            }
        }

        function updateProfilePic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    PRN.state.avatar = e.target.result;
                    document.getElementById('p-img').src = e.target.result;
                    PRN.sync();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addWallet() {
            const w = prompt("Enter new wallet address/handle to link:");
            if(w) {
                PRN.state.wallets.push(w);
                PRN.sync();
                alert(`Wallet ${w} linked to node.`);
            }
        }

        function voiceMsg() { alert("Voice recording initialized..."); }
        function sendMsg() { 
            const val = document.getElementById('min').value;
            if(val) {
                const list = document.getElementById('mlist');
                list.innerHTML += `<div style="margin-bottom:10px; text-align:right;"><b>ME:</b> ${val}</div>`;
                document.getElementById('min').value = '';
            }
        }
    </script>
</body>
</html>
