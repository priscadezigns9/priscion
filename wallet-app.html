<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSE</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        body { margin: 0; background: #0A0A0A; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .wallet-nav { padding: 40px; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; gap: 30px; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding: 15px 0; color: #555; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .tab.active { color: #fff; border-bottom: 2px solid #7B35D4; }
        .content { flex: 1; padding: 40px; }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 40px; text-align: center; }
        .bal { font-size: 3rem; font-weight: 900; margin: 20px 0; }
        .btn { width: 100%; padding: 20px; border-radius: 100px; border: none; background: #7B35D4; color: #fff; font-weight: 900; cursor: pointer; margin-top: 20px; }
        .handle-box { background: #161616; padding: 15px 25px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="wallet-nav">
        <img src="assets/muse_icon.png" style="height: 45px;">
    </div>

    <div class="tabs">
        <div class="tab active">Coins</div>
        <div class="tab" onclick="location.href='swap.html'">Trade</div>
        <div class="tab" onclick="location.href='mynt.html'">Things</div>
    </div>

    <div class="content">
        <div class="card">
            <small style="color:#555; text-transform:uppercase; letter-spacing:1px; font-weight:900;">Available Balance</small>
            <div id="bal" class="bal">6,450.00</div>
            <button class="btn" onclick="send()">SEND COINS</button>
        </div>

        <div class="handle-box">
            <img src="assets/priscion_logo.png" style="width:20px;">
            <span style="font-weight:900; color:#fff;">.pri/prisca</span>
        </div>
    </div>

    <script src="wallet-core.js"></script>
    <script>
        document.getElementById('bal').innerText = PRN.state.balance.toFixed(2);
        function send() {
            const a = prompt("Amount:");
            const t = prompt("To (.pri/):");
            if(PRN.sendCoins(t, a)) {
                alert("Anchored!");
                location.reload();
            }
        }
    </script>
</body>
</html>
