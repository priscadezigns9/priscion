<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NURASEN | Sovereign Login</title>
    <link rel="icon" type="image/png" href="../logos/nurasen_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8FAFC;
            --text: #0F172A;
            --muted: #64748B;
            --primary: #0F172A;
            --accent: #F97316; /* VIBRANT ORANGE */
            --border: rgba(15, 23, 42, 0.08);
            --font-header: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at top right, #FFF7ED 0%, #FFFFFF 70%);
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.05);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }

        .logo { margin-bottom: 40px; }
        .logo img { height: 50px; }

        h1 { font-family: var(--font-header); font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: var(--muted); margin-bottom: 40px; font-size: 0.95rem; }

        .input-group { text-align: left; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .input-group input { 
            width: 100%; 
            padding: 18px 25px; 
            border-radius: 12px; 
            border: 1.5px solid var(--border); 
            font-family: inherit; 
            font-size: 1rem; 
            transition: 0.2s;
            background: var(--surface);
        }
        .input-group input:focus { outline: none; border-color: var(--accent); background: white; }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 100px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn:hover { background: #000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .btn-wallet {
            background: white;
            color: var(--primary);
            border: 1.5px solid var(--border);
            box-shadow: none;
        }
        .btn-wallet:hover { background: var(--surface); border-color: var(--primary); color: var(--primary); }

        .divider { display: flex; align-items: center; margin: 30px 0; color: var(--border); }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .divider span { padding: 0 15px; font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

        .footer-links { font-size: 0.85rem; color: var(--muted); margin-top: 40px; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .footer-links a:hover { text-decoration: underline; }

        .god-mode-trigger {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 10px;
            height: 10px;
            cursor: pointer;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <img src="../logos/NURASEN_DEFINITIVE_2026.png" alt="Nurasen">
        </div>
        <h1>Welcome Back.</h1>
        <p>Access your Sentinel Control Center.</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" id="email" required>
            </div>
            <div class="input-group">
                <label onclick="handleHandshake()">Sentinel Password</label>
                <div style="position: relative;">
                    <input type="password" placeholder="••••••••" id="password" required style="width: 100%; padding-right: 45px;">
                    <button type="button" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center;">
                        <i data-lucide="eye" id="eyeIcon" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn">Login to Dashboard</button>
        </form>

        <div class="footer-links">
            New to Nurasen? <a href="signup.html">Create Account</a>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        // Password Visibility Toggle
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        toggleButton.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons(); // Refresh icon
        });

        const supabaseUrl = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const supabaseKey = '{{credential:supabase_anon_key}}';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Login failed: " + error.message);
            } else {
                // Check Subscription Status
                const { data: sub, error: subError } = await supabase
                    .from('subscriptions')
                    .select('*')
                    .eq('user_id', data.user.id)
                    .single();
                
                if (sub) {
                    const now = new Date();
                    const expiry = new Date(sub.expiry_date);
                    if (now > expiry) {
                        // Revert to Freemium in metadata
                        await supabase.from('profiles').update({ tier: 'basic' }).eq('id', data.user.id);
                        localStorage.setItem('nurasen_tier', 'basic');
                    } else {
                        localStorage.setItem('nurasen_tier', 'premium');
                        localStorage.setItem('nurasen_expiry', sub.expiry_date);
                    }
                } else {
                    localStorage.setItem('nurasen_tier', 'basic');
                }
                
                window.location.href = 'dashboard.html';
            }
        }

        let clickCount = 0;
        const stats = [
            { label: "Neural Pattern Detection", value: "Active", icon: "zap" },
            { label: "Deep-Vector Inspection", value: "Enabled", icon: "shield" },
            { label: "Zero-Day Neutralization", value: "On Standby", icon: "activity" }
        ];

        function handleHandshake() {
            window.clickCount = (window.clickCount || 0) + 1;
            console.log("God Mode Click: " + window.clickCount);
            
            if (window.clickCount >= 5) {
                console.log("GOD MODE ACTIVE");
                window.location.href = 'dashboard.html?godmode=true';
                window.clickCount = 0;
            }
            
            clearTimeout(window.clickTimer);
            window.clickTimer = setTimeout(() => {
                window.clickCount = 0;
                console.log("God Mode Reset");
            }, 3000);
        }
    </script>
</body>
</html>
