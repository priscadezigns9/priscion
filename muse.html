<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUSE | Secure Login</title>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; }
        .screen.active { display: flex; }
        .logo-anim { width: 100px; animation: pulse 2s infinite; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        .box { padding: 40px; width: 350px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin: 20px 0; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="splash" class="screen active" onclick="showLogin()">
        <img src="assets/muse_icon.png" class="logo-anim">
        <p>Tap to unlock MUSE</p>
    </div>
    <div id="login" class="screen">
        <div class="box">
            <img src="assets/muse_icon.png" style="width: 60px; margin-bottom: 20px;">
            <h2>Enter Password</h2>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="checkPass()">Unlock</button>
        </div>
    </div>
    <script>
        function showLogin() { 
            document.getElementById('splash').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        }
        function checkPass() {
            location.href = 'wallet-app.html';
        }
    </script>
</body>
</html>
