<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYNX | Sovereign Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F0F9FF;
            --text: #1A1A1A;
            --muted: #64748b;
            --accent: #0ea5e9;
            --muze-blue: #5AC8FA;
            --jlo: #FACC15;
            --surface: #fff;
            --border: rgba(186, 230, 253, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        nav {
            height: 80px; padding: 0 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .logo-box { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
        .logo-box img { width: 35px; }
        .logo-box span { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        .messenger-container {
            flex: 1; display: grid; grid-template-columns: 350px 1fr; overflow: hidden;
        }

        .sidebar {
            background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; }
        
        .add-chat-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
            background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 300; color: var(--muted);
        }
        .add-chat-btn:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); transform: rotate(90deg); }

        .chat-list { flex: 1; overflow-y: auto; }
        .empty-state { padding: 60px 40px; text-align: center; color: var(--muted); font-size: 0.85rem; }

        .main-chat { display: flex; flex-direction: column; background: #fff; position: relative; }
        .chat-header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; min-height: 85px; }
        .user-info h3 { font-size: 1rem; font-weight: 900; }
        .user-info p { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; }

        .messages-area { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #FAFDFF; }
        .welcome-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 20px; color: var(--muted); }
        .welcome-screen svg { width: 60px; color: var(--border); }

        .input-area { padding: 30px 40px; border-top: 1px solid var(--border); background: #fff; display: flex; gap: 20px; }
        input { flex: 1; padding: 15px 25px; border-radius: 100px; border: 1px solid var(--border); outline: none; font-family: inherit; }
        .btn-send { background: #000; color: #fff; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        /* Modal for adding handles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: #fff; width: 90%; max-width: 450px; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); text-align: center;
        }
        .modal h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        .modal p { color: var(--muted); font-size: 0.85rem; margin-bottom: 30px; }
        .handle-input-box { position: relative; margin-bottom: 25px; }
        .handle-input-box input { width: 100%; padding-right: 60px; }
        .handle-input-box span { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); font-weight: 900; color: var(--muze-blue); font-size: 0.8rem; }
        .btn-action { width: 100%; padding: 18px; border-radius: 100px; border: none; background: #000; color: #fff; font-weight: 700; cursor: pointer; }

        .jlo-tag { background: var(--jlo); color: #000; padding: 4px 10px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .messenger-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo-box">
            <img src="../assets/lynx_logo.png" alt="LYNX">
            <span>LYNX Messenger</span>
        </a>
        <div class="jlo-tag">POWERED BY JELLO</div>
    </nav>

    <div class="messenger-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Messages</h2>
                <button class="add-chat-btn" onclick="openModal()">+</button>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="empty-state">
                    No active signals.<br>Start a conversation by handle.
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header" id="active-chat-header" style="display: none;">
                <div class="user-info">
                    <h3 id="active-handle-display">user.pri</h3>
                    <p>ENCRYPTED VIA JELLO</p>
                </div>
            </header>

            <div class="messages-area" id="messages-area">
                <div class="welcome-screen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <p>Select a contact or enter a sovereign handle<br>to initiate an encrypted session.</p>
                </div>
            </div>

            <div class="input-area" id="input-area" style="display: none;">
                <input type="text" placeholder="Type a message...">
                <button class="btn-send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Modal for adding handles -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>New Message</h2>
            <p>Enter a sovereign handle to start an encrypted chat.</p>
            <div class="handle-input-box">
                <input type="text" id="handle-search" placeholder="Enter handle...">
                <span>.pri</span>
            </div>
            <button class="btn-action" onclick="startChat()">Start Conversation</button>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('handle-search').focus();
        }

        function closeModal(e) {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function startChat() {
            const handle = document.getElementById('handle-search').value.trim();
            if(!handle) return;

            const fullHandle = handle.endsWith('.pri') ? handle : handle + '.pri';
            
            // Update UI
            document.getElementById('chat-list').innerHTML = `
                <div class="chat-item" style="padding: 20px 30px; display: flex; align-items: center; gap: 15px; cursor: pointer; background: var(--bg);">
                    <div style="width: 45px; height: 45px; border-radius: 50%; background: var(--muze-blue); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 0.8rem;">${handle.substring(0,2).toUpperCase()}</div>
                    <div>
                        <h4 style="font-size: 0.9rem;">${fullHandle}</h4>
                        <p style="font-size: 0.75rem; color: var(--muted);">Encrypted Signal Active</p>
                    </div>
                </div>
            `;

            document.getElementById('active-handle-display').innerText = fullHandle;
            document.getElementById('active-chat-header').style.display = 'flex';
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('messages-area').innerHTML = `
                <div class="message received" style="max-width: 60%; padding: 15px 20px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; background: #fff; border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 5px;">
                    This is the start of your encrypted conversation with ${fullHandle}.
                </div>
            `;

            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Enter key to start chat
        document.getElementById('handle-search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startChat();
        });
    </script>
</body>
</html>
