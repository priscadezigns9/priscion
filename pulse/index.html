<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE | Procyon Ledger Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --card: #F9F9F9;
            --text: #000000;
            --muted: #888888;
            --accent: #7B35D4;
            --muze-blue: #007AFF;
            --border: #EEEEEE;
            --neon-glow: 0 4px 15px rgba(0, 122, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden;
            background-image: none;
        }

        nav {
            height: 80px; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); background: rgba(255,255,255,0.8);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { height: 32px; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; }

        .dashboard { max-width: 1400px; margin: 40px auto; padding: 0 5%; }
        
        /* Stats Grid */
        .stats-row { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; 
        }
        .stat-card {
            background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px;
            position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: var(--muze-blue);
        }
        .stat-label { font-size: 0.65rem; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: var(--text); }
        .stat-sub { font-size: 0.7rem; color: #28A745; margin-top: 5px; font-weight: 700; }

        /* Main Explorer Stage */
        .explorer-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .feed-container { background: #FFF; border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .feed-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; }
        
        .live-tag { 
            display: flex; align-items: center; gap: 8px; font-size: 0.6rem; font-weight: 900; 
            text-transform: uppercase; color: var(--muze-blue); background: rgba(0,122,255,0.05); 
            padding: 5px 12px; border-radius: 100px; border: 1px solid rgba(0,122,255,0.1);
        }
        .dot { width: 6px; height: 6px; background: var(--muze-blue); border-radius: 50%; }

        .data-row {
            display: flex; align-items: center; justify-content: space-between; padding: 20px 0;
            border-bottom: 1px solid #F5F5F5;
        }
        .data-row:last-child { border: none; }
        
        .data-main { display: flex; align-items: center; gap: 15px; }
        .icon-hex { 
            width: 45px; height: 45px; background: #F9F9F9; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            border: 1px solid var(--border);
        }
        .data-id { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--muze-blue); cursor: pointer; }
        .data-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
        
        .data-val { text-align: right; }
        .val-big { font-weight: 900; font-size: 0.95rem; }
        .val-sub { font-size: 0.65rem; color: var(--muted); }

        @media (max-width: 1000px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .explorer-grid { grid-template-columns: 1fr; }
        }

        /* Search Glow */
        .search-area { max-width: 800px; margin: 0 auto 60px; position: relative; }
        .search-area input {
            width: 100%; padding: 25px 40px; background: #FFF; border: 1px solid var(--border);
            border-radius: 100px; color: #000; font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem; outline: none; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        .search-area input:focus { border-color: var(--muze-blue); box-shadow: 0 0 20px rgba(0,122,255,0.05); }
        .search-btn { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); color: var(--muze-blue); font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; }

        .btn-nav { background: #000; color: #FFF; padding: 10px 25px; border-radius: 100px; text-decoration: none; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <img src="../assets/pulse_logo.png" onerror="this.src='../assets/muse_icon.png'">
            <div class="logo-text">PULSE</div>
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div class="live-tag"><div class="dot"></div> SYNCED</div>
            <a href="../muzewallet/" class="btn-nav">WALLET</a>
        </div>
    </nav>

    <div class="dashboard">
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Search Transactions, Blocks, or Procyon Handles ($handle.pri)...">
            <div class="search-btn" id="search-btn">SEARCH</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">Ledger Height</span>
                <div class="stat-value" id="stat-height">---</div>
                <div class="stat-sub">↑ Real-time Sync</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active Epoch</span>
                <div class="stat-value" id="stat-epoch">---</div>
                <div class="stat-sub">Cardano L1 Base</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Network Status</span>
                <div class="stat-value" style="color:var(--muze-blue);">Stable</div>
                <div class="stat-sub">Procyon Nodes Online</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Settlement Fuel</span>
                <div class="stat-value">$PRN</div>
                <div class="stat-sub">Primary Unit</div>
            </div>
        </div>

        <div class="explorer-grid">
            <div class="feed-container">
                <div class="feed-header">
                    <div class="feed-title">Recent Transactions</div>
                    <div class="live-tag">Verified</div>
                </div>
                <div id="tx-feed">
                    <!-- Dynamic TX Feed -->
                </div>
            </div>

            <div class="feed-container">
                <div class="feed-header">
                    <div class="feed-title">Latest Blocks</div>
                    <div class="live-tag">Live</div>
                </div>
                <div id="block-feed">
                    <!-- Dynamic Block Feed -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const BLOCKFROST_API = "https://cardano-mainnet.blockfrost.io/api/v0";
        const AUTH = { "project_id": "{{credential:blockfrost_api_key}}" };
        const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SB_KEY = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';

        async function updateLedger() {
            try {
                const blockRes = await fetch(`${BLOCKFROST_API}/blocks/latest`, { headers: AUTH });
                const latest = await blockRes.json();
                
                document.getElementById('stat-height').innerText = latest.height.toLocaleString();
                document.getElementById('stat-epoch').innerText = latest.epoch;

                const txRes = await fetch(`${BLOCKFROST_API}/blocks/${latest.hash}/txs`, { headers: AUTH });
                const txs = await txRes.json();

                renderBlocks(latest.height);
                renderTxs(txs);
            } catch (e) {
                console.error("Ledger handshake error", e);
                simulateLedger();
            }
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if(!query) return;

            document.getElementById('tx-feed').innerHTML = '<div style="padding:40px; text-align:center; font-weight:900;">SEARCHING LEDGER...</div>';
            
            try {
                // 1. Check if it's a Procyon Handle
                if(query.startsWith('$') || query.endsWith('.pri')) {
                    const handle = query.startsWith('$') ? query : '$' + query;
                    const response = await fetch(`${SB_URL}/rest/v1/ledger_state?handle=eq.${handle}&select=*`, {
                        headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                    });
                    const data = await response.json();
                    if(data && data.length > 0) {
                        const identity = data[0];
                        let results = [{ 
                            id: identity.handle, 
                            meta: "Procyon Identity Found", 
                            val: identity.balance + " $PRN",
                            sub: "Status: Active"
                        }];

                        // Fetch transactions for this handle
                        try {
                            const txRes = await fetch(`${SB_URL}/rest/v1/ledger_transactions?or=(sender.eq.${handle},receiver.eq.${handle})&order=created_at.desc`, {
                                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                            });
                            const txs = await txRes.json();
                            if(txs && txs.length > 0) {
                                txs.forEach(t => {
                                    const isSender = t.sender === handle;
                                    results.push({
                                        id: t.tx_hash.substring(0,15) + "...",
                                        meta: isSender ? `Sent to ${t.receiver}` : `Received from ${t.sender}`,
                                        val: (isSender ? "-" : "+") + t.amount + " $PRN",
                                        sub: new Date(t.created_at).toLocaleString()
                                    });
                                });
                            } else {
                                // Default Genesis transaction if no history found
                                results.push({
                                    id: "tx_genesis_mustard",
                                    meta: "Mustard Seed Airdrop",
                                    val: "+1,250.00 $PRN",
                                    sub: "Genesis Settlement"
                                });
                            }
                        } catch(e) { console.error("TX Fetch Error", e); }

                        renderSearchResults(results);
                        return;
                    }
                }

                // 2. Check Blockfrost (Transaction)
                const txRes = await fetch(`${BLOCKFROST_API}/txs/${query}`, { headers: AUTH });
                if(txRes.ok) {
                    const tx = await txRes.json();
                    renderSearchResults([{
                        id: tx.hash.substring(0,20) + "...",
                        meta: "Transaction Verified on L1",
                        val: (parseInt(tx.output_amount[0].quantity) / 1000000).toFixed(2) + " $PRN",
                        sub: `Block: ${tx.block_height}`
                    }]);
                    return;
                }

                // 3. Check Blockfrost (Address)
                const addrRes = await fetch(`${BLOCKFROST_API}/addresses/${query}`, { headers: AUTH });
                if(addrRes.ok) {
                    const addr = await addrRes.json();
                    renderSearchResults([{
                        id: query.substring(0,20) + "...",
                        meta: "Cardano L1 Address",
                        val: (parseInt(addr.amount[0].quantity) / 1000000).toFixed(2) + " $PRN",
                        sub: "Identity Anchored"
                    }]);
                    return;
                }

                document.getElementById('tx-feed').innerHTML = '<div style="padding:40px; text-align:center; font-weight:900; color:red;">NOT FOUND ON LEDGER</div>';
            } catch (e) {
                console.error("Search Error", e);
                document.getElementById('tx-feed').innerHTML = '<div style="padding:40px; text-align:center; font-weight:900; color:red;">HANDSHAKE ERROR</div>';
            }
        }

        function renderSearchResults(results) {
            let html = '<div style="font-weight:900; font-size:0.7rem; color:var(--muze-blue); margin-bottom:20px;">SEARCH RESULTS</div>';
            results.forEach(res => {
                html += `
                    <div class="data-row">
                        <div class="data-main">
                            <div class="icon-hex">🔍</div>
                            <div>
                                <div class="data-id">${res.id}</div>
                                <div class="data-meta">${res.meta}</div>
                            </div>
                        </div>
                        <div class="data-val">
                            <div class="val-big">${res.val}</div>
                            <div class="val-sub">${res.sub}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('tx-feed').innerHTML = html;
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') performSearch();
        });
        document.getElementById('search-btn').addEventListener('click', performSearch);

        function renderBlocks(height) {
            let html = "";
            for(let i=0; i<10; i++) {
                const currentHeight = height - i;
                html += `
                    <div class="data-row">
                        <div class="data-main">
                            <div class="icon-hex">🧊</div>
                            <div>
                                <div class="data-id">${currentHeight}</div>
                                <div class="data-meta">Handshaked ${i * 20}s ago</div>
                            </div>
                        </div>
                        <div class="data-val">
                            <div class="val-big">${(Math.random() * 2).toFixed(2)} MB</div>
                            <div class="val-sub">Procyon Node</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('block-feed').innerHTML = html;
        }

        function renderTxs(txs) {
            let html = "";
            if(!txs || txs.length === 0) txs = ["tx_mustard_seed_001", "tx_handle_vogue", "tx_mint_card_8830"];
            
            txs.slice(0, 10).forEach((tx, i) => {
                const isAirdrop = i % 3 === 0;
                html += `
                    <div class="data-row">
                        <div class="data-main">
                            <div class="icon-hex">⚡</div>
                            <div>
                                <div class="data-id">${tx.substring(0, 15)}...</div>
                                <div class="data-meta">${isAirdrop ? 'Mustard Seed Airdrop' : 'Procyon Transaction'}</div>
                            </div>
                        </div>
                        <div class="data-val">
                            <div class="val-big" style="color: ${isAirdrop ? '#00C853' : 'var(--muze-blue)'}">${isAirdrop ? '+1,250' : '850'} $PRN</div>
                            <div class="val-sub">Verified</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('tx-feed').innerHTML = html;
        }

        function simulateLedger() {
            renderBlocks(10245182);
            renderTxs([]);
        }

        updateLedger();
        setInterval(updateLedger, 15000); // 15s updates for high-fidelity
    </script>
</body>
</html>
