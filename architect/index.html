<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Sovereign Wallet v24.7.19</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; --muze-blue: #007AFF; --chillata: #FF4D4D; --accent: #7B35D4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; width: 100vw; height: 100vh; }
        .layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFF; z-index: 100; padding: 20px; }
        .hidden { display: none !important; }
        .card-ui { text-align: center; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 30px; border: 1px solid var(--border); background: #FFF; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.4; }
        .btn-full { width: 100%; padding: 20px; border-radius: 100px; border: none; background: var(--text); color: #FFF; font-weight: 900; font-size: 0.8rem; cursor: pointer; letter-spacing: 2px; margin-bottom: 10px; }
        .btn-outline { width: 100%; padding: 20px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text); font-weight: 900; font-size: 0.8rem; cursor: pointer; letter-spacing: 2px; }
        
        #app-ui { display: grid; grid-template-columns: 280px 1fr; height: 100vh; width: 100vw; }
        .sidebar { border-right: 1px solid var(--border); padding: 60px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 40px; font-weight: 600; font-size: 0.9rem; color: var(--muted); cursor: pointer; }
        .nav-item:hover { color: var(--text); }
        .nav-item.active { color: var(--text); border-left: 4px solid var(--muze-blue); }
        .main-stage { padding: 60px; overflow-y: auto; position: relative; }
        
        /* Toggle Switch (Architect's Control) */
        .mode-toggle { position: fixed; top: 30px; right: 30px; display: flex; align-items: center; gap: 10px; z-index: 200; background: #f8f8f8; padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border); cursor: pointer; }
        .toggle-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .mode-toggle.dev .toggle-dot { background: #00FF7F; box-shadow: 0 0 10px #00FF7F; }
        .mode-text { font-size: 0.6rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        .active-card {
            width: 100%; max-width: 400px; height: 240px; 
            background: #000;
            background-size: cover; background-position: center;
            border-radius: 20px; padding: 30px; color: #fff; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .handle-item { border: 1px solid var(--border); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .handle-name { font-weight: 900; font-size: 0.8rem; }
        .handle-status { font-size: 0.6rem; font-weight: 900; color: var(--muze-blue); background: rgba(0,122,255,0.1); padding: 4px 10px; border-radius: 100px; }
        .handle-status.sale { color: #FFA500; background: rgba(255,165,0,0.1); }

        .profile { margin-top: auto; padding: 0 30px; display: flex; align-items: center; gap: 15px; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; background: #EEE; }
    </style>
</head>
<body>

    <!-- Architect's Toggle (Floating) -->
    <div id="m-toggle" class="mode-toggle dev" onclick="toggleMode()">
        <div class="toggle-dot"></div>
        <div id="m-text" class="mode-text">DEVELOPER MODE</div>
    </div>

    <!-- Splash Layer -->
    <div id="layer-splash" class="layer">
        <img src="../assets/muse_icon.png?v=2" style="width:120px; opacity:0.8;" onerror="this.src='../assets/muze_logo.png'">
    </div>

    <!-- Entrance Layer -->
    <div id="layer-entrance" class="layer hidden">
        <div class="card-ui">
            <img src="../assets/muse_icon.png?v=2" style="width:60px; margin-bottom:20px;" onerror="this.src='../assets/muze_logo.png'">
            <h2 id="ent-title">Architect Entrance</h2>
            <p id="ent-desc">Access high-fidelity identity nodes.</p>
            <div id="ent-actions">
                <button class="btn-full" id="btn-bypass" onclick="bypassEntrance()">ENTER AS ARCHITECT</button>
                <button class="btn-outline" onclick="alert('Simulation: Enter Seed Phrase')">RECOVER WITH SEED</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden">
        <div class="sidebar">
            <div style="padding:0 30px 40px;"><img src="../assets/muze_logo.png?v=2" style="width:40px;"></div>
            <div class="nav-item active" onclick="showStage('vault', this)">Vault</div>
            <div class="nav-item" onclick="showStage('card', this)">Sovereign Card</div>
            <div class="nav-item" onclick="showStage('inventory', this)">Handles</div>
            <div class="profile">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/pd_icon_512.png">
                <div id="user-handle" style="font-weight:900; font-size:0.8rem;">prisca.pri</div>
            </div>
        </div>

        <main class="main-stage">
            <div id="stage-vault" class="stage">
                <div class="balance-hero" style="margin-bottom:60px;">
                    <div class="balance-label" style="font-size:0.7rem; font-weight:900; color:var(--muted); letter-spacing:2px; text-transform:uppercase;">Balance (Vespr Sync)</div>
                    <div class="balance-val" style="font-size:3rem; font-weight:900;">11.8 <span style="font-size:1rem; color:var(--muted)">ADA</span></div>
                </div>
                <h2>Assets</h2>
                <div class="inventory-grid" style="margin-top:20px;">
                    <div class="handle-item"><span>$PRN</span><span>0</span></div>
                    <div class="handle-item"><span>$NRL</span><span>0</span></div>
                </div>
            </div>

            <div id="stage-card" class="stage hidden">
                <h2>Sovereign Digital Card</h2>
                <div class="active-card" style="margin-top:20px;">
                    <div style="font-weight:900; font-size:0.7rem; letter-spacing:2px;">SOVEREIGN</div>
                    <div style="font-weight:900; font-size:1.4rem;">PRISCA.PRI</div>
                </div>
            </div>

            <div id="stage-inventory" class="stage hidden">
                <h2 id="inv-title">Developer Inventory</h2>
                <p id="inv-desc">All system handles and active brand nodes.</p>
                <div class="inventory-grid" id="handle-list"></div>
            </div>
        </main>
    </div>

    <script>
        let isDevMode = true; // FORCE ON FOR THIS FILE
        const allHandles = [
            { name: "prisca.pri", status: "PRIMARY", devOnly: false },
            { name: "pricey.pri", status: "ACTIVE", devOnly: false },
            { name: "prisca.ada.pri", status: "ACTIVE", devOnly: false },
            { name: "ateliagaming.pri", status: "FOR SALE", devOnly: true },
            { name: "calalloo.pri", status: "FOR SALE", devOnly: true },
            { name: "nurasen.pri", status: "FOR SALE", devOnly: true },
            { name: "couturegallery.pri", status: "FOR SALE", devOnly: true },
            { name: "thewaymadeknown.pri", status: "FOR SALE", devOnly: true }
        ];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('layer-splash').classList.add('hidden');
                updateModeUI();
                bypassEntrance();
            }, 800);
        };

        function toggleMode() {
            isDevMode = !isDevMode;
            updateModeUI();
            if(!isDevMode) {
                document.getElementById('app-ui').classList.add('hidden');
                document.getElementById('layer-entrance').classList.remove('hidden');
            } else {
                bypassEntrance();
            }
        }

        function updateModeUI() {
            const toggle = document.getElementById('m-toggle');
            const text = document.getElementById('m-text');
            
            if(isDevMode) {
                toggle.classList.add('dev');
                text.innerText = "DEVELOPER MODE";
            } else {
                toggle.classList.remove('dev');
                text.innerText = "USER MODE";
            }

            // Entrance Updates
            document.getElementById('ent-title').innerText = isDevMode ? "Architect Entrance" : "User Login";
            document.getElementById('ent-desc').innerText = isDevMode ? "Access high-fidelity identity nodes." : "Secure entry to your personal vault.";
            document.getElementById('btn-bypass').style.display = isDevMode ? "block" : "none";
            
            // App UI Updates
            document.getElementById('inv-title').innerText = isDevMode ? "Developer Inventory" : "My Handles";
            document.getElementById('inv-desc').innerText = isDevMode ? "All system handles and active brand nodes." : "Handles anchored to your vault.";
            renderHandles();
        }

        function bypassEntrance() {
            document.getElementById('layer-entrance').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
        }

        function showStage(id, el) {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden'));
            document.getElementById('stage-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function renderHandles() {
            const list = document.getElementById('handle-list');
            const filtered = allHandles.filter(h => isDevMode || !h.devOnly);
            list.innerHTML = filtered.map(h => `
                <div class="handle-item">
                    <span class="handle-name">${h.name}</span>
                    <span class="handle-status ${h.status === 'FOR SALE' ? 'sale' : ''}">${h.status}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
