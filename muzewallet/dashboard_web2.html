<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE Wallet | Standard Access</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --accent: #7B35D4;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }
        body { margin: 0; font-family: var(--font-body); background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .logo img { height: 30px; margin-bottom: 40px; }
        h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 20px; letter-spacing: -0.05em; }
        p { font-weight: 900; opacity: 0.5; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; }
        
        .tab-nav { display: flex; gap: 30px; justify-content: center; margin-bottom: 40px; }
        .tab-btn { background: none; border: none; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; opacity: 0.2; }
        .tab-btn.active { opacity: 1; border-bottom: 4px solid #000; padding-bottom: 10px; }

        .input-group { margin-bottom: 30px; text-align: left; }
        label { font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-bottom: 10px; }
        input {
            width: 100%; padding: 20px 0; border: none; border-bottom: 4px solid #000;
            font-size: 1.5rem; font-weight: 900; outline: none; background: transparent;
        }
        
        .btn-submit {
            width: 100%; padding: 25px; background: #000; color: #FFF; border: none; border-radius: 100px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: background 0.3s;
        }
        .btn-submit:hover { background: var(--accent); }

        .action-grid { margin-top: 40px; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .action-link { 
            text-decoration: none; color: #000; font-weight: 900; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid #EEE; 
            padding: 15px; border-radius: 10px; transition: all 0.3s; text-align: center;
        }
        .action-link:hover { border-color: var(--accent); color: var(--accent); }
        
        .back-link { margin-top: 30px; display: block; text-decoration: none; color: #000; font-weight: 900; font-size: 12px; opacity: 0.4; }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('isGodMode') === 'true') {
            window.location.href = "vault.html";
        }
    </script>
    <div class="login-box">
        <div class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" alt="MUZE"></div>
        <h1>Account Login</h1>
        <p>Standard Managed Access</p>
        
        <div class="tab-nav">
            <button class="tab-btn active">Standard</button>
            <button class="tab-btn" onclick="connectWeb3()">Sovereign Wallet</button>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Email or Handle</label>
                <input type="text" id="email" placeholder="prisca.pri" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit">LOGIN</button>
        </form>

        <div class="action-grid">
            <a href="signup.html" class="action-link">Register New Account</a>
        </div>
        
        <a href="index.html" class="back-link">← RETURN TO GATE</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR}}');
        
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data: user, error } = await sb.from('profiles').select('handle').eq('email', email).eq('password', password).single();
                if (error || !user) {
                    alert('Invalid credentials.');
                    btn.disabled = false;
                    btn.innerText = "UNLOCK VAULT";
                    return;
                }
                localStorage.setItem('user_handle', user.handle);
                window.location.href = "v27.html";
            } catch (err) {
                alert('Authentication failed.');
                btn.disabled = false;
                btn.innerText = "LOGIN";
            }
        }

        async function connectWeb3() {
            if (typeof window.cardano === 'undefined') {
                alert('Please install a Cardano wallet (Nami/Vespa) to continue.');
                return;
            }
            try {
                const api = await window.cardano.nami.enable();
                const address = await api.getUsedAddresses();
                localStorage.setItem('user_handle', 'wallet_' + address[0].substring(0,8));
                window.location.href = "v27.html";
            } catch (err) {
                alert('Web3 Connection Failed.');
            }
        }
    </script>
</body>
</html>
