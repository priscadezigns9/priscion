<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Titan Dashboard | Institutional Control</title>
    <link rel='icon' href='../logos/TITAN_ICON.png' type='image/png'>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #050505; --surface: #0F0F11; --text: #ccd6f6; --white: #ffffff; 
            --malachite: #00FF7F; --border: rgba(255,255,255,0.08); --muted: #888;
            --error: #ff4b4b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding-top: 100px; overflow-x: hidden;
        }

        header {
            background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 0 6%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000; height: 80px;
        }
        .logo-container { display: flex; align-items: center; text-decoration: none; }
        .logo-container img { height: 32px; width: auto; }
        
        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.85rem; opacity: 0.7; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        nav a:hover, nav a.active { opacity: 1; color: var(--malachite); }
        
        .hamburger { 
            display: none; cursor: pointer; flex-direction: column; gap: 6px; padding: 10px; z-index: 2001; 
            background: transparent; border: none;
        }
        .hamburger div { width: 24px; height: 2px; background-color: var(--white); transition: 0.3s; }

        @media screen and (max-width: 968px) {
            nav { 
                position: fixed; right: -100%; top: 0; width: 85%; height: 100vh; 
                background: #0A0A0C; flex-direction: column; align-items: center; 
                justify-content: center; gap: 40px; transition: 0.4s; z-index: 2000; 
                border-left: 1px solid var(--border);
            }
            nav.nav-active { right: 0; }
            .hamburger { display: flex; }
        }

        .auth-card {
            background: var(--surface);
            padding: 50px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .logo-box { margin-bottom: 40px; }
        .logo-box img { 
            height: 45px; 
            width: auto; 
            filter: drop-shadow(0 0 20px rgba(0,255,127,0.2));
        }
        
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; color: var(--white); letter-spacing: -0.5px; }
        p { color: var(--muted); margin-bottom: 35px; font-size: 1rem; line-height: 1.5; }

        .input-group { margin-bottom: 24px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .input-group input {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            padding: 18px; border-radius: 16px; color: var(--white); font-size: 1rem; transition: 0.3s;
        }
        .input-group input:focus { outline: none; border-color: var(--malachite); background: rgba(0,255,127,0.03); box-shadow: 0 0 0 4px rgba(0,255,127,0.05); }

        .auth-buttons { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .btn {
            width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; border: none; font-family: inherit; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-signin { background: var(--malachite); color: #000; }
        .btn-signin:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,255,127,0.3); }
        .btn-signup { background: transparent; border: 1px solid var(--border); color: var(--white); }
        .btn-signup:hover { background: rgba(255,255,255,0.05); }

        .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 20px; display: none; padding: 12px; background: rgba(255,75,75,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <a href='index.html' class='logo-container'>
            <img src='../logos/TITAN_ICON.png' alt='TITAN'>
        </a>
        <nav id='main-nav'>
            <a href='index.html'>Home</a>
            <a href='terminal.html'>Terminal</a>
            <a href='academy.html'>Academy</a>
            <a href='partners.html'>Partners</a>
            <a href='dashboard.html' style='background: var(--malachite); color: #000; padding: 10px 20px; border-radius: 8px; opacity: 1; font-weight: 800;'>LOGIN</a>
        </nav>
        <button class='hamburger' onclick='toggleMenu()'><div></div><div></div><div></div></button>
    </header>

    <div class='auth-card' id='auth-ui'>
        <div class='logo-box'>
            <img src='../logos/TITAN_TRADERX_LOGO.png' alt='TITAN TRADERX'>
        </div>
        <h1>Welcome to Titan</h1>
        <p>Access your institutional trading dashboard and institutional academy.</p>
        
        <div class='input-group'>
            <label>Email Address</label>
            <input type='email' id='email' placeholder='name@company.com'>
        </div>
        <div class='input-group'>
            <label>Password</label>
            <input type='password' id='password' placeholder='••••••••'>
        </div>

        <div class='auth-buttons'>
            <button class='btn btn-signin' onclick='signIn()'>LOGIN</button>
            <button class='btn btn-signup' onclick='signUp()'>Create Account</button>
        </div>
        <div id='error-message' class='error-msg'></div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'>
        async function connectWeb3() {
            if (typeof window.cardano === 'undefined') {
                alert('Please install a Cardano wallet (Nami, Eternl, Flint) to continue.');
                return;
            }
            try {
                const api = await window.cardano.nami.enable();
                const address = await api.getUsedAddresses();
                alert('Cardano Wallet Connected: ' + address[0].substring(0,10) + '...');
                localStorage.setItem('user_handle', 'cardano_user_' + address[0].substring(0,8));
                window.location.href = "vault.html";
            } catch (err) {
                alert('Web3 Connection Failed: ' + err.message);
            }
        }

    </script>

        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) showError(error.message);
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) showError(error.message);
            else alert('Check your email for confirmation!');
        }

        function showError(msg) {
            const err = document.getElementById('error-message');
            err.innerText = msg;
            err.style.display = 'block';
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'terminal.html';
            }
        });

        function toggleMenu() {
            const nav = document.getElementById('main-nav');
            const hamburger = document.querySelector('.hamburger');
            nav.classList.toggle('nav-active');
            const lines = hamburger.querySelectorAll('div');
            if (nav.classList.contains('nav-active')) {
                lines[0].style.transform = 'rotate(-45deg) translate(-5px, 6px)';
                lines[1].style.opacity = '0';
                lines[2].style.transform = 'rotate(45deg) translate(-5px, -6px)';
            } else {
                lines[0].style.transform = 'none'; lines[1].style.opacity = '1'; lines[2].style.transform = 'none';
            }
        }
    
        async function connectWeb3() {
            if (typeof window.cardano === 'undefined') {
                alert('Please install a Cardano wallet (Nami, Eternl, Flint) to continue.');
                return;
            }
            try {
                const api = await window.cardano.nami.enable();
                const address = await api.getUsedAddresses();
                alert('Cardano Wallet Connected: ' + address[0].substring(0,10) + '...');
                localStorage.setItem('user_handle', 'cardano_user_' + address[0].substring(0,8));
                window.location.href = "vault.html";
            } catch (err) {
                alert('Web3 Connection Failed: ' + err.message);
            }
        }

    </script>
</body>
</html>
