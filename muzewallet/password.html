<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE | Create Password</title>
    <link rel="icon" type="image/png" href="https://priscion.com/assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="bridge.js"></script>
    <style>
        :root { --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; --muze-blue: #5AC8FA; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; text-align: center; }
        .muze-logo { height: 60px; margin-bottom: 40px; }
        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 0.8rem; max-width: 400px; margin-bottom: 30px; line-height: 1.6; }
        input { width: 100%; max-width: 400px; padding: 18px; border-radius: 12px; border: 1px solid var(--border); background: #F9F9F9; margin-bottom: 15px; font-weight: 600; font-family: 'Inter', sans-serif; text-align: center; }
        .btn-full { background: #000; color: #fff; border: none; padding: 18px 40px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; max-width: 300px; margin-top: 20px; }
        .btn-full:disabled { background: #EEE; cursor: not-allowed; }
    </style>
</head>
<body>
    <img src="../assets/muze_icon_logo.png" class="muze-logo">
    <h2>Claim your Identity.</h2>
    <p>Choose your .pri handle and set your Vault Password. Your password is used to encrypt your Recovery Shard in the Neural Login bridge.</p>
    
    <input type="text" id="handle" placeholder="Enter handle (e.g. user.pri)">
    <input type="password" id="pass1" placeholder="Set Vault Password">
    <input type="password" id="pass2" placeholder="Confirm Password">

    <button class="btn-full" id="finalize-btn" onclick="saveVault()">FINALIZE VAULT</button>

    <script>
        async function saveVault() {
            const h = document.getElementById('handle').value.toLowerCase().trim();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const seed = localStorage.getItem('muze_temp_seed');
            const btn = document.getElementById('finalize-btn');

            if (!h || !h.endsWith('.pri')) return alert("Please enter a valid .pri handle.");
            if (!p1 || p1.length < 8) return alert("Password must be at least 8 characters long.");
            if (p1 !== p2) return alert("Passwords do not match.");
            if (!seed) return alert("Session expired. Please restart vault creation.");

            btn.disabled = true;
            btn.innerText = "ANCHORING IDENTITY...";

            try {
                // Save encrypted shard to Supabase
                await MUZE_BRIDGE.saveRecoveryShard(h, seed, p1);

                // Local state
                localStorage.setItem('muze_active', 'true');
                localStorage.setItem('muze_handle', h);
                localStorage.setItem('muze_vault_status', 'active');
                localStorage.removeItem('muze_temp_seed');

                alert("Vault anchored successfully. Identity confirmed.");
                location.href = 'index.html';
            } catch (err) {
                console.error(err);
                alert("Failed to anchor identity: " + err.message);
                btn.disabled = false;
                btn.innerText = "FINALIZE VAULT";
            }
        }
    </script>
</body>
</html>
