<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE | Create Password</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; text-align: center; }
        .muze-logo { height: 60px; margin-bottom: 40px; }
        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 0.8rem; max-width: 400px; margin-bottom: 30px; line-height: 1.6; }
        input { width: 100%; max-width: 400px; padding: 18px; border-radius: 12px; border: 1px solid var(--border); background: #F9F9F9; margin-bottom: 15px; font-weight: 600; font-family: 'Inter', sans-serif; text-align: center; }
        .btn-full { background: #000; color: #fff; border: none; padding: 18px 40px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; max-width: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <img src="../assets/muze_icon_logo.png" class="muze-logo">
    <h2>Set your Vault Password.</h2>
    <p>This password will be used to unlock your vault locally on this device.</p>
    
    <input type="password" id="pass1" placeholder="Enter Password">
    <input type="password" id="pass2" placeholder="Confirm Password">

    <button class="btn-full" onclick="saveVault()">FINALIZE VAULT</button>

    <script>
        function saveVault() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if (!p1 || p1.length < 8) {
                return alert("Password must be at least 8 characters long.");
            }
            if (p1 !== p2) {
                return alert("Passwords do not match.");
            }

            localStorage.setItem('muze_authenticated', 'true');
            localStorage.setItem('muze_vault_status', 'active');
            location.href = 'index.html';
        }
    </script>
</body>
</html>
