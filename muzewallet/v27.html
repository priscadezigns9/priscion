<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUZE | Prisca Dezigns Console v2.7</title>
    <style>
        :root { --accent: #7B35D4; --bg: #FFFFFF; --text: #000000; --muted: #8E8E93; --border: #F2F2F7; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .btn-outline { background: #fff; color: var(--accent); border: 2px solid var(--accent); padding: 16px 40px; border-radius: 100px; font-weight: 900; cursor: pointer; width: 350px; margin-bottom: 20px; }
        .onboarding-card { width: 350px; background: #000; color: #fff; border-radius: 24px; padding: 25px; margin-bottom: 15px; cursor: pointer; text-align: left; }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" style="width:100px; margin-bottom:20px;">
    <h1>MUZE.</h1>
    <p style="color:var(--muted);">The secure bridge to the Prisca Dezigns Network.</p>
    
    <p style="font-size:10px; font-weight:900; color:var(--muted); letter-spacing:2px; text-transform:uppercase;">Web2 Access</p>
    <div class="onboarding-card">
        <h3 style="margin:0;">Login with Handle</h3>
        <p style="font-size:0.7rem; opacity:0.8;">Returning users & Ambassadors.</p>
    </div>
    <button class="btn-outline" onclick="location.href='signup.html'">CREATE WEB2 ACCOUNT</button>

    <p style="font-size:10px; font-weight:900; color:var(--muted); letter-spacing:2px; text-transform:uppercase;">Blockchain Vault</p>
    <button class="btn-outline" style="color:#000; border-color:#eee;" onclick="location.href='create.html'">CREATE NEW CARDANO VAULT</button>
    <button class="btn-outline" style="color:#000; border-color:#eee;" onclick="location.href='ledger.html'">CONNECT LEDGER</button>
</body>
</html>
