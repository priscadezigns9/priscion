<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGGO | Independent Web3 Browser</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; --muze-blue: #5AC8FA; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        .browser-chrome { background: #F9F9F9; border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; align-items: center; gap: 20px; }
        .browser-chrome .controls { display: flex; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #DDD; }
        .dot.red { background: #FF5F57; }
        .dot.yellow { background: #FFBD2E; }
        .dot.green { background: #28C940; }

        .address-bar { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 8px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .address-bar input { flex: 1; border: none; outline: none; font-size: 0.85rem; font-weight: 500; color: var(--text); }
        .address-bar .icon { color: var(--muted); font-size: 0.8rem; }

        .browser-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; }
        
        .search-container { text-align: center; max-width: 600px; width: 100%; padding: 40px; }
        .leggo-logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .leggo-logo img { height: 120px; border-radius: 24px; }

        .search-input-wrap { position: relative; margin-bottom: 40px; }
        .search-input { width: 100%; padding: 20px 30px; border-radius: 100px; border: 1px solid var(--border); font-size: 1.1rem; font-weight: 600; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .search-input:focus { border-color: var(--muze-blue); }

        iframe { border: none; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

    <div class="browser-chrome">
        <div class="controls">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="address-bar">
            <span class="icon">🔒</span>
            <input type="text" id="browser-url" value="leggo.search" onkeydown="handleUrl(event)">
        </div>
    </div>

    <div class="browser-content">
        <div id="home-view" class="search-container">
            <div class="leggo-logo">
                <img src="https://priscion.com/assets/leggo_logo.png">
                <span>LEGGO</span>
            </div>
            <div class="search-input-wrap">
                <input type="text" class="search-input" placeholder="Search the Independent Web..." onkeydown="handleSearch(event)">
            </div>
        </div>
        <iframe id="browser-frame" src=""></iframe>
    </div>

    <script>
        function handleSearch(e) {
            if(e.key === 'Enter') {
                const query = e.target.value;
                navigate('https://www.google.com/search?q=' + encodeURIComponent(query));
            }
        }

        function handleUrl(e) {
            if(e.key === 'Enter') {
                let url = e.target.value;
                if(!url.startsWith('http')) url = 'https://' + url;
                navigate(url);
            }
        }

        function navigate(url) {
            document.getElementById('home-view').style.display = 'none';
            const frame = document.getElementById('browser-frame');
            frame.style.display = 'block';
            frame.src = url;
            document.getElementById('browser-url').value = url;
        }
    </script>

</body>
</html>
