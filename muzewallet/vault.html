<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Architect Console</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #FFFFFF; --text: #000; --muted: #AAA; --border: #EEE; --muze-blue: #5AC8FA; --accent: #7B35D4; --surface: #F9F9F9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; display: flex; }

        .hidden { display: none !important; }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; gap: 5px; z-index: 1000;
        }
        .nav-item {
            padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 0.8rem;
            color: var(--muted); cursor: pointer; display: flex; align-items: center;
            gap: 12px; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-item:hover { background: #F0F0F0; color: var(--text); }
        .nav-item.active { background: #000; color: #fff; }

        /* Main Content Container */
        .main-wrapper { flex: 1; display: flex; height: 100vh; position: relative; }
        
        /* Architect View (Left/Main) */
        .content { flex: 1; height: 100vh; overflow-y: auto; padding: 60px 80px; transition: all 0.5s ease; border-right: 1px solid var(--border); }
        
        /* User Mirror (Right) */
        .mirror-container { width: 450px; height: 100vh; background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .mirror-header { padding: 15px 25px; border-bottom: 1px solid var(--border); background: #fdfdfd; display: flex; justify-content: space-between; align-items: center; }
        .mirror-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
        .mirror-badge { background: #E0F2FE; color: #0369a1; padding: 4px 10px; border-radius: 100px; font-size: 0.55rem; font-weight: 900; }
        #mirror-iframe { width: 100%; height: 100%; border: none; }

        h2 { font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: -1.5px; font-size: 2.5rem; margin-bottom: 10px; }
        p.subtitle { color: var(--muted); margin-bottom: 50px; font-size: 0.9rem; }

        /* Grid Layouts */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 60px; }
        .stat-card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.5rem; font-weight: 900; }

        /* Split Toggle */
        .toggle-mirror { position: fixed; bottom: 20px; left: 300px; background: #000; color: #fff; border: none; padding: 12px 25px; border-radius: 100px; font-weight: 900; font-size: 0.7rem; cursor: pointer; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* DApp Browser (Nested inside Content) */
        #dapp-iframe-wrapper { position: absolute; inset: 0; background: #fff; z-index: 100; display: none; }
        #dapp-frame { width: 100%; height: 100%; border: none; }
        #dapp-browser-back { position: absolute; top: 20px; left: 20px; background: #000; color: #fff; padding: 8px 15px; border-radius: 100px; font-size: 0.7rem; font-weight: 900; cursor: pointer; z-index: 200; }

        .handles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .handle-card { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; }
        .handle-card h4 { font-weight: 900; font-size: 0.8rem; }
        
        .chat-area { height: 300px; overflow-y: auto; background: var(--surface); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <button class="toggle-mirror" onclick="toggleMirror()">TOGGLE LENS VIEW</button>

    <div class="sidebar">
        <div style="padding: 10px 20px 40px;"><img src="../assets/muze_icon_logo.png" style="height: 30px;"></div>
        <div class="nav-item active" onclick="showStage('main', this)">Command Center</div>
        <div class="nav-item" onclick="showStage('handles', this)">Handles Ledger</div>
        <div class="nav-item" onclick="showStage('agency', this)">Agency Hub</div>
        <div class="nav-item" onclick="showStage('dapps', this)">Network DApps</div>
        <div class="nav-item" onclick="showStage('messenger', this)">Messenger</div>
        <div style="margin-top: auto; padding: 20px;">
            <button style="width:100%; background:#000; color:#fff; border:none; padding:15px; border-radius:12px; font-weight:900; font-size:0.7rem; cursor:pointer;" onclick="location.href='index.html'">LOCK CONSOLE</button>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- ARCHITECT VIEW -->
        <div class="content" id="architect-content">
            
            <div id="stage-main" class="stage">
                <h2>Command Center</h2>
                <p class="subtitle">Global Pulse of the Priscion Network.</p>
                <div class="stats-grid">
                    <div class="stat-card"><span class="stat-label">Net Revenue</span><div class="stat-value">$142.5K</div></div>
                    <div class="stat-card"><span class="stat-label">Handles</span><div class="stat-value">1,402</div></div>
                </div>
                <div style="background: #000; color: #0F0; padding: 20px; border-radius: 20px; font-family: monospace; font-size: 0.75rem;">
                    > MUZE L1 CORE... [READY]<br>> API HANDSHAKE... [ACTIVE]
                </div>
            </div>

            <div id="stage-handles" class="stage hidden">
                <h2>Handles Ledger</h2>
                <div class="handles-grid" id="handles-grid"></div>
            </div>

            <div id="stage-agency" class="stage hidden">
                <h2>Agency Hub</h2>
                <div id="leads-table-container"></div>
            </div>

            <div id="stage-dapps" class="stage hidden">
                <h2>Network DApps</h2>
                <div id="dapp-main-grid">
                    <button onclick="openDApp('https://priscion.com/mynt')">MYNT</button>
                    <button onclick="openDApp('https://priscion.com/share-to-earn')">SHARE-TO-EARN</button>
                </div>
            </div>

            <div id="dapp-iframe-wrapper">
                <div id="dapp-browser-back" onclick="closeDApp()">← BACK</div>
                <iframe id="dapp-frame"></iframe>
            </div>
        </div>

        <!-- LIVE USER MIRROR -->
        <div class="mirror-container" id="mirror-panel">
            <div class="mirror-header">
                <span class="mirror-label">Live User Lens</span>
                <span class="mirror-badge">MIRROR ACTIVE</span>
            </div>
            <iframe src="index.html" id="mirror-iframe"></iframe>
        </div>
    </div>

    <script>
        function toggleMirror() {
            const mirror = document.getElementById('mirror-panel');
            mirror.classList.toggle('hidden');
        }

        function showStage(id, el) {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden'));
            document.getElementById('stage-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'handles') renderHandles();
            if(id !== 'dapps') closeDApp();
            
            // Refresh mirror whenever a stage changes to ensure sync
            document.getElementById('mirror-iframe').contentWindow.location.reload();
        }

        function openDApp(url) {
            document.getElementById('dapp-iframe-wrapper').style.display = 'block';
            document.getElementById('dapp-frame').src = url;
        }

        function closeDApp() {
            document.getElementById('dapp-iframe-wrapper').style.display = 'none';
            document.getElementById('dapp-frame').src = '';
        }

        function renderHandles() {
            const grid = document.getElementById('handles-grid');
            grid.innerHTML = ['prisca.pri', 'pricey.pri', 'ateliagaming.pri'].map(h => `
                <div class="handle-card"><h4>${h}</h4></div>
            `).join('');
        }

        renderHandles();
    </script>
</body>
</html>
