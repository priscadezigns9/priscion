<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOD MODE | Architect Console</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Playfair+Display:wght@900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0A0A0A; --text: #FFF; --muted: #666; --border: #222; --muze-blue: #5AC8FA; --accent: #7B35D4; --surface: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Left Panel: Architect Controls */
        .panel-left { width: 50%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-right { width: 50%; height: 100vh; position: relative; }
        
        .header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; flex-shrink: 0; }
        .logo { height: 25px; }

        .console-main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }
        
        .hud-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .hud-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; position: relative; overflow: hidden; }
        .hud-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
        .hud-value { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--muze-blue); }

        .signup-list { height: 200px; overflow-y: auto; background: #000; border: 1px solid var(--border); border-radius: 12px; margin-top: 15px; }
        .signup-item { padding: 12px 15px; border-bottom: 1px solid #111; font-size: 0.75rem; display: flex; justify-content: space-between; }
        .signup-item span { color: var(--muze-blue); }

        .ops-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .op-btn { background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; cursor: pointer; text-align: left; transition: 0.2s; }
        .op-btn:hover { background: var(--muze-blue); color: #000; border-color: var(--muze-blue); }
        .op-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Wallet Mirror Frame */
        #wallet-mirror { width: 100%; height: 100%; border: none; }
        
        .divider { width: 4px; background: var(--border); cursor: col-resize; position: absolute; left: 50%; height: 100vh; z-index: 1000; transition: background 0.2s; }
        .divider:hover { background: var(--muze-blue); }

        #proc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .pulse { width: 60px; height: 60px; border-radius: 50%; background: var(--muze-blue); animation: p 1s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>
    <div id="proc-overlay"><div class="pulse"></div><h2 style="margin-top:30px; font-weight:900; letter-spacing:5px;">ANCHORING...</h2></div>

    <div class="panel-left" id="panel-l">
        <div class="header">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_word_logo.png" class="logo">
            <div style="font-weight:900; font-size:0.6rem; color:var(--accent); letter-spacing:2px; border:1px solid var(--accent); padding:4px 10px; border-radius:100px;">GOD MODE: ARCHITECT</div>
        </div>
        
        <div class="console-main">
            <div class="hud-grid">
                <div class="hud-card">
                    <div class="hud-label">LIVE NODES</div>
                    <div class="hud-value" id="node-count">...</div>
                </div>
                <div class="hud-card">
                    <div class="hud-label">LEDGER ASSETS</div>
                    <div class="hud-value">$PRN</div>
                </div>
            </div>

            <div class="hud-card" style="flex:1; display:flex; flex-direction:column;">
                <div class="hud-label">LIVE SIGNUPS (SUPABASE)</div>
                <div class="signup-list" id="signup-feed"></div>
            </div>

            <div class="hud-card">
                <div class="hud-label">ARCHITECT OPERATIONS</div>
                <div class="ops-grid">
                    <button class="op-btn" onclick="mirrorNav('vault')">VAULT MIRROR</button>
                    <button class="op-btn" onclick="mirrorNav('settings')">SETTINGS MIRROR</button>
                    <button class="op-btn" onclick="mirrorNav('card')">CARD ARTIFACT</button>
                    <button class="op-btn" onclick="mirrorNav('dapps')">DAPP EXPLORER</button>
                </div>
            </div>
        </div>
    </div>

    <div class="divider" id="drag-divider"></div>

    <div class="panel-right" id="panel-r">
        <iframe src="index.html?god_mode=true" id="wallet-mirror"></iframe>
    </div>

    <script>
        const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const supabaseKey = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchSignups() {
            const { data, count } = await supabase.from('profiles').select('email, created_at').order('created_at', { ascending: false });
            document.getElementById('node-count').innerText = count || 0;
            const feed = document.getElementById('signup-feed');
            feed.innerHTML = data.map(u => `
                <div class="signup-item">${u.email} <span>${new Date(u.created_at).toLocaleDateString()}</span></div>
            `).join('');
        }

        function mirrorNav(hash) {
            const mirror = document.getElementById('wallet-mirror');
            mirror.contentWindow.postMessage({ type: 'NAVIGATE', hash: hash }, '*');
            anchorEffect();
        }

        function anchorEffect() {
            const overlay = document.getElementById('proc-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.display = 'none', 1000);
        }

        // Draggable Divider
        const divider = document.getElementById('drag-divider');
        const leftPanel = document.getElementById('panel-l');
        const rightPanel = document.getElementById('panel-r');
        let isDragging = false;

        divider.addEventListener('mousedown', (e) => { isDragging = true; document.body.style.cursor = 'col-resize'; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let percentage = (e.clientX / window.innerWidth) * 100;
            if (percentage > 20 && percentage < 80) {
                leftPanel.style.width = percentage + '%';
                rightPanel.style.width = (100 - percentage) + '%';
                divider.style.left = percentage + '%';
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; document.body.style.cursor = 'default'; });

        window.onload = fetchSignups;
    </script>
</body>
</html>
