<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE Wallet | Neural Login</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --accent: #7B35D4;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }
        body { margin: 0; font-family: var(--font-body); background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .login-box { width: 100%; max-width: 450px; padding: 60px; text-align: center; }
        .logo img { height: 30px; margin-bottom: 40px; }
        h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 50px; letter-spacing: -0.05em; }
        
        .login-options { display: flex; flex-direction: column; gap: 20px; }
        .login-btn {
            padding: 25px; border: 2px solid #000; border-radius: 100px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s; text-decoration: none; color: #000;
        }
        .btn-web3 { background: #000; color: #FFF; }
        .btn-web3:hover { background: var(--accent); border-color: var(--accent); }
        .btn-web2:hover { border-color: var(--accent); color: var(--accent); }
        
        .footer-note { margin-top: 50px; font-size: 12px; font-weight: 900; opacity: 0.3; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png" alt="Prisicon"></div>
        <h1>MUZE Vault</h1>
        
        <div class="login-options">
            <a href="dashboard_web3.html" class="login-btn btn-web3">Web3 Neural Login</a>
            <a href="dashboard_web2.html" class="login-btn btn-web2">Web2 Standard Login</a>
        </div>
        
        <div class="footer-note">Sovereign Asset Protection</div>
    </div>
</body>
</html>
