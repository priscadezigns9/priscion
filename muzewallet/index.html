<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Sovereign Wallet v24.7.13</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; --muze-blue: #007AFF; --chillata: #FF4D4D;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; animation: none !important; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; width: 100vw; height: 100vh; }
        .layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFF; z-index: 100; padding: 20px; }
        .hidden { display: none !important; }
        .card-ui { text-align: center; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 30px; border: 1px solid var(--border); background: #FFF; }
        h2 { font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.85rem; line-height: 1.5; }
        input, textarea { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; text-align: center; font-size: 1rem; font-weight: 600; background: #F9F9F9; }
        .btn-full { background: var(--muze-blue); color: #fff; border: none; padding: 20px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-outline { background: #FFF; color: #000; border: 1px solid var(--border); padding: 18px; border-radius: 100px; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .seed-display { background: #F9F9F9; padding: 20px; border-radius: 15px; border: 1px solid var(--border); display: grid; gap: 10px; margin-bottom: 30px; }
        .word-item { font-size: 0.7rem; font-weight: 900; text-align: left; }
        .word-item span { color: #CCC; margin-right: 5px; }
        #app-ui { display: none; height: 100vh; width: 100vw; flex-direction: row; background: #FFF; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); background: #FAFAFA; display: flex; flex-direction: column; padding: 30px 0; }
        .nav-item { padding: 15px 30px; font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--text); background: #F0F0F0; }
        .stage { flex: 1; padding: 40px; overflow-y: auto; }
        .balance-card { border: 1px solid var(--border); border-radius: 30px; padding: 40px; background: #FFF; margin-bottom: 30px; }
        .balance-big { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin: 15px 0; }
        .profile { margin-top: auto; padding: 20px 30px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .card { border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; }
        .card-icon { font-size: 2rem; margin-bottom: 10px; }
        .card-label { font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; background: #FFF; z-index: 5000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #F3F3F3; border-top: 4px solid var(--muze-blue); border-radius: 50%; animation: spin 1s linear infinite !important; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-screen hidden"><div class="spinner"></div><p style="margin-top:20px; font-weight:900; font-size:0.7rem; letter-spacing:2px;">LEDGER HANDSHAKE...</p></div>
    <div id="layer-splash" class="layer"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:80px; opacity:0.8;"></div>
    <div id="layer-onboarding" class="layer hidden">
        <div class="card-ui">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:60px; margin-bottom:20px;">
            <h2>Muze Wallet</h2>
            <p>Non-Custodial. Handle-Anchored. Sovereign.</p>
            <button class="btn-full" onclick="startFlow('mustard-seed')">CLAIM MUSTARD SEED (FREE)</button>
            <button class="btn-outline" onclick="startFlow('create')">CREATE NEW VAULT</button>
            <button class="btn-outline" onclick="startFlow('recover')">RECOVER WITH SEED</button>
        </div>
    </div>
    <div id="layer-flow" class="layer hidden"><div id="flow-content" class="card-ui"></div></div>
    <div id="layer-auth" class="layer hidden">
        <div class="card-ui">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:50px; margin-bottom:20px;">
            <h2>Vault Locked</h2>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button class="btn-full" onclick="unlock()">UNLOCK VAULT</button>
            <div style="margin-top:20px; font-size:0.6rem; color:var(--muted); cursor:pointer; text-decoration:underline;" onclick="resetVault()">RESET VAULT</div>
        </div>
    </div>
    <div id="app-ui">
        <div class="sidebar">
            <div style="padding:0 30px 40px;"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:40px;"></div>
            <div class="nav-item active" onclick="showStage('vault', this)">Vault</div>
            <div class="nav-item" onclick="showStage('card', this)">Card</div>
            <div class="profile">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/pd_icon_512.png">
                <div id="user-handle" style="font-weight:900; font-size:0.8rem;">$handle.pri</div>
            </div>
        </div>
        <div id="stage-vault" class="stage">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:30px;">Vault.</h1>
            <div class="balance-card"><div id="balance" class="balance-big">$PRN 0.00</div></div>
            <div id="asset-grid" class="grid-container"></div>
        </div>
        <div id="stage-card" class="stage hidden">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:30px;">Sovereign Card.</h1>
            <div style="width:100%; max-width:400px; height:240px; background:#000; border-radius:20px; padding:30px; color:#fff; display:flex; flex-direction:column; justify-content:space-between;">
                <div style="font-family:monospace; font-size:1.2rem; letter-spacing:4px;">•••• •••• •••• 8830</div>
                <div id="card-handle" style="font-weight:900; letter-spacing:2px; text-transform:uppercase;">USER</div>
            </div>
        </div>
    </div>
    <script>
        const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SB_KEY = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const layers = { splash: 'layer-splash', onboarding: 'layer-onboarding', flow: 'layer-flow', auth: 'layer-auth', app: 'app-ui' };
        let walletState = null; let tempSeed = []; let tempPass = "";

        window.addEventListener('load', () => setTimeout(() => {
            document.getElementById(layers.splash).classList.add('hidden');
            const stored = localStorage.getItem('muze_vault_v1');
            if(stored) { walletState = JSON.parse(stored); document.getElementById(layers.auth).classList.remove('hidden'); }
            else document.getElementById(layers.onboarding).classList.remove('hidden');
        }, 1500));

        function startFlow(type) {
            document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
            document.getElementById(layers.flow).classList.remove('hidden');
            if(type === 'recover') return stepRecover();
            stepPassword(type);
        }

        function stepPassword(type) {
            const flow = document.getElementById('flow-content');
            flow.innerHTML = `<h2>Set Password</h2><p>Secure your local vault.</p>
                <input type="password" id="flow-pass" placeholder="Create Password">
                <button class="btn-full" onclick="savePassAndGoSeed('${type}')">CONTINUE</button>`;
        }

        function savePassAndGoSeed(type) {
            tempPass = document.getElementById('flow-pass').value;
            if(!tempPass) return alert("Password required.");
            stepSeed(type);
        }

        function stepSeed(type) {
            tempSeed = Array.from({length: Math.random() > 0.5 ? 24 : 12}, () => 
                ["alpha","bravo","charlie","delta","echo","foxtrot","golf","hotel","india","juliet","kilo","lima","mike","november","oscar","papa","quebec","romeo","sierra","tango","uniform","victor","whiskey","xray"][Math.floor(Math.random()*24)]);
            const flow = document.getElementById('flow-content');
            flow.innerHTML = `<h2>Your Seed</h2><p>Write these ${tempSeed.length} words down.</p>
                <div class="seed-display" style="grid-template-columns: repeat(${tempSeed.length === 24 ? 3 : 2}, 1fr);">
                    ${tempSeed.map((w,i)=>`<div class="word-item"><span>${i+1}.</span> ${w}</div>`).join('')}
                </div>
                <button class="btn-full" onclick="stepVerify('${type}')">I HAVE WRITTEN IT DOWN</button>`;
        }

        function stepVerify(type) {
            const flow = document.getElementById('flow-content');
            const idx1 = Math.floor(Math.random() * (tempSeed.length/2));
            const idx2 = Math.floor(Math.random() * (tempSeed.length/2)) + (tempSeed.length/2);
            flow.innerHTML = `<h2>Verify Seed</h2><p>Confirm Word #${idx1+1} and #${idx2+1}.</p>
                <input type="text" id="v1" placeholder="Word #${idx1+1}">
                <input type="text" id="v2" placeholder="Word #${idx2+1}">
                <button class="btn-full" onclick="checkVerify('${type}','${tempSeed[idx1]}','${tempSeed[idx2]}')">VERIFY</button>`;
        }

        function checkVerify(type, w1, w2) {
            if(document.getElementById('v1').value.trim().toLowerCase() === w1 && document.getElementById('v2').value.trim().toLowerCase() === w2) {
                if(type === 'mustard-seed') stepHandle(); else finalize(tempSeed.join(' '), '$user.pri');
            } else alert("Invalid words.");
        }

        function stepHandle() {
            const flow = document.getElementById('flow-content');
            flow.innerHTML = `<h2>Claim Handle</h2><p>Choose your .pri identity.</p>
                <input type="text" id="h-input" placeholder="$username.pri">
                <button class="btn-full" onclick="finalize(tempSeed.join(' '), document.getElementById('h-input').value)">ACTIVATE</button>`;
        }

        function stepRecover() {
            const flow = document.getElementById('flow-content');
            flow.innerHTML = `<h2>Recover</h2><textarea id="r-seed" placeholder="Enter seed phrase..."></textarea>
                <input type="password" id="r-pass" placeholder="New Password">
                <input type="text" id="r-handle" placeholder="Your $handle.pri">
                <button class="btn-full" onclick="finalize(document.getElementById('r-seed').value, document.getElementById('r-handle').value, document.getElementById('r-pass').value)">RESTORE</button>`;
        }

        async function finalize(seed, handle, pass = tempPass) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            walletState = { handle, password: pass, seed, balance: '1,250.00', assets: [{icon:'💳',label:'Sovereign Card',sub:'NFT'}] };
            try { await sb.from('ledger_state').upsert({ handle, balance: '1,250.00', ledger_data: walletState }, { onConflict: 'handle' }); } catch(e){}
            localStorage.setItem('muze_vault_v1', JSON.stringify(walletState));
            location.reload();
        }

        async function unlock() {
            if(document.getElementById('pass-input').value === walletState.password) {
                document.getElementById('loading-overlay').classList.remove('hidden');
                try { const {data} = await sb.from('ledger_state').select('ledger_data').eq('handle', walletState.handle).single(); if(data) walletState = data.ledger_data; } catch(e){}
                document.getElementById(layers.auth).classList.add('hidden');
                document.getElementById(layers.app).style.display = 'flex';
                document.getElementById('user-handle').innerText = walletState.handle;
                document.getElementById('balance').innerText = '$PRN ' + walletState.balance;
                document.getElementById('card-handle').innerText = walletState.handle;
                document.getElementById('asset-grid').innerHTML = walletState.assets.map(a=>`<div class="card"><div class="card-icon">${a.icon}</div><div class="card-label">${a.label}</div></div>`).join('');
                document.getElementById('loading-overlay').classList.add('hidden');
            } else alert("Wrong password.");
        }

        function resetVault() { if(confirm("Wipe all data?")) { localStorage.removeItem('muze_vault_v1'); location.reload(); } }
        function showStage(s, el) { document.querySelectorAll('.stage').forEach(x=>x.classList.add('hidden')); document.getElementById('stage-'+s).classList.remove('hidden'); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }
    </script>
</body>
</html>
