<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Independent Wallet</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { 
            --bg: #fff; 
            --text: #000; 
            --muted: #AAA; 
            --border: #EEE; 
            --accent: #7B35D4; 
            --muze-blue: #5AC8FA;
            --chillata: #FF4D4D;
        }
        /* RESET ALL ANIMATIONS AND TRANSITIONS FOR STABILITY */
        * { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; animation: none !important; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
        }
        
        .layer { 
            position: fixed; 
            inset: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #FFF; 
            z-index: 100; 
            padding: 20px;
        }
        .hidden { display: none !important; }

        /* Splash */
        .splash-logo { width: 80px; opacity: 0.8; }

        /* Onboarding */
        .card-ui { text-align: center; max-width: 400px; width: 100%; }
        h2 { font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.85rem; line-height: 1.5; }
        input { 
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); 
            margin-bottom: 15px; outline: none; text-align: center; font-size: 1rem; 
            font-weight: 600; background: #F9F9F9; 
        }
        .btn-full { background: var(--muze-blue); color: #fff; border: none; padding: 20px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(90, 200, 250, 0.2); margin-bottom: 10px; }
        .btn-outline { background: #FFF; color: #000; border: 1px solid var(--border); padding: 18px; border-radius: 100px; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; width: 100%; margin-bottom: 10px; }

        /* Main App UI */
        #app-ui { display: none; height: 100vh; width: 100vw; flex-direction: row; background: #FFF; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); background: #FAFAFA; display: flex; flex-direction: column; padding: 30px 0; }
        .nav-item { padding: 15px 30px; font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--text); background: #F0F0F0; }
        .stage { flex: 1; padding: 40px; overflow-y: auto; }
        
        @media (max-width: 768px) {
            #app-ui { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 0; flex-direction: row; justify-content: space-around; }
            .nav-item { padding: 10px; font-size: 0.6rem; letter-spacing: 0.5px; }
            .sidebar > div:first-child, .profile { display: none; }
            .stage { padding: 25px; }
            .balance-big { font-size: 3rem !important; }
        }

        .balance-card { border: 1px solid var(--border); border-radius: 30px; padding: 40px; background: #FFF; margin-bottom: 30px; }
        .balance-big { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin: 15px 0; }
        .profile { margin-top: auto; padding: 20px 30px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* Lynx Messenger - Multi-Chat UI */
        .messenger-container { display: flex; height: 100%; gap: 30px; }
        .chat-list { width: 280px; border-right: 1px solid var(--border); padding-right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .chat-view { flex: 1; display: flex; flex-direction: column; height: 100%; max-width: 600px; }
        
        @media (max-width: 900px) {
            .chat-list { display: none; } /* Hide list on mobile for now, can add toggle later */
            .messenger-container { justify-content: center; }
        }

        .chat-item { padding: 15px; border-radius: 15px; background: #F9F9F9; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid transparent; }
        .chat-item.active { background: #FFF; border-color: var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .chat-item img { width: 35px; height: 35px; border-radius: 50%; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-handle { font-weight: 900; font-size: 0.75rem; letter-spacing: 0.5px; }
        .chat-last { font-size: 0.6rem; color: #AAA; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }

        .chat-header { padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .chat-header-img { width: 45px; height: 45px; border-radius: 50%; }
        .chat-box { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; margin-bottom: 15px; padding-right: 10px; }
        .msg { padding: 12px 18px; border-radius: 18px; font-size: 0.85rem; max-width: 85%; line-height: 1.4; }
        .msg.received { align-self: flex-start; background: #F0F0F0; color: #000; }
        .msg.sent { align-self: flex-end; background: #000; color: #FFF; }
        .msg-time { text-align: right; font-size: 0.55rem; opacity: 0.5; margin-top: 4px; }
        
        .search-handle-row { background: #F9F9F9; border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .search-input { border: none; background: none; outline: none; font-size: 0.7rem; font-weight: 900; flex: 1; text-transform: lowercase; }
    </style>
</head>
<body>

    <!-- Layers -->
    <div id="layer-splash" class="layer"><img src="../assets/muse_logo.png" class="splash-logo" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_logo.png'"></div>
    <div id="layer-onboarding" class="layer hidden">
        <div class="card-ui">
            <img src="../assets/muse_logo.png" style="width:60px; margin-bottom:20px;" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_logo.png'">
            <h2>Sovereign Start</h2>
            <button class="btn-full" onclick="startFlow('create')">CREATE NEW VAULT</button>
            <button class="btn-outline" onclick="startFlow('recover')">RECOVER WITH SEED</button>
            <button class="btn-outline" onclick="startFlow('ledger')">CONNECT TO LEDGER</button>
        </div>
    </div>
    <div id="layer-flow" class="layer hidden"><div id="flow-content" class="card-ui"></div></div>
    <div id="layer-auth" class="layer hidden">
        <div class="card-ui">
            <img src="../assets/muse_logo.png" style="width:50px; margin-bottom:20px;" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_logo.png'">
            <h2>Vault Locked</h2>
            <input type="password" id="pass-input" placeholder="Password">
            <button class="btn-full" onclick="unlock()">UNLOCK VAULT</button>
        </div>
    </div>

    <!-- App UI -->
    <div id="app-ui">
        <div class="sidebar">
            <div style="padding: 0 30px 40px;"><img src="../assets/muse_logo.png" style="width: 40px;" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_logo.png'"></div>
            <div class="nav-item active" onclick="showStage('vault', this)">Vault</div>
            <div class="nav-item" onclick="showStage('swap', this)">Swap</div>
            <div class="nav-item" onclick="showStage('staking', this)">Stake</div>
            <div class="nav-item" onclick="showStage('messenger', this)">Lynx</div>
            <div class="nav-item" onclick="showStage('dapps', this)">Dapps</div>
            <div class="profile">
                <img src="../assets/pd_icon_512.png" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/pd_icon_512.png'">
                <div><div id="user-handle" style="font-weight:900; font-size:0.8rem;">$prisca.pri</div><div style="font-size:0.5rem; color:#999; letter-spacing:1px; text-transform:uppercase; font-weight:900;">Active Node</div></div>
            </div>
        </div>
        
        <div id="stage-vault" class="stage">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:30px;">Vault.</h1>
            <div class="balance-card">
                <div style="font-weight:900; color:#AAA; letter-spacing:2px; text-transform:uppercase; font-size:0.6rem; margin-bottom:10px;">Reserve</div>
                <div id="balance" class="balance-big">$PRN 12,500</div>
                <div style="display:flex; gap:10px;"><button class="btn-full" style="width:auto; padding: 15px 30px; background:#000; font-size:0.6rem;">SEND</button><button class="btn-outline" style="width:auto; padding: 15px 30px; margin:0; font-size:0.6rem;">RECEIVE</button></div>
            </div>
            <div style="font-weight:900; letter-spacing:2px; font-size:0.7rem; margin-bottom:20px; color:#999;">ASSETS</div>
            <div id="asset-grid" class="grid-container"></div>
        </div>

        <!-- Stages omitted for brevity but preserved in full script below -->
        <div id="stage-swap" class="stage hidden">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:40px;">
                <img src="../assets/chillata_logo.png" style="height:40px;" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/chillata_logo.png'">
                <h1 style="font-size:2.5rem; font-weight:900; margin:0;">Chillata.</h1>
            </div>
            <div class="balance-card">
                <div style="background:#F9F9F9; padding:20px; border-radius:15px; border:1px solid #EEE; margin-bottom:15px;">
                    <div style="font-size:0.5rem; font-weight:900; color:#888;">FROM</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <input type="number" value="100" style="background:none; border:none; font-size:1.5rem; font-weight:900; width:60%; outline:none; text-align:left; margin:0;">
                        <div style="background:#FFF; padding:8px 15px; border-radius:100px; font-weight:900; font-size:0.7rem; border:1px solid #EEE;">$PRN</div>
                    </div>
                </div>
                <button class="btn-full" style="background:var(--chillata);">EXECUTE CHILLATA SWAP</button>
            </div>
        </div>

        <div id="stage-staking" class="stage hidden">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:40px;">Staking.</h1>
            <div class="balance-card"><div style="color:var(--accent); font-size:3rem; font-weight:900;">12.5% <span style="font-size:1rem; color:#AAA;">APY</span></div><button class="btn-full" style="background:var(--accent); margin-top:20px;">STAKE $PRN</button></div>
        </div>

        <div id="stage-messenger" class="stage hidden">
            <div class="messenger-container">
                <div class="chat-list">
                    <div class="search-handle-row">
                        <span style="font-size:0.8rem;">🔍</span>
                        <input type="text" id="search-handle" class="search-input" placeholder="Search handle..." onkeypress="handleSearch(event)">
                    </div>
                    <div id="active-chats-list">
                        <!-- Chat List Items -->
                    </div>
                </div>
                <div class="chat-view">
                    <div id="chat-header" class="chat-header">
                        <img src="../assets/lynx_logo.png" class="chat-header-img" id="header-avatar" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/lynx_logo.png'">
                        <div>
                            <div id="header-handle" style="font-weight:900; font-size:0.85rem; letter-spacing:1px;">LYNX ARCHITECT</div>
                            <div id="header-status" style="font-size:0.55rem; color:var(--muze-blue); font-weight:900; text-transform:uppercase; margin-top:3px;">Always Online</div>
                        </div>
                    </div>
                    <div id="chat-box" class="chat-box"></div>
                    <div class="chat-input-row">
                        <input id="lynx-input" type="text" placeholder="Message..." class="chat-input" onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()" class="btn-send">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="stage-dapps" class="stage hidden">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:40px;">Dapps.</h1>
            <div class="grid-container">
                <div class="card" onclick="window.open('../pulse/')"><img src="../assets/pulse_logo.png" style="height:30px; margin-bottom:10px;" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/pulse_logo.png'"><div class="card-label">PULSE</div></div>
                <div class="card" onclick="window.open('../dreaminganime/')"><div class="card-icon">🎬</div><div class="card-label">DREAMING</div></div>
            </div>
        </div>
    </div>

    <script>
        const layers = { splash: 'layer-splash', onboarding: 'layer-onboarding', flow: 'layer-flow', auth: 'layer-auth', app: 'app-ui' };
        let walletState = JSON.parse(localStorage.getItem('muze_vault_v1'));
        let activeChat = '$architect';
        let conversations = JSON.parse(localStorage.getItem('muze_chats_v1')) || {
            '$architect': { handle: 'LYNX ARCHITECT', avatar: 'https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/lynx_logo.png', messages: [{ from: 'received', text: 'Sovereign Node Online. Handshake Verified.', time: '09:00' }] }
        };

        setTimeout(() => {
            document.getElementById(layers.splash).classList.add('hidden');
            if(!walletState) document.getElementById(layers.onboarding).classList.remove('hidden');
            else document.getElementById(layers.auth).classList.remove('hidden');
        }, 1500);

        function startFlow(type) {
            document.getElementById(layers.onboarding).classList.add('hidden');
            document.getElementById(layers.flow).classList.remove('hidden');
            let content = '';
            if(type==='create') content = `<h2>Create Vault</h2><p>Encrypt your Sovereign Node.</p><input type="password" id="new-pass" placeholder="Password"><button class="btn-full" onclick="finalizeSetup('create')">GENERATE</button>`;
            if(type==='recover') content = `<h2>Recover</h2><p>Enter 24-word Seed Phrase.</p><input type="text" placeholder="Seed Phrase"><input type="password" id="new-pass" placeholder="New Password"><button class="btn-full" onclick="finalizeSetup('recover')">RESTORE</button>`;
            if(type==='ledger') content = `<h2>Connect</h2><p>Scanning Sovereign Ledger...</p><div style="padding:20px; color:var(--muze-blue); font-weight:900;">SEARCHING...</div><button class="btn-outline" onclick="finalizeSetup('ledger')">SYNC (DEV)</button>`;
            document.getElementById('flow-content').innerHTML = content;
        }

        function finalizeSetup(type) {
            const pass = document.getElementById('new-pass')?.value || 'password';
            walletState = { handle: '$prisca.pri', password: pass, balance: '12,500.00', assets: [{icon:'🏷️',label:'$prisca.pri',sub:'ALPHA'},{icon:'🏷️',label:'$vogue.pri',sub:'ALPHA'}] };
            localStorage.setItem('muze_vault_v1', JSON.stringify(walletState));
            location.reload();
        }

        function unlock() {
            if(document.getElementById('pass-input').value === walletState.password) {
                document.getElementById(layers.auth).classList.add('hidden');
                document.getElementById(layers.app).style.display = 'flex';
                initApp();
            } else alert("Incorrect.");
        }

        function initApp() {
            document.getElementById('user-handle').innerText = walletState.handle;
            document.getElementById('balance').innerText = '$PRN ' + walletState.balance;
            document.getElementById('asset-grid').innerHTML = walletState.assets.map(a => `<div class="card" onclick="openChat('${a.label}')"><div class="card-icon">${a.icon}</div><div class="card-label">${a.label}</div><div style="font-size:0.5rem; color:#999; margin-top:5px; font-weight:700;">${a.sub}</div></div>`).join('');
            renderChatList();
            renderActiveChat();
        }

        function renderChatList() {
            const list = document.getElementById('active-chats-list');
            list.innerHTML = Object.keys(conversations).map(h => {
                const c = conversations[h];
                const last = c.messages[c.messages.length-1];
                return `<div class="chat-item ${h===activeChat?'active':''}" onclick="openChat('${h}')">
                    <img src="${c.avatar}" onerror="this.src='https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_logo.png'">
                    <div class="chat-info">
                        <div class="chat-handle">${c.handle}</div>
                        <div class="chat-last">${last.text}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function openChat(handle) {
            if(!conversations[handle]) {
                conversations[handle] = { handle: handle.toUpperCase(), avatar: '../assets/pd_icon_512.png', messages: [{ from: 'received', text: 'Identity anchored. Communication channel established.', time: 'Now' }] };
                saveChats();
            }
            activeChat = handle;
            showStage('messenger', document.querySelector('.nav-item:nth-child(5)'));
            renderChatList();
            renderActiveChat();
        }

        function renderActiveChat() {
            const c = conversations[activeChat];
            document.getElementById('header-avatar').src = c.avatar;
            document.getElementById('header-handle').innerText = c.handle;
            document.getElementById('header-status').innerText = (activeChat==='$architect') ? 'Always Online' : 'On-Ledger';
            const box = document.getElementById('chat-box');
            box.innerHTML = c.messages.map(m => `<div class="msg ${m.from}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('lynx-input');
            const text = input.value.trim();
            if(!text) return;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            conversations[activeChat].messages.push({ from: 'sent', text, time });
            input.value = '';
            renderActiveChat();
            renderChatList();
            saveChats();
            if(activeChat==='$architect') {
                setTimeout(() => {
                    conversations[activeChat].messages.push({ from: 'received', text: 'Signal anchored to $prisca.pri ledger.', time });
                    renderActiveChat();
                    renderChatList();
                    saveChats();
                }, 800);
            }
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                const handle = document.getElementById('search-handle').value.trim();
                if(handle) openChat(handle);
                document.getElementById('search-handle').value = '';
            }
        }

        function saveChats() { localStorage.setItem('muze_chats_v1', JSON.stringify(conversations)); }
        function showStage(stage, el) {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden'));
            document.getElementById('stage-' + stage).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
