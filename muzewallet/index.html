<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | User Console</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #F0F9FF; --text: #000; --muted: #64748b; --border: #bae6fd; --muze-blue: #5AC8FA; --accent: #0ea5e9; --surface: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; display: flex; opacity: 0; }
        body.loaded { opacity: 1; }

        h1, h2, h3, .playfair { font-family: 'Playfair Display', serif; }
        
        .hidden { display: none !important; }
        
        /* Entrance Layer */
        .layer { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .muze-entrance-logo { height: 60px; width: auto; object-fit: contain; margin-bottom: 30px; cursor: pointer; }
        
        /* Sidebar Navigation */
        .sidebar { width: 280px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0; }
        .sidebar-logo { height: 35px; width: auto; object-fit: contain; margin-bottom: 40px; cursor: pointer; }
        .nav-item { padding: 14px 20px; border-radius: 16px; margin-bottom: 8px; cursor: pointer; font-weight: 700; color: var(--muted); font-size: 14px; }
        .nav-item:hover { background: var(--bg); color: var(--text); }
        .nav-item.active { background: var(--text); color: #fff; }

        /* Main Content */
        .content { flex: 1; height: 100vh; padding: 60px; overflow-y: auto; background: var(--surface); }

        .stage { max-width: 900px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .balance-card { background: #fff; border: 1px solid var(--border); padding: 40px; border-radius: 32px; margin-bottom: 40px; text-align: center; box-shadow: 0 20px 40px rgba(186, 230, 253, 0.2); }
        .balance-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 900; margin-bottom: 10px; display: block; }
        .balance-value { font-size: 48px; font-weight: 900; font-family: 'Playfair Display', serif; }

        .asset-list { display: grid; gap: 16px; }
        .asset-item { background: #fff; border: 1px solid var(--border); padding: 24px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; }
        .asset-info { display: flex; align-items: center; gap: 16px; }
        .asset-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
        .asset-name { font-weight: 800; font-size: 15px; }
        .asset-symbol { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
        .asset-amount { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 20px; }

    </style>
</head>
<body>

    <div id="layer-entrance" class="layer">
        <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" class="muze-entrance-logo" id="muze-logo">
        <h1 style="font-size: 32px; margin-bottom: 10px;">MUZE</h1>
        <p style="color: var(--muted); margin-bottom: 30px;">Priscion Ledger Access Point</p>
        <button onclick="location.href='login.html'" style="background: var(--text); color: #fff; border: none; padding: 16px 40px; border-radius: 100px; font-weight: 900; cursor: pointer; letter-spacing: 1px;">SIGN IN</button>
    </div>

    <div class="sidebar">
        <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" class="sidebar-logo">
        <div id="nav-vault" class="nav-item active" onclick="showStage('vault', this)">Vault</div>
        <div id="nav-card" class="nav-item" onclick="showStage('card', this)">Digital Card</div>
        <div id="nav-settings" class="nav-item" onclick="showStage('settings', this)">Settings</div>
        <div style="margin-top: auto;">
            <div id="active-handle-display" style="font-size: 10px; font-weight: 900; color: var(--muted); letter-spacing: 1px; margin-bottom: 20px; text-align: center;">...</div>
            <button onclick="logout()" style="width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--border); background: #fff; font-weight: 900; cursor: pointer;">LOCK</button>
        </div>
    </div>

    <div class="content">
        <!-- Stage: Vault -->
        <div id="stage-vault" class="stage">
            <div class="balance-card">
                <span class="balance-label">Total PRN Balance</span>
                <div class="balance-value"><span id="prn-balance">0</span> <span style="font-size: 20px; color: var(--muted);">$PRN</span></div>
            </div>
            <div class="asset-list">
                <div class="asset-item">
                    <div class="asset-info">
                        <div class="asset-icon">PRN</div>
                        <div><div class="asset-name">Priscion</div><div class="asset-symbol">Network Utility</div></div>
                    </div>
                    <div class="asset-amount" id="list-prn">0</div>
                </div>
                <div class="asset-item">
                    <div class="asset-info">
                        <div class="asset-icon">NRL</div>
                        <div><div class="asset-name">Neural</div><div class="asset-symbol">Reserve Gov</div></div>
                    </div>
                    <div class="asset-amount">2,500</div>
                </div>
                <div class="asset-item">
                    <div class="asset-info">
                        <div class="asset-icon">JLO</div>
                        <div><div class="asset-name">Chillata</div><div class="asset-symbol">Privacy Layer</div></div>
                    </div>
                    <div class="asset-amount">0</div>
                </div>
            </div>
        </div>

        <!-- Stage: Card -->
        <div id="stage-card" class="stage hidden" style="text-align: center;">
            <h2 style="margin-bottom: 30px;">Digital Card</h2>
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/card.png" style="width: 100%; max-width: 500px; border-radius: 24px; box-shadow: 0 20px 50px rgba(186, 230, 253, 0.4);">
        </div>

        <!-- Stage: Settings -->
        <div id="stage-settings" class="stage hidden">
            <h2>Neural Settings</h2>
            <p style="color: var(--muted); margin-top: 20px;">Synchronizing with ledger...</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const supabaseKey = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function showStage(id, el) {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden'));
            document.getElementById('stage-' + id).classList.remove('hidden');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function logout() {
            localStorage.clear();
            location.href = 'login.html';
        }

        async function fetchLiveBalance(userId) {
            const { data } = await supabaseClient.from('profiles').select('balance_prn').eq('id', userId).single();
            if (data) {
                const bal = (data.balance_prn || 0).toLocaleString();
                document.getElementById('prn-balance').innerText = bal;
                document.getElementById('list-prn').innerText = bal;
            }
        }

        window.addEventListener('message', async (event) => {
            if (event.data.type === 'GOD_MODE_HANDSHAKE') {
                localStorage.setItem('muze_active', 'true');
                localStorage.setItem('muze_handle', event.data.handle || 'prisca.pri');
                location.reload();
            }
            if (event.data.type === 'NAVIGATE') {
                const navId = 'nav-' + event.data.hash;
                const el = document.getElementById(navId);
                showStage(event.data.hash, el);
            }
        });

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const isActive = localStorage.getItem('muze_active') === 'true';

            if (session || isActive) {
                document.getElementById('layer-entrance').style.display = 'none';
                if (session) await fetchLiveBalance(session.user.id);
                document.getElementById('active-handle-display').innerText = localStorage.getItem('muze_handle') || 'prisca.pri';
            } else {
                document.getElementById('layer-entrance').style.display = 'flex';
            }
            document.body.classList.add('loaded');
        };
    </script>
</body>
</html>
