<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Sovereign Wallet v24.7.5</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #fff; 
            --text: #000; 
            --muted: #AAA; 
            --border: #EEE; 
            --accent: #7B35D4; 
            --muze-blue: #007AFF;
            --chillata: #FF4D4D;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; animation: none !important; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; width: 100vw; height: 100vh; }
        
        .layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFF; z-index: 100; padding: 20px; }
        .hidden { display: none !important; }

        /* Splash */
        .splash-logo { width: 80px; opacity: 0.8; }

        /* Card UI */
        .card-ui { text-align: center; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 30px; border: 1px solid var(--border); background: #FFF; }
        h2 { font-weight: 900; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.85rem; line-height: 1.5; }
        input, select { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; text-align: center; font-size: 1rem; font-weight: 600; background: #F9F9F9; }
        .btn-full { background: var(--muze-blue); color: #fff; border: none; padding: 20px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.1); margin-bottom: 10px; }
        .btn-outline { background: #FFF; color: #000; border: 1px solid var(--border); padding: 18px; border-radius: 100px; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; width: 100%; margin-bottom: 10px; }

        /* Seed Grid */
        .seed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; text-align: left; }
        .seed-input-container { position: relative; }
        .seed-number { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.6rem; font-weight: 900; color: #CCC; pointer-events: none; }
        .seed-word { padding: 12px 10px 12px 30px !important; font-size: 0.75rem !important; margin: 0 !important; text-align: left !important; }
        .seed-display { background: #F9F9F9; padding: 20px; border-radius: 15px; border: 1px solid var(--border); display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .word-item { font-size: 0.7rem; font-weight: 900; text-align: left; }
        .word-item span { color: #CCC; margin-right: 5px; }

        /* Sidebar & Layout */
        #app-ui { display: none; height: 100vh; width: 100vw; flex-direction: row; background: #FFF; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); background: #FAFAFA; display: flex; flex-direction: column; padding: 30px 0; }
        .nav-item { padding: 15px 30px; font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--text); background: #F0F0F0; }
        .stage { flex: 1; padding: 40px; overflow-y: auto; }
        
        @media (max-width: 768px) {
            #app-ui { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 0; flex-direction: row; justify-content: space-around; }
            .nav-item { padding: 10px; font-size: 0.6rem; letter-spacing: 0.5px; }
            .sidebar > div:first-child, .profile { display: none; }
            .stage { padding: 25px; }
            .balance-big { font-size: 3rem !important; }
            .seed-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .balance-card { border: 1px solid var(--border); border-radius: 30px; padding: 40px; background: #FFF; margin-bottom: 30px; }
        .balance-big { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin: 15px 0; }
        .profile { margin-top: auto; padding: 20px 30px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* Asset Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .card { border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; }
        .card-icon { font-size: 2rem; margin-bottom: 10px; }
        .card-label { font-weight: 900; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }

        /* Digital Card */
        .digital-card { width: 100%; max-width: 400px; height: 250px; border-radius: 24px; background: linear-gradient(135deg, #0A0A0A 0%, #222 100%); box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 30px; display: flex; flex-direction: column; justify-content: space-between; color: #FFF; position: relative; overflow: hidden; margin-bottom: 40px; }
        .card-chip { width: 40px; height: 32px; background: #E5A93B; border-radius: 6px; }
        .card-number { font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; word-spacing: 5px; font-family: monospace; }
        .card-holder { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; font-weight: 600; }

        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; background: #FFF; z-index: 5000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #F3F3F3; border-top: 4px solid var(--muze-blue); border-radius: 50%; animation: spin 1s linear infinite !important; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay" class="loading-screen hidden">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-weight:900; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;">Ledger Handshake...</p>
    </div>

    <!-- Splash Layer -->
    <div id="layer-splash" class="layer">
        <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" class="splash-logo" alt="MUZE">
    </div>

    <!-- Onboarding Layers -->
    <div id="layer-onboarding" class="layer hidden">
        <div class="card-ui">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:60px; margin-bottom:20px;">
            <h2>Muze Wallet</h2>
            <p>Non-Custodial. Handle-Anchored. Sovereign.</p>
            <button class="btn-full" onclick="startFlow('mustard-seed')">CLAIM MUSTARD SEED (FREE)</button>
            <button class="btn-outline" onclick="startFlow('create')">CREATE NEW VAULT</button>
            <button class="btn-outline" onclick="startFlow('recover')">RECOVER WITH SEED</button>
        </div>
    </div>

    <div id="layer-flow" class="layer hidden"><div id="flow-content" class="card-ui"></div></div>

    <div id="layer-auth" class="layer hidden">
        <div class="card-ui">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width:50px; margin-bottom:20px;">
            <h2>Vault Locked</h2>
            <input type="password" id="pass-input" placeholder="Enter Password">
            <button class="btn-full" onclick="unlock()">UNLOCK VAULT</button>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="app-ui">
        <div class="sidebar">
            <div style="padding: 0 30px 40px;"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muse_icon.png" style="width: 40px;"></div>
            <div class="nav-item active" onclick="showStage('vault', this)">Vault</div>
            <div class="nav-item" onclick="showStage('card', this)">Card</div>
            <div class="nav-item" onclick="showStage('swap', this)">Swap</div>
            <div class="profile">
                <img id="sidebar-pfp" src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/pd_icon_512.png">
                <div><div id="user-handle" style="font-weight:900; font-size:0.8rem;">$handle.pri</div></div>
            </div>
        </div>
        
        <div id="stage-vault" class="stage">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:30px;">Vault.</h1>
            <div class="balance-card">
                <div id="balance" class="balance-big">$PRN 0.00</div>
                <button class="btn-full" style="width:auto; padding: 15px 30px; background:#000;">SEND</button>
            </div>
            <div id="asset-grid" class="grid-container"></div>
        </div>

        <div id="stage-card" class="stage hidden">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:30px;">Sovereign Card.</h1>
            <div class="digital-card">
                <div class="card-number">•••• •••• •••• 8830</div>
                <div class="card-holder">USER</div>
            </div>
        </div>

        <div id="stage-swap" class="stage hidden">
            <h1 style="font-size:2.5rem; font-weight:900; margin-bottom:40px;">Swap.</h1>
            <div class="balance-card">
                <button class="btn-full" style="background:var(--chillata);">EXECUTE SWAP</button>
            </div>
        </div>
    </div>

    <script>
        const layers = { splash: 'layer-splash', onboarding: 'layer-onboarding', flow: 'layer-flow', auth: 'layer-auth', app: 'app-ui' };
        let walletState = null;

        // EMERGENCY SPLASH KILLER: Force hide splash after 2 seconds no matter what
        window.addEventListener('load', () => {
            setTimeout(killSplash, 2000);
        });
        
        // Backup killer
        setTimeout(killSplash, 4000);

        function killSplash() {
            const s = document.getElementById(layers.splash);
            if (s && !s.classList.contains('hidden')) {
                console.log("Forcing splash hide...");
                s.classList.add('hidden');
                initOnboarding();
            }
        }

        function initOnboarding() {
            try {
                const stored = localStorage.getItem('muze_vault_v1');
                if (stored && stored !== "[object Object]") {
                    walletState = JSON.parse(stored);
                }
            } catch(e) {
                console.error("Vault corruption detected. Resetting.");
                localStorage.removeItem('muze_vault_v1');
            }

            if(!walletState) {
                document.getElementById(layers.onboarding).classList.remove('hidden');
            } else {
                document.getElementById(layers.auth).classList.remove('hidden');
            }
        }

        function startFlow(type) {
            document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
            document.getElementById(layers.flow).classList.remove('hidden');
            const flow = document.getElementById('flow-content');
            if(type === 'mustard-seed') {
                flow.innerHTML = `<h2>Claim Handle</h2><input type="password" id="new-pass" placeholder="Vault Password"><input type="text" id="seed-handle" placeholder="$username.pri"><button class="btn-full" onclick="finalizeSetup()">CLAIM</button>`;
            } else if(type === 'create') {
                flow.innerHTML = `<h2>New Vault</h2><input type="password" id="new-pass" placeholder="Create Password"><button class="btn-full" onclick="finalizeSetup()">GENERATE</button>`;
            }
        }

        function finalizeSetup() {
            const pass = document.getElementById('new-pass').value;
            const handle = document.getElementById('seed-handle')?.value || '$user.pri';
            walletState = { handle, password: pass, balance: '1,250.00', assets: [] };
            localStorage.setItem('muze_vault_v1', JSON.stringify(walletState));
            location.reload();
        }

        function unlock() {
            if(document.getElementById('pass-input').value === walletState.password) {
                document.getElementById(layers.auth).classList.add('hidden');
                document.getElementById(layers.app).style.display = 'flex';
                document.getElementById('user-handle').innerText = walletState.handle;
                document.getElementById('balance').innerText = '$PRN ' + walletState.balance;
            } else alert("Incorrect.");
        }

        function showStage(stage, el) {
            document.querySelectorAll('.stage').forEach(s => s.classList.add('hidden'));
            document.getElementById('stage-' + stage).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
