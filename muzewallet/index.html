<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | High-Fidelity Neural Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #FFFFFF; --text: #000; --muted: #888; --muze-blue: #5AC8FA; --border: #F0F0F0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; overflow: hidden; }
        
        .login-card { 
            width: 90%; max-width: 400px; padding: 60px 40px; 
            background: #fff; border-radius: 40px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .logo { height: 60px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 40px; line-height: 1.4; }

        .input-group { text-align: left; margin-bottom: 25px; }
        .input-label { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; color: var(--muze-blue); }
        input { width: 100%; padding: 20px; border-radius: 16px; border: 1px solid var(--border); background: #FAFAFA; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--muze-blue); background: #fff; }

        .btn-neural { width: 100%; background: #000; color: #fff; padding: 20px; border-radius: 100px; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-neural:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* SECRET TRIGGER: Hidden in plain sight */
        .vault-trigger { margin-top: 40px; font-weight: 900; font-size: 0.65rem; color: #fff; letter-spacing: 2px; text-transform: uppercase; cursor: default; }
        .vault-trigger.active { color: var(--muted); cursor: pointer; }
        .vault-trigger.active:hover { color: var(--text); }
        
        .badge { position: fixed; bottom: 30px; font-weight: 900; font-size: 0.5rem; color: #EEE; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="../assets/muze_icon_logo.png" class="logo" alt="MUZE">
        <h1>Welcome to MUZE.</h1>
        <p>Your secure bridge to the Priscion Network.</p>

        <div class="input-group">
            <span class="input-label">Neural Handle</span>
            <input type="text" placeholder="prisca.pri" id="handle">
        </div>

        <button class="btn-neural" onclick="handleLogin()">INITIALIZE LOGIN</button>

        <!-- Architect Secret: Double-tap the logo to reveal the vault entrance -->
        <div class="vault-trigger" id="v-trigger" onclick="location.href='vault.html'">ACCESS ARCHITECT VAULT →</div>
    </div>

    <div class="badge">LIVE MODE ACTIVE V3.0</div>

    <script>
        let clicks = 0;
        document.querySelector('.logo').onclick = function() {
            clicks++;
            if (clicks === 5) {
                document.getElementById('v-trigger').classList.add('active');
            }
        };

        function handleLogin() {
            const h = document.getElementById('handle').value;
            if(h === 'prisca.pri') {
                location.href='vault.html';
            } else {
                alert('Account not found on Priscion L1.');
            }
        }
    </script>
</body>
</html>
