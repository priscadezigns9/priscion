<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZE | Prisca Dezigns Network</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --accent: #7B35D4;
            --muze-blue: #5AC8FA;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --border: #EEE;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; font-family: var(--font-body); background: var(--bg); color: #000; min-height: 100vh; overflow-x: hidden; }
        
        .hidden { display: none !important; }

        /* Entrance Layer (The "Old Move" Onboarding) */
        .layer {
            position: fixed; inset: 0; background: #fff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }
        .layer.dismissed { transform: translateY(-100%); opacity: 0; pointer-events: none; visibility: hidden; }

        .logo-main { height: 60px; margin-bottom: 40px; }
        h1 { font-family: var(--font-heading); font-size: 4.5rem; margin-bottom: 20px; letter-spacing: -0.05em; line-height: 0.85; }
        .layer p { font-weight: 900; opacity: 0.4; margin-bottom: 60px; text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; max-width: 300px; line-height: 1.6; }
        
        .onboarding-grid { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; }
        .btn-full {
            padding: 25px; background: #000; color: #FFF; border: none; border-radius: 100px;
            font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2em;
            transition: all 0.3s;
        }
        .btn-full:hover { background: var(--accent); transform: translateY(-3px); }
        .btn-outline {
            padding: 22px; background: #FFF; color: #000; border: 2px solid #EEE; border-radius: 100px;
            font-weight: 900; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.15em;
            transition: all 0.3s;
        }
        .btn-outline:hover { border-color: #000; }

        /* Login Stage (Neural Login) */
        .login-box { width: 100%; max-width: 450px; padding: 60px; text-align: center; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .logo-login img { height: 35px; margin-bottom: 40px; }
        .login-box h2 { font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 50px; letter-spacing: -0.05em; line-height: 0.9; cursor: pointer; }
        
        .login-options { display: flex; flex-direction: column; gap: 20px; }
        .login-btn {
            padding: 30px; border: 2px solid #000; border-radius: 100px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); text-decoration: none; color: #000;
            text-transform: uppercase; letter-spacing: 0.2em;
            display: block;
        }
        .btn-primary { background: #000; color: #FFF; }
        .btn-primary:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-5px); }
        .btn-secondary { opacity: 0.6; font-size: 0.9rem; border-color: rgba(0,0,0,0.1); }
        .btn-secondary:hover { border-color: #000; color: #000; opacity: 1; }

        .footer-note { margin-top: auto; padding-top: 40px; font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 0.3em; text-transform: uppercase; }

        /* Tree SVG */
        .mustard-tree { width: 100px; height: 100px; margin-bottom: 30px; }
        .tree-path { stroke: var(--accent); stroke-width: 3; fill: none; opacity: 0.8; }
    </style>
</head>
<body>

    <!-- Onboarding Entrance -->
    <div id="layer-entrance" class="layer">
        <div class="logo-main"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" alt="MUZE" style="height: 80px;"></div>
        <h1>Welcome<br>to MUZE.</h1>
        <p>The sovereign bridge to the Prisca Dezigns Network. Architect your digital identity.</p>
        
        <div class="onboarding-grid">
            <button class="btn-full" onclick="showLogin()">Login</button>
            <button class="btn-full" style="background: var(--muze-blue);" onclick="location.href='signup.html'">Create Account</button>
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); width: 100%;">
                <p style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--muze-blue); margin-bottom: 20px;">SOVEREIGN WEB3 ACCESS</p>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-outline" style="flex: 1; font-size: 10px;" onclick="location.href='create.html'">Create Wallet</button>
                    <button class="btn-outline" style="flex: 1; font-size: 10px;" onclick="location.href='recover.html'">Restore Wallet</button>
                    <button class="btn-outline" style="flex: 1; font-size: 10px; width: 100%; margin-top: 10px;" onclick="location.href='ledger.html'">Connect Ledger</button>
                </div>
            </div>
        </div>
        
        <div class="footer-note" style="margin-top: 60px;">MUZE // PRISCION BLOCKCHAIN</div>
    </div>

    <!-- MAIN GATEWAY: Neural Login -->
    <div id="layer-login" class="login-box" style="display: none;">
        <button class="btn-back" onclick="hideLogin()" style="position: absolute; top: 40px; left: 40px; background: none; border: none; font-weight: 900; letter-spacing: 2px; cursor: pointer;">← BACK</button>
        <div class="logo-login"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" alt="MUZE" style="height: 50px;"></div>
        <h2>Login to<br>MUZE</h2>
        
        <div class="login-options">
            <div style="margin-bottom: 20px;">
                <input type="password" id="architect-handshake" style="opacity: 0.02; width: 100%; cursor: default; border: none; outline: none; background: transparent; caret-color: transparent;" onclick="handshake()">
            </div>
            <a href="dashboard_web2.html" class="login-btn btn-primary">Standard Account</a>
        </div>
        
        <div class="footer-note">AUTHENTICATION PROTOCOL v4.0</div>
    </div>

    <script>
        function showLogin() {
            if (localStorage.getItem('isGodMode') === 'true') {
                window.location.href = "vault.html";
            } else {
                document.getElementById('layer-entrance').style.display = 'none';
                document.getElementById('layer-login').style.display = 'flex';
            }
        }

        function hideLogin() {
            document.getElementById('layer-login').style.display = 'none';
            document.getElementById('layer-entrance').style.display = 'flex';
        }

        let clicks = 0;
        function handshake() {
            clicks++;
            if (clicks >= 5) {
                const pass = prompt("IDENTIFY:");
                if (pass === 'alice') {
                    localStorage.setItem('isGodMode', 'true');
                    window.location.href = "vault.html";
                }
                clicks = 0;
            }
        }

        window.onload = () => {
            if (localStorage.getItem('isGodMode') === 'true') {
                showLogin();
            }
        };
    </script>
</body>
</html>
