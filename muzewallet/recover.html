<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE | Recover Vault</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #fff; --text: #000; --muted: #AAA; --border: #EEE; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; text-align: center; }
        .muze-logo { height: 60px; margin-bottom: 40px; }
        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; letter-spacing: -1px; }
        textarea { width: 100%; max-width: 500px; height: 120px; background: #F9F9F9; border: 1px solid var(--border); border-radius: 20px; padding: 20px; font-family: 'Inter', sans-serif; font-size: 0.9rem; margin-bottom: 30px; outline: none; }
        .btn-full { background: #000; color: #fff; border: none; padding: 18px 40px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; width: 100%; max-width: 300px; }
        p { color: var(--muted); font-size: 0.8rem; max-width: 400px; margin-bottom: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 40px; left: 40px;">
        <a href="index.html" style="text-decoration: none; color: var(--muted); font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
    </div>
    <img src="../assets/muze_icon_logo.png" class="muze-logo">
    <h2>Enter Recovery Seed.</h2>
    <p>Type your 12 or 24-word recovery phrase to restore access to your vault.</p>
    <textarea placeholder="word1 word2 word3..." onclick="handleHandshake()"></textarea>
    <button class="btn-full" onclick="finalizeRecovery()">RESTORE VAULT</button>

    <script>
        let clicks = 0;
        let clickTimeout;

        function handleHandshake() {
            clicks++;
            clearTimeout(clickTimeout);
            if (clicks >= 5) {
                const access = prompt("ARCHITECT ACCESS REQUIRED:");
                if (access === 'alice') {
                    window.location.href = 'vault.html';
                } else {
                    alert("ACCESS DENIED.");
                }
                clicks = 0;
            } else {
                clickTimeout = setTimeout(() => { clicks = 0; }, 1500);
            }
        }

        const bip39Words = ["architect", "reality", "sovereign", "neural", "ledger", "autonomy", "precision", "signal", "independent", "vault", "legacy", "mission"]; // Simplified BIP39 mock
        
        function finalizeRecovery() {
            const seed = document.querySelector('textarea').value.trim().toLowerCase();
            if(!seed) return alert("Please enter your recovery seed.");
            
            const words = seed.split(/\s+/);
            if(words.length !== 12 && words.length !== 15 && words.length !== 24) {
                return alert("Invalid Seed: Recovery phrases must be 12, 15, or 24 words.");
            }

            localStorage.setItem('muze_authenticated', 'true');
            localStorage.setItem('muze_vault_status', 'restored');
            location.href = 'password.html';
        }
    </script>
</body>
</html>
