<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE Wallet | Create Account</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --accent: #7B35D4; --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif; }
        body { margin: 0; font-family: var(--font-body); background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .logo img { height: 30px; margin-bottom: 40px; }
        h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 20px; letter-spacing: -0.05em; }
        p { font-weight: 900; opacity: 0.5; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; }
        .input-group { margin-bottom: 30px; text-align: left; }
        label { font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 15px 0; border: none; border-bottom: 4px solid #000; font-size: 1.2rem; font-weight: 700; outline: none; background: transparent; }
        .btn-submit { width: 100%; padding: 25px; background: #000; color: #FFF; border: none; border-radius: 100px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background: var(--accent); }
        .back-link { margin-top: 30px; display: block; text-decoration: none; color: #000; font-weight: 900; font-size: 12px; opacity: 0.4; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/muze_icon_logo.png" alt="MUZE"></div>
        <h1>New Account</h1>
        <p>Register Standard Identity</p>
        
        <form onsubmit="handleSignup(event)">
            <div class="input-group">
                <label>Desired Handle</label>
                <input type="text" id="handle" placeholder="satoshi.pri" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit">CREATE ACCOUNT</button>
        </form>
        
        <a href="dashboard_web2.html" class="back-link">← BACK TO LOGIN</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR}}');
        
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "REGISTERING...";
            btn.disabled = true;

            const handle = document.getElementById('handle').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { error } = await sb.from('profiles').insert([{ handle, email, password }]);
                if (error) throw error;
                alert('Account created! Please login.');
                window.location.href = "dashboard_web2.html";
            } catch (err) {
                alert('Registration failed: ' + err.message);
                btn.disabled = false;
                btn.innerText = "CREATE ACCOUNT";
            }
        }
    </script>
</body>
</html>
