<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYNX | Sovereign Messenger</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #ffffff; --text: #000; --muted: #64748b; --border: #F1F5F9; --accent: #7B35D4; --surface: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        .contacts { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); }
        .header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-weight: 900; font-size: 1rem; letter-spacing: 1px; }
        
        .add-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--text); color: #fff; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .add-btn:hover { transform: rotate(90deg); background: var(--accent); }

        .contact-list { flex: 1; overflow-y: auto; padding: 15px; }
        .contact-item { padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .contact-item:hover { background: var(--surface); }
        .contact-item.active { background: var(--surface); border: 1px solid var(--border); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; color: #64748b; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--surface); }
        .chat-header { height: 70px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; }
        .messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px 25px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 15px; }
        .input-area input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); outline: none; font-size: 0.9rem; }
        
        /* New Contact Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #fff; padding: 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }
        .modal-box input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; outline: none; font-weight: 600; }
        .modal-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--text); color: #fff; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="contacts">
        <div class="header">
            <h2>LYNX</h2>
            <button class="add-btn" onclick="openModal()">+</button>
        </div>
        <div class="contact-list" id="contact-list">
            <div class="contact-item active" onclick="selectContact('Architect')">
                <div class="avatar">A</div>
                <div><p style="font-weight:900; font-size:0.85rem;">Architect</p><p style="font-size:0.7rem; color:var(--muted);">Neural link active.</p></div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h3 id="current-chat-name" style="font-weight:900; font-size:1rem;">Architect</h3>
        </div>
        <div class="messages" id="message-container">
            <div class="msg received">Welcome to LYNX. Your encrypted communication node is anchored to the Sovereign Ledger.</div>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="handleKey(event)">
            <button onclick="sendMessage()" style="background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:12px; font-weight:900; cursor:pointer;">SEND</button>
        </div>
    </div>

    <div class="modal" id="new-contact-modal">
        <div class="modal-box">
            <h3 style="font-weight:900; margin-bottom:10px;">New Message</h3>
            <p style="font-size:0.8rem; color:var(--muted); margin-bottom:20px;">Enter the .pri handle of the recipient.</p>
            <input type="text" id="new-handle" placeholder="e.g. prisca.pri">
            <button onclick="addContact()">START CHAT</button>
            <p style="font-size:0.7rem; color:var(--muted); margin-top:15px; cursor:pointer;" onclick="closeModal()">Cancel</p>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('new-contact-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('new-contact-modal').style.display = 'none'; }

        function addContact() {
            const handle = document.getElementById('new-handle').value.trim();
            if(!handle) return;
            const list = document.getElementById('contact-list');
            const item = document.createElement('div');
            item.className = 'contact-item';
            item.onclick = () => selectContact(handle);
            item.innerHTML = `
                <div class="avatar">${handle[0].toUpperCase()}</div>
                <div><p style="font-weight:900; font-size:0.85rem;">${handle}</p><p style="font-size:0.7rem; color:var(--muted);">New chat started.</p></div>
            `;
            list.prepend(item);
            selectContact(handle);
            closeModal();
            document.getElementById('new-handle').value = '';
        }

        function selectContact(name) {
            document.getElementById('current-chat-name').innerText = name;
            document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
            document.getElementById('message-container').innerHTML = `<div class="msg received">Secure channel established with ${name}.</div>`;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            const container = document.getElementById('message-container');
            const msg = document.createElement('div');
            msg.className = 'msg sent';
            msg.innerText = text;
            container.appendChild(msg);
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // Simple bot reply for demo
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.className = 'msg received';
                reply.innerText = "Signal received. Anchoring response to ledger...";
                container.appendChild(reply);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }

        function handleKey(e) { if(e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
