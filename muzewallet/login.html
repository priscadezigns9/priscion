<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Login | MUZE</title>
    <link rel="icon" type="image/png" href="https://priscion.com/assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F0F9FF; --text: #000; --muted: #64748b; --accent: #0ea5e9; --border: #bae6fd; --surface: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 420px; background: var(--surface); padding: 50px 40px; border-radius: 40px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(186, 230, 253, 0.3); text-align: center; }
        .logo { height: 60px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px; font-weight: 900; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 40px; }
        .field { text-align: left; margin-bottom: 25px; }
        label { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; color: var(--accent); }
        input { width: 100%; padding: 20px; border-radius: 16px; border: 1px solid var(--border); background: #FAFAFA; font-size: 1rem; outline: none; text-align: center; font-weight: 600; }
        input:focus { border-color: var(--accent); background: #fff; }
        .btn-auth { width: 100%; background: #000; color: #fff; padding: 22px; border-radius: 100px; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .toggle-link { margin-top: 30px; font-size: 0.75rem; font-weight: 900; color: var(--muted); cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
        .toggle-link span { color: var(--accent); }
        #msg { margin-top: 25px; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="../assets/muze_icon_logo.png" class="logo">
        <h1 id="auth-title">Neural Login</h1>
        <p id="auth-subtitle">Access your sovereign vault via handle.</p>
        
        <div class="field">
            <label>Anchor Handle</label>
            <input type="text" id="handle" placeholder="prisca.pri">
        </div>
        
        <div class="field" id="email-field" style="display:none;">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@email.com">
        </div>

        <div class="field">
            <label>Vault Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-auth" id="auth-btn" onclick="handleAuth()">Initialize Handshake</button>
        
        <div id="msg"></div>

        <div class="toggle-link" id="toggle-auth" onclick="toggleMode()">
            Don't have a vault? <span>Create Account</span>
        </div>
        
        <a href="index.html" style="display:block; margin-top:30px; font-size:0.7rem; font-weight:900; color:var(--muted); text-decoration:none; text-transform:uppercase; letter-spacing:2px;">← Back to Entry</a>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Neural Login' : 'Create Vault';
            document.getElementById('auth-subtitle').innerText = isLogin ? 'Access your sovereign vault via handle.' : 'Establish your identity on the Priscion Ledger.';
            document.getElementById('email-field').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'Initialize Handshake' : 'Anchor Identity';
            document.getElementById('toggle-auth').innerHTML = isLogin ? 'Don\'t have a vault? <span>Create Account</span>' : 'Already anchored? <span>Login</span>';
            document.getElementById('msg').innerText = '';
        }

        async function handleAuth() {
            const handle = document.getElementById('handle').value.toLowerCase().trim();
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('auth-btn');

            if(!handle || !password || (!isLogin && !email)) {
                msg.style.color = 'red';
                msg.innerText = 'ERROR: MISSING CREDENTIALS';
                return;
            }

            btn.disabled = true;
            btn.innerText = isLogin ? 'SYNCHRONIZING...' : 'ANCHORING...';
            
            try {
                if (isLogin) {
                    // Placeholder for Supabase Auth Logic
                    // const { data, error } = await supabase.auth.signInWithPassword({ email: handle, password: password });
                } else {
                    // Placeholder for Supabase Signup Logic
                    // const { data, error } = await supabase.auth.signUp({ email: email, password: password, options: { data: { handle: handle } } });
                }

                setTimeout(() => {
                    localStorage.setItem('muze_active', 'true');
                    localStorage.setItem('muze_handle', handle);
                    localStorage.setItem('muze_vault_status', 'active');
                    
                    msg.style.color = 'var(--accent)';
                    msg.innerText = isLogin ? 'HANDSHAKE SUCCESSFUL' : 'IDENTITY ANCHORED';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }, 1500);
            } catch (err) {
                msg.style.color = 'red';
                msg.innerText = 'ERROR: HANDSHAKE FAILED';
                btn.disabled = false;
                btn.innerText = 'RETRY';
            }
        }
    </script>
</body>
</html>
