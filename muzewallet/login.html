<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Login | PRISCION</title>
    <link rel="icon" type="image/png" href="../assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;900&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #F0F9FF;
            --text: #000;
            --muted: #64748b;
            --border: #bae6fd;
            --muze-blue: #5AC8FA;
            --accent: #0ea5e9;
            --surface: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(186, 230, 253, 0.4);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area img {
            height: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 900;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--muze-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(90, 200, 250, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .toggle-password:hover {
            color: var(--text);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--text);
            color: #fff;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode {
            cursor: pointer;
            color: var(--accent);
            font-weight: 600;
        }

        /* Modern Vector Eye Icon SVG */
        .eye-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <img src="../assets/muze_icon_logo.png" alt="MUZE">
        </div>

        <h1 id="auth-title">Neural Login</h1>
        <p class="subtitle" id="auth-subtitle">Access the Priscion Network.</p>

        <!-- Handle Field (Visible only on Sign Up) -->
        <div class="form-group hidden" id="handle-group">
            <label>Choose Your Sovereign Handle</label>
            <input type="text" id="handle" placeholder="username.pri">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>

        <div class="form-group">
            <label>Neural Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••">
                <div class="toggle-password" onclick="togglePassword()">
                    <svg class="eye-icon" id="eye-open" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg class="eye-icon hidden" id="eye-closed" viewBox="0 0 24 24">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>

        <div class="footer-links">
            <span id="mode-text">Don't have an account?</span> 
            <span class="toggle-mode" id="mode-toggle" onclick="toggleMode()">Create one</span>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const supabaseKey = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        };

        let isLogin = true;

        async function generateSeed() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
                const text = await response.text();
                const allWords = text.split('\n').filter(w => w.length > 0);
                const selected = [];
                for(let i=0; i<12; i++) {
                    selected.push(allWords[Math.floor(Math.random() * allWords.length)]);
                }
                return selected.join(' ');
            } catch (e) {
                return "mustard seed faith mountain move grace sovereign neural priscion eternal light heritage";
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const open = document.getElementById('eye-open');
            const closed = document.getElementById('eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                open.classList.add('hidden');
                closed.classList.remove('hidden');
            } else {
                input.type = 'password';
                open.classList.remove('hidden');
                closed.classList.add('hidden');
            }
        }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Neural Login' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLogin ? 'Access the Priscion Network.' : 'Start your sovereign journey.';
            document.getElementById('auth-btn').innerText = isLogin ? 'Sign In' : 'Sign Up';
            document.getElementById('mode-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('mode-toggle').innerText = isLogin ? 'Create one' : 'Sign in';
            
            const handleGroup = document.getElementById('handle-group');
            if (isLogin) {
                handleGroup.classList.add('hidden');
            } else {
                handleGroup.classList.remove('hidden');
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const handleInput = document.getElementById('handle').value;

            if(!email || !password) return alert("Please fill in all fields.");
            if(!isLogin && !handleInput) return alert("Please choose a Sovereign Handle.");

            const btn = document.getElementById('auth-btn');
            btn.innerText = 'PROCESSING...';
            btn.disabled = true;

            try {
                if(isLogin) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    
                    // Fetch the anchored handle from Supabase
                    const { data: profile, error: pError } = await supabaseClient
                        .from('profiles')
                        .select('handle')
                        .eq('id', data.user.id)
                        .single();

                    localStorage.setItem('muze_active', 'true');
                    localStorage.setItem('muze_handle', (profile && profile.handle) ? profile.handle : email.split('@')[0].toLowerCase() + '.pri');
                    
                    window.location.href = 'index.html';
                } else {
                    // Sign Up Logic
                    let finalHandle = handleInput.toLowerCase();
                    if (!finalHandle.endsWith('.pri')) finalHandle += '.pri';

                    // 1. Check if handle exists
                    const { data: existing, error: checkError } = await supabaseClient
                        .from('profiles')
                        .select('handle')
                        .eq('handle', finalHandle);
                    
                    if (existing && existing.length > 0) throw new Error("This handle is already taken.");

                    // 2. Auth Sign Up
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;

                    // 3. Create Profile with Handle
                    if (data.user) {
                        const { error: profileError } = await supabaseClient.from('profiles').upsert({ 
                            id: data.user.id, 
                            handle: finalHandle,
                            updated_at: new Date()
                        });
                        if (profileError) throw profileError;
                    }

                    alert(`Account created successfully! Please check your email to verify.`);
                    toggleMode();
                }
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = isLogin ? 'Sign In' : 'Sign Up';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
