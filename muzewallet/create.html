<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZE | Create Vault</title>
    <link rel="icon" type="image/png" href="https://priscion.com/assets/p-logo.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;900&display=swap">
    <style>
        :root { --bg: #fff; --text: #000; --muted: #666; --border: #EEE; --accent: #000; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; text-align: center; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .muze-logo { height: 70px; margin-bottom: 40px; }
        h2 { font-weight: 900; font-size: 2.2rem; margin-bottom: 20px; letter-spacing: -1px; }
        .seed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 500px; margin-bottom: 40px; }
        .seed-word { background: #F9F9F9; border: 1px solid var(--border); padding: 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 900; color: #000; display: flex; align-items: center; gap: 10px; }
        .seed-word span { color: var(--muted); font-size: 0.6rem; width: 20px; text-align: left; }
        .btn-full { background: #000; color: #fff; border: none; padding: 22px 40px; border-radius: 100px; font-weight: 900; font-size: 0.75rem; letter-spacing: 3px; cursor: pointer; width: 100%; max-width: 350px; text-transform: uppercase; }
        p { color: var(--muted); font-size: 0.9rem; max-width: 450px; margin-bottom: 40px; line-height: 1.6; }
        .hidden { display: none !important; }
        input { width: 100%; max-width: 350px; padding: 20px; border-radius: 100px; border: 1px solid var(--border); background: #F9F9F9; margin-bottom: 20px; font-weight: 600; font-family: 'Inter', sans-serif; text-align: center; outline: none; }
        input:focus { border-color: #000; background: #fff; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 40px; left: 40px;">
        <a href="index.html" style="text-decoration: none; color: var(--muted); font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
    </div>
    <img src="../assets/muze_icon_logo.png" class="muze-logo">

    <!-- STEP 1: Display Seed -->
    <div id="step-display">
        <h2>Secure your Recovery Seed.</h2>
        <p>Write these 12 words down on a physical piece of paper and store it in a secure location. Never share it with anyone.</p>
        <div class="seed-grid" id="seed-grid"></div>
        <button class="btn-full" onclick="showVerification()">I HAVE SAVED THEM</button>
    </div>

    <!-- STEP 2: Verify Seed -->
    <div id="step-verify" class="hidden">
        <h2>Verify your Seed.</h2>
        <p>Please enter the following words from your recovery phrase to confirm you've saved them correctly.</p>
        
        <div style="margin-bottom: 20px;">
            <label id="label-v1" style="font-size: 0.7rem; font-weight: 900; color: var(--muted); display: block; margin-bottom: 10px;">WORD #</label>
            <input type="text" id="verify-1" placeholder="Enter word">
        </div>

        <div style="margin-bottom: 30px;">
            <label id="label-v2" style="font-size: 0.7rem; font-weight: 900; color: var(--muted); display: block; margin-bottom: 10px;">WORD #</label>
            <input type="text" id="verify-2" placeholder="Enter word">
        </div>

        <button class="btn-full" onclick="validateVerification()">CONFIRM & PROCEED</button>
        <p style="margin-top: 20px; cursor: pointer; text-decoration: underline;" onclick="location.reload()">Back to seed</p>
    </div>

    <script>
        const words = ["MUSTARD", "VAULT", "SOVEREIGN", "NEURAL", "LEDGER", "AUTONOMY", "PRECISION", "SIGNAL", "INDEPENDENT", "ARCHITECT", "LEGACY", "MISSION", "FAITH", "GRACE", "WISDOM", "TRUTH", "LIGHT", "GLORY", "HONOR", "POWER", "PEACE", "UNITY", "FREEDOM", "DIGITAL"];
        let generatedSeed = [];
        let verifyIndices = [];

        function generateSeed() {
            const grid = document.getElementById('seed-grid');
            const shuffled = words.sort(() => 0.5 - Math.random());
            generatedSeed = shuffled.slice(0, 12);
            
            grid.innerHTML = generatedSeed.map((word, i) => `
                <div class="seed-word"><span>${String(i+1).padStart(2, '0')}</span> ${word}</div>
            `).join('');

            localStorage.setItem('muze_temp_seed', generatedSeed.join(' '));
        }

        function showVerification() {
            document.getElementById('step-display').classList.add('hidden');
            document.getElementById('step-verify').classList.remove('hidden');
            
            // Pick 2 random indices to verify
            verifyIndices = [Math.floor(Math.random() * 6), Math.floor(Math.random() * 6) + 6];
            document.getElementById('label-v1').innerText = `WORD #${verifyIndices[0] + 1}`;
            document.getElementById('label-v2').innerText = `WORD #${verifyIndices[1] + 1}`;
        }

        function validateVerification() {
            const v1 = document.getElementById('verify-1').value.trim().toUpperCase();
            const v2 = document.getElementById('verify-2').value.trim().toUpperCase();

            if (v1 === generatedSeed[verifyIndices[0]] && v2 === generatedSeed[verifyIndices[1]]) {
                location.href = 'password.html';
            } else {
                alert("Incorrect words. Please verify your seed and try again.");
                location.reload();
            }
        }

        window.onload = generateSeed;
    </script>
</body>
</html>
