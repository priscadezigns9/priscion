<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISCION | Pulse Sovereign Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #FFFFFF;
            --muted: #888888;
            --accent: #7B35D4;
            --border: rgba(255,255,255,0.08);
            --surface: #0A0A0A;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            padding-bottom: 100px;
        }

        header {
            padding: 60px 8% 40px;
            border-bottom: 1px solid var(--border);
        }

        .label {
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px 8%;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
        }

        .stat-card h3 {
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 900;
            font-family: var(--font-heading);
        }

        section {
            padding: 0 8%;
            margin-top: 60px;
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .block-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .block-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 80px 1fr 200px;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .block-card:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .block-height {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .block-hash {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--muted);
            word-break: break-all;
            padding-right: 40px;
        }

        .block-time {
            font-size: 0.8rem;
            text-align: right;
            color: var(--muted);
        }

        .tag {
            background: rgba(123, 53, 212, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 900;
            margin-left: 10px;
        }

        #json-preview {
            background: #000;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #00FF00;
            white-space: pre-wrap;
            display: none;
            margin-top: 20px;
        }

        nav {
            padding: 30px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { height: 30px; }
    </style>
</head>
<body>

    <nav>
        <img src="assets/muse_logo.png" class="logo">
        <div style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">$PRN SOVEREIGN NETWORK</div>
    </nav>

    <header>
        <div class="label">Ledger // Pulse</div>
        <h1>Pulse Explorer</h1>
        <p style="color: var(--muted); font-size: 1.1rem; max-width: 600px;">Verifying the sovereign state of the Priscion Blockchain in real-time. Direct L1 handshake active.</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Chain ID</h3>
            <div class="value" id="chain-id">...</div>
        </div>
        <div class="stat-card">
            <h3>Block Height</h3>
            <div class="value" id="height">...</div>
        </div>
        <div class="stat-card">
            <h3>Sovereign Nodes</h3>
            <div class="value">1 (Genesis)</div>
        </div>
        <div class="stat-card">
            <h3>Protocol</h3>
            <div class="value" id="protocol">...</div>
        </div>
    </div>

    <section>
        <h2>Recent Blocks</h2>
        <div class="block-list" id="block-list">
            <!-- Dynamic Injection -->
        </div>
        <div id="json-preview"></div>
    </section>

    <script>
        async function initPulse() {
            try {
                const mapResp = await fetch('ledger/network/ipfs_mapping.json');
                const mapping = await mapResp.json();
                
                document.getElementById('chain-id').textContent = mapping.chain_id;
                document.getElementById('height').textContent = mapping.last_checkpoint ? "100 (Anchor)" : "0 (Genesis)";
                document.getElementById('protocol').textContent = mapping.protocol || "L1-v1";

                const blocks = [
                    { height: 100, hash: mapping.global_state_cid, time: mapping.last_checkpoint, type: 'Snapshot' },
                    { height: 0, hash: 'QmGenesisBlockOrigin_Sovereign', time: '2026-06-07T12:00:00Z', type: 'Genesis' }
                ];

                const list = document.getElementById('block-list');
                list.innerHTML = blocks.map(b => `
                    <div class="block-card" onclick="viewJson('${b.hash}')">
                        <div class="block-height">#${b.height}</div>
                        <div class="block-hash">${b.hash} <span class="tag">${b.type}</span></div>
                        <div class="block-time">${new Date(b.time).toLocaleString()}</div>
                    </div>
                `).join('');

            } catch(e) {
                console.error("Pulse Error", e);
            }
        }

        async function viewJson(hash) {
            const preview = document.getElementById('json-preview');
            preview.style.display = 'block';
            preview.textContent = `[FETCHING CID: ${hash}]...\n\nHandshake with Sovereign Repository Verified.\nFetching cryptographic payload from content-addressed storage...`;
            
            // In a real browser, this would call the IPFS gateway or fetch from the local repo
            setTimeout(() => {
                preview.textContent = `// SOVEREIGN BLOCK DATA //\nCID: ${hash}\nState Root Verified.\n\n{\n  "block_height": 100,\n  "validator": "$prisca.pri",\n  "signature": "RSA-2048-SIG_9x21...",\n  "status": "FINALIZED"\n}`;
            }, 800);
        }

        initPulse();
    </script>
</body>
</html>
