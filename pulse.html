<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>PULSE | The Sovereign Explorer</title>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Inter', sans-serif; }
        nav { padding: 20px 8%; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .container { padding: 40px 8%; }
        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { border: 1px solid #eee; padding: 25px; border-radius: 20px; background: #fafafa; }
        .stat-card div { font-size: 0.7rem; font-weight: 900; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card span { font-size: 1.8rem; font-weight: 900; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; font-size: 0.8rem; color: #999; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .cid { font-family: monospace; color: #7B35D4; }
    </style>
</head>
<body>
    <nav>
        <img src='assets/pulse_logo.png' style='height: 40px;'>
        <div style='font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;'>SOVEREIGN LEDGER</div>
    </nav>
    <div class='container'>
        <h1>Network Pulse</h1>
        <div class='stats-grid'>
            <div class='stat-card'><div>Current Block</div><span>100</span></div>
            <div class='stat-card'><div>Network State</div><span>Independent</span></div>
            <div class='stat-card'><div>Rewards Distributed</div><span>45.5 </span></div>
        </div>
        <h3>Live Activity</h3>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Identifier (CID)</th>
                    <th>Status</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Block 100</td><td class='cid'>QmXoyp...v7f</td><td><b>Anchored</b></td><td>Just now</td></tr>
                <tr><td>Reward</td><td class='cid'>addr1_...m9zk</td><td><b>Verified</b></td><td>2m ago</td></tr>
                <tr><td>Sovereign Sync</td><td class='cid'>QmZ4tk...p9x</td><td><b>Secured</b></td><td>5m ago</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
