<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Forge | Atelia Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
            --cyber: #00ffff;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); z-index: 100; }
        .logo-img { height: 35px; filter: drop-shadow(0 0 5px var(--red)); }

        #forge-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            perspective: 1200px; position: relative;
        }

        /* 3D Forge Core */
        #forge-core {
            position: relative; width: 400px; height: 400px;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }
        .core-ring {
            position: absolute; border: 2px solid var(--red); border-radius: 50%;
            animation: rotateRing 10s linear infinite;
        }
        @keyframes rotateRing { from { transform: rotateY(0) rotateX(0); } to { transform: rotateY(360deg) rotateX(360deg); } }

        #creature-display {
            width: 280px; height: 280px; position: relative; z-index: 10;
            filter: drop-shadow(0 0 30px var(--cyber));
            transition: 0.5s;
        }
        .creature-img {
            width: 100%; height: 100%; object-fit: contain;
            animation: hover 4s ease-in-out infinite;
        }
        @keyframes hover { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

        /* UI Panels */
        .panel {
            position: absolute; background: rgba(0,0,0,0.8); border: 1px solid var(--red);
            padding: 20px; backdrop-filter: blur(10px); z-index: 50;
        }
        #resource-panel { top: 20px; left: 20px; width: 200px; }
        #upgrade-panel { top: 20px; right: 20px; width: 250px; }
        #history-panel { bottom: 20px; left: 20px; width: 300px; max-height: 200px; overflow-y: auto; }

        .stat-row { margin-bottom: 10px; }
        .stat-label { font-family: 'Russo One'; font-size: 0.7rem; color: #888; }
        .stat-val { font-family: 'Bangers'; font-size: 1.5rem; color: var(--orange); }

        .forge-btn {
            width: 100%; padding: 12px; background: var(--red); color: white;
            border: none; font-family: 'Russo One'; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        .forge-btn:hover { background: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .forge-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <a href="arena.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.1rem; color:var(--cyber);">SOVEREIGN FORGE PRO</div>
    </nav>

    <div id="forge-area">
        <div id="resource-panel" class="panel">
            <div class="stat-row">
                <div class="stat-label">NEURAL ENERGY</div>
                <div class="stat-val" id="energy">500</div>
            </div>
            <div class="stat-row">
                <div class="stat-label">ATLR PRESTIGE</div>
                <div class="stat-val" id="atlr">0</div>
            </div>
        </div>

        <div id="upgrade-panel" class="panel">
            <h4 style="margin:0 0 15px; font-family:'Russo One'; font-size:0.8rem;">FORGE PROTOCOLS</h4>
            <button class="forge-btn" onclick="evolve()">INITIATE EVOLUTION (100 E)</button>
            <button class="forge-btn" onclick="enhance()">ENHANCE FIDELITY (50 E)</button>
            <button class="forge-btn" onclick="stabilize()">STABILIZE GENOME (75 E)</button>
        </div>

        <div id="history-panel" class="panel">
            <h4 style="margin:0 0 10px; font-family:'Russo One'; font-size:0.7rem;">GENETIC LOG</h4>
            <div id="log-entries" style="font-size:0.7rem; color:#aaa; font-family:'Courier New';">
                > SOVEREIGN FORGE INITIALIZED...<br>
                > AWAITING NEURAL INPUT...
            </div>
        </div>

        <div id="forge-core">
            <div class="core-ring" style="width:350px; height:350px; animation-duration:8s;"></div>
            <div class="core-ring" style="width:300px; height:300px; animation-delay:-2s; border-color:var(--cyber);"></div>
            <div id="creature-display">
                <img src="https://priscadezigns.org/logos/cupyx_logo_small.png" class="creature-img" id="creature">
            </div>
        </div>

        <div id="overlay">
            <h1 style="font-family:'Bangers'; font-size:5rem; margin:0;">SOVEREIGN FORGE</h1>
            <p style="font-family:'Russo One'; color:var(--cyber); margin-bottom:30px;">EVOLVE THE UNKNOWN · ARCHITECT THE LEDGER</p>
            <button class="forge-btn" style="width:auto; padding:15px 60px; font-size:1.5rem;" onclick="start()">IGNITE FORGE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        let energy = 500, atlr = 0, level = 1;
        const assets = [
            'https://priscadezigns.org/logos/cupyx_logo_small.png',
            'https://priscadezigns.org/logos/neural-nexus.png',
            'https://priscadezigns.org/logos/moblync-logo.png',
            'https://priscadezigns.org/logos/rowcell-icon-256.png'
        ];

        function start() {
            document.getElementById('overlay').style.display = 'none';
            log("FORGE IGNITED. CONSUMING NEURAL STREAM.");
        }

        function log(msg) {
            const entries = document.getElementById('log-entries');
            entries.innerHTML = `> ${msg}<br>` + entries.innerHTML;
        }

        function evolve() {
            if (energy < 100) return log("INSUFFICIENT ENERGY.");
            energy -= 100;
            updateUI();
            
            const display = document.getElementById('creature-display');
            display.style.transform = 'scale(0.1) rotate(720deg)';
            display.style.filter = 'brightness(5) blur(10px)';

            setTimeout(() => {
                level++;
                const newAsset = assets[level % assets.length];
                document.getElementById('creature').src = newAsset;
                display.style.transform = 'scale(1) rotate(0deg)';
                display.style.filter = 'drop-shadow(0 0 30px #00ffff)';
                log(`EVOLUTION SUCCESSFUL. LEVEL ${level} REACHED.`);
                atlr += 50;
                updateUI();
                if(window.Atelia) Atelia.arena.updatePrestige(null, 50);
            }, 1000);
        }

        function enhance() {
            if (energy < 50) return log("INSUFFICIENT ENERGY.");
            energy -= 50;
            atlr += 10;
            updateUI();
            log("FIDELITY ENHANCED. +10 ATLR SECURED.");
        }

        function stabilize() {
            if (energy < 75) return log("INSUFFICIENT ENERGY.");
            energy -= 75;
            energy += 150; // Random gain
            updateUI();
            log("GENOME STABILIZED. NEURAL RECOVERY DETECTED.");
        }

        function updateUI() {
            document.getElementById('energy').innerText = energy;
            document.getElementById('atlr').innerText = atlr;
        }

        setInterval(() => {
            energy += 5;
            updateUI();
        }, 2000);
    </script>
</body>
</html>
