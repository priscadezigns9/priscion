<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LEGGO | Sovereign Web3 Browser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #000; --surface: #080808; --border: #111; --text-muted: #444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .browser { display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Navigation Bar (Address Bar, Buttons) */
        .top-bar { height: 75px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; z-index: 1000; }
        .p-logo { height: 32px; cursor: pointer; transition: 0.3s; }
        .p-logo:hover { filter: drop-shadow(0 0 8px var(--accent)); }
        .lego-logo { height: 18px; margin-left: 15px; opacity: 0.8; }
        
        .address-container { flex: 1; display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin: 0 30px; padding: 0 15px; height: 45px; transition: 0.3s; }
        .address-container:focus-within { border-color: var(--accent); background: #0A0A0A; }
        .handle-prefix { color: var(--accent); font-weight: 900; font-size: 0.8rem; margin-right: 5px; }
        .address-bar { background: none; border: none; color: #fff; width: 100%; font-size: 0.85rem; font-weight: 700; outline: none; letter-spacing: 1px; text-transform: uppercase; }
        
        .btn-group { display: flex; gap: 15px; align-items: center; }
        .icon-btn { cursor: pointer; color: #333; transition: 0.3s; display: flex; align-items: center; }
        .icon-btn:hover { color: #fff; }
        .connect-btn { background: var(--accent); color: #fff; border: none; padding: 10px 22px; border-radius: 10px; font-weight: 900; font-size: 0.65rem; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        .connect-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(123, 53, 212, 0.4); }

        /* Sidebar Navigation */
        .layout { display: flex; flex: 1; overflow: hidden; }
        .side-nav { width: 75px; border-right: 1px solid var(--border); background: #030303; display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .nav-item { margin-bottom: 35px; cursor: pointer; color: #333; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--accent); }

        /* Main Dashboard & Viewport */
        .main-view { flex: 1; position: relative; background: radial-gradient(circle at top right, rgba(123, 53, 212, 0.03), transparent); }
        .hub-content { padding: 50px; overflow-y: auto; height: 100%; scrollbar-width: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .tile:hover { border-color: var(--accent); transform: translateY(-5px); background: #0A0A0A; }
        .tile svg { color: var(--accent); margin-bottom: 15px; width: 24px; height: 24px; }
        .tile-name { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; color: #444; text-transform: uppercase; }
        .tile:hover .tile-name { color: #fff; }

        /* Iframe Viewport */
        .viewport { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        .vp-header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: #000; }
        #if { flex: 1; border: none; width: 100%; height: 100%; }

        /* Wallet Sidebar */
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: #000; z-index: 2000; border-left: 1px solid var(--border); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .sidebar.active { right: 0; }

        @media(max-width: 768px) {
            .side-nav { display: none; }
            .address-container { margin: 0 10px; }
            .lego-logo { display: none; }
            .sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <div class="browser">
        <header class="top-bar">
            <img src="assets/priscion_logo.png" class="p-logo" onclick="location.href='index.html'">
            <img src="assets/leggo_logo.png" class="lego-logo">
            
            <div class="address-container">
                <span class="handle-prefix">$</span>
                <input type="text" id="addr" class="address-bar" placeholder="SEARCH OR ENTER HANDLE..." onkeydown="if(event.key==='Enter') resolveHandle(this.value)">
            </div>
            
            <div class="btn-group">
                <div class="icon-btn" onclick="goHome()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
                <button class="connect-btn" onclick="toggleSidebar()">CONNECT</button>
            </div>
        </header>

        <div class="layout">
            <nav class="side-nav">
                <div class="nav-item active" onclick="goHome()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></div>
                <div class="nav-item" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
                <div class="nav-item" onclick="alert('Neural Settings: Loading Calibration...')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
            </nav>

            <main class="main-view">
                <div class="viewport" id="vp">
                    <div class="vp-header">
                        <span id="vp-name" style="font-weight:900; letter-spacing:4px; font-size:0.7rem; color:var(--accent);">SOVEREIGN DAPP</span>
                        <div style="display:flex; gap:20px; align-items:center;">
                            <button id="donate-btn" style="display:none; background:var(--accent); border:none; color:#fff; font-weight:900; font-size:0.6rem; padding:10px 20px; border-radius:10px; cursor:pointer;" onclick="triggerDonate()">DONATE</button>
                            <button onclick="closeNode()" style="background:none; border:none; color:#444; font-size:1.5rem; cursor:pointer;">✕</button>
                        </div>
                    </div>
                    <iframe id="if"></iframe>
                </div>

                <div class="hub-content" id="hub">
                    <h1 style="font-weight:900; font-size:2.5rem; margin-bottom:10px; letter-spacing:-1px;">PRISCION WEB3</h1>
                    <p style="color:#444; font-weight:900; font-size:0.65rem; letter-spacing:4px; margin-bottom:50px; text-transform:uppercase;">Sovereign Blockchain Business</p>
                    <div class="grid" id="grid"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="sidebar" class="sidebar"></div>
    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { n: 'Jello', h: '$jello.pri', i: '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-14 8.38 8.38 0 0 1 3.8.9L21 3z"></path>' },
            { n: 'Peanuts', h: '$peanut.pri', i: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>' },
            { n: 'Gridlock', h: '$gridlock.pri', i: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' },
            { n: 'Chillata', h: '$chillata.pri', i: '<path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"></path>' },
            { n: 'MYNT', h: '$mynt.pri', i: '<path d="M21 8V5a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v3"></path><path d="M21 12v3a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-3"></path><path d="M11 3v11"></path><path d="m15 10-4 4-4-4"></path>' },
            { n: 'Anime', h: '$dreaminganime.pri', i: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>' },
            { n: 'Nurasen', h: '$nurasen.pri', i: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' },
            { n: 'Atelia', h: '$atelia.pri', i: '<rect x="2" y="6" width="20" height="12" rx="2"></rect>' },
            { n: 'TWMK', h: '$twmk.pri', i: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>' },
            { n: 'dpanyard', h: '$dpanyard.pri', i: '<circle cx="12" cy="12" r="9"></circle><path d="M7 12h10M12 7v10"></path>' },
            { n: 'Riddiim', h: '$riddiim.pri', i: '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>' },
            { n: 'Glow', h: '$glow.pri', i: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2"></path>' },
            { n: 'Peak', h: '$peakfit.pri', i: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' },
            { n: 'Calalloo', h: '$calalloo.pri', i: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' },
            { n: 'Gen Play', h: '$genplay.pri', i: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>' },
            { n: 'Deskwell', h: '$deskwell.pri', i: '<rect x="3" y="9" width="18" height="12" rx="2"></rect><path d="M1 9h22M12 9v12"></path>' },
            { n: 'Dumpling', h: '$dumpling.pri', i: '<circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path>' },
            { n: 'Autodrome', h: '$autodrome.pri', i: '<circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle><path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2"></path>' },
            { n: 'Couture', h: '$couture.pri', i: '<rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M16 7V5a4 4 0 0 0-8 0v2"></path>' },
            { n: 'Verdant', h: '$verdant.pri', i: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2"></path>' }
        ];

        const nodeMap = {
            'jello': 'messenger',
            'dreaminganime': 'dreaminganime',
            'nurasen': 'nurasen',
            'atelia': 'ateliagaming',
            'twmk': 'thewaymadeknown',
            'autodrome': 'theautodrome',
            'riddiim': 'riddiim',
            'dpanyard': 'dpanyard',
            'glow': 'glowprotocol',
            'peakfit': 'peakfit',
            'calalloo': 'calalloo',
            'genplay': 'thegenplay',
            'deskwell': 'deskwell',
            'dumpling': 'mybabydumpling',
            'couture': 'couturegallery',
            'verdant': 'verdantco',
            'peanut': 'peanuts',
            'gridlock': 'gridlock',
            'chillata': 'chillataswap',
            'mynt': 'mynt'
        };

        function renderGrid() {
            const g = document.getElementById('grid');
            if(!g) return;
            g.innerHTML = nodes.map(n => `
                <div class="tile" onclick="openNode('${n.h}', '${n.n}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.i}</svg>
                    <div class="tile-name">${n.n}</div>
                </div>
            `).join('');
            document.getElementById('addr').value = "";
        }

        function resolveHandle(h) {
            const clean = h.toLowerCase().replace('$','').replace('.pri','');
            const target = nodes.find(n => n.h.includes(clean) || n.n.toLowerCase() === clean);
            if(target) openNode(target.h, target.n);
            else alert('Sovereign Resolver: Handle not found on Ledger.');
        }

        function openNode(h, name) {
            if(h === '$jello.pri') { toggleSidebar(); if(typeof renderChat === 'function') renderChat(); return; }
            
            const key = h.replace('$','').replace('.pri','');
            const p = nodeMap[key] || key;
            document.getElementById('vp-name').innerText = name.toUpperCase() + ' NODE';
            document.getElementById('addr').value = h.toUpperCase().replace('$','');
            document.getElementById('vp').style.display = 'flex';
            document.getElementById('if').src = '../' + p + '/index.html';
            document.getElementById('donate-btn').style.display = (key === 'twmk') ? 'block' : 'none';
        }

        function triggerDonate() {
            toggleSidebar();
            if(typeof renderPayment === 'function') renderPayment('Donation: TWMK', '0.0');
        }

        function goHome() {
            document.getElementById('vp').style.display = 'none';
            document.getElementById('if').src = '';
            document.getElementById('addr').value = "";
        }

        function closeNode() { goHome(); }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            if(!s) return;
            s.classList.toggle('active');
            if(s.classList.contains('active')) {
                if(typeof renderWallet === 'function') renderWallet();
            }
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
